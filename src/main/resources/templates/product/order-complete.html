<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>주문 완료 - K-market</title>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-[#f8f9fa] text-[#191c1d]">
<div th:replace="~{layout/site :: header}"></div>

<main class="mx-auto flex min-h-[620px] max-w-3xl items-center justify-center px-4 py-16">
    <section class="w-full rounded-2xl border border-[#c1c7ca] bg-white p-8 text-center shadow-sm md:p-12">
        <div class="mx-auto mb-6 flex h-20 w-20 items-center justify-center rounded-full bg-[#c0ecdc] text-[#14333b]">
            <span class="material-symbols-outlined text-5xl">check_circle</span>
        </div>
        <h1 class="text-3xl font-extrabold text-[#14333b]">주문이 접수되었습니다</h1>
        <p class="mt-3 text-[#41484a]">주문 내역은 마이페이지에서 확인할 수 있습니다.</p>

        <dl class="mx-auto mt-8 grid max-w-xl grid-cols-[130px_1fr] gap-px overflow-hidden rounded-xl border border-[#c1c7ca] bg-[#c1c7ca] text-left">
            <dt class="bg-[#f3f4f5] px-5 py-4 font-semibold">주문번호</dt>
            <dd class="bg-white px-5 py-4 font-bold text-[#14333b]" th:text="${receipt.orderNo}">100</dd>
            <dt class="bg-[#f3f4f5] px-5 py-4 font-semibold">주문상품</dt>
            <dd class="bg-white px-5 py-4" th:text="${receipt.orderName}">상품명</dd>
            <dt class="bg-[#f3f4f5] px-5 py-4 font-semibold">결제수단</dt>
            <dd class="bg-white px-5 py-4" th:text="${receipt.paymentMethod}">신용카드</dd>
            <dt class="bg-[#f3f4f5] px-5 py-4 font-semibold">결제금액</dt>
            <dd class="bg-white px-5 py-4 text-xl font-extrabold text-[#ba1a1a]"
                th:text="${#numbers.formatInteger(receipt.totalPaymentPrice, 1, 'COMMA') + '원'}">0원</dd>
            <dt class="bg-[#f3f4f5] px-5 py-4 font-semibold">주문상태</dt>
            <dd class="bg-white px-5 py-4" th:text="${receipt.status}">결제완료</dd>
        </dl>

        <div class="mt-8 flex flex-col justify-center gap-3 sm:flex-row">
            <a th:href="@{/my/order}" class="rounded-xl bg-[#14333b] px-7 py-3 font-bold text-white hover:opacity-90">주문내역 보기</a>
            <a th:href="@{/}" class="rounded-xl border border-[#c1c7ca] bg-white px-7 py-3 font-bold text-[#41484a] hover:bg-[#f3f4f5]">쇼핑 계속하기</a>
        </div>
    </section>
</main>

<div th:replace="~{layout/site :: footer}"></div>
<script th:src="@{/js/auth-nav.js}"></script>
</body>
</html>
