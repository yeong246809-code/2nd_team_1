<!-- Sidebar Component (sidebar.html) -->
<aside th:fragment="sidebar" class="w-64 flex-shrink-0">
    <!-- Category Navigation -->
    <div class="bg-white rounded-xl border border-gray-200 overflow-hidden mb-6">
        <div class="bg-gray-50 px-4 py-3 border-b border-gray-200">
            <h3 class="font-bold text-gray-800 flex items-center gap-2">
                <span class="material-icons text-sm">menu</span>
                카테고리
            </h3>
        </div>
        <ul class="py-2">
            <li th:each="category : ${categories}">
                <a th:href="@{/category/{id}(id=${category.id})}"
                   class="flex items-center gap-3 px-4 py-3 text-sm text-gray-600 hover:bg-gray-50 hover:text-primary transition-all">
                    <span class="material-icons text-base" th:text="${category.icon}">apparel</span>
                    <span th:text="${category.name}">패션/의류</span>
                </a>
            </li>
            <!-- Fallback static items for reference -->
            <li>
                <a href="#" class="flex items-center gap-3 px-4 py-3 text-sm text-gray-600 hover:bg-gray-50 hover:text-primary transition-all">
                    <span class="material-icons text-base text-gray-400">apparel</span>
                    패션/의류
                </a>
            </li>
            <li>
                <a href="#" class="flex items-center gap-3 px-4 py-3 text-sm text-gray-600 hover:bg-gray-50 hover:text-primary transition-all">
                    <span class="material-icons text-base text-gray-400">devices</span>
                    가전/디지털
                </a>
            </li>
            <li>
                <a href="#" class="flex items-center gap-3 px-4 py-3 text-sm text-gray-600 hover:bg-gray-50 hover:text-primary transition-all">
                    <span class="material-icons text-base text-gray-400">restaurant</span>
                    식품/생필품
                </a>
            </li>
            <li>
                <a href="#" class="flex items-center gap-3 px-4 py-3 text-sm text-gray-600 hover:bg-gray-50 hover:text-primary transition-all">
                    <span class="material-icons text-base text-gray-400">home_work</span>
                    홈/문구/취미
                </a>
            </li>
        </ul>
    </div>

    <!-- Popular Rankings -->
    <div class="bg-white rounded-xl border border-gray-200 overflow-hidden">
        <div class="bg-gray-50 px-4 py-3 border-b border-gray-200 flex justify-between items-center">
            <h3 class="font-bold text-gray-800 text-sm">인기 순위</h3>
            <a href="#" class="text-[10px] text-gray-400 hover:underline">전체보기</a>
        </div>
        <div class="p-3 space-y-4">
            <div th:each="rank : ${rankings}" class="flex items-center gap-3 group cursor-pointer">
                <div class="w-12 h-12 bg-gray-100 rounded-lg flex items-center justify-center overflow-hidden border border-gray-100">
                    <img th:src="${rank.imageUrl}" class="w-full h-full object-cover" src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=100&h=100&fit=crop" alt="product">
                </div>
                <div class="flex-1 min-w-0">
                    <p class="text-xs font-bold text-gray-800 truncate" th:text="${rank.name}">레드 스포츠 슈즈</p>
                    <p class="text-[10px] text-primary font-black mt-0.5" th:text="${#numbers.formatInteger(rank.price, 0, 'COMMA') + ' KRW'}">27,000 KRW</p>
                </div>
            </div>
            <!-- Static reference -->
            <div class="flex items-center gap-3 group cursor-pointer">
                <div class="w-12 h-12 bg-gray-100 rounded-lg flex items-center justify-center overflow-hidden border border-gray-100">
                    <span class="material-icons text-gray-400 text-sm">image</span>
                </div>
                <div class="flex-1 min-w-0">
                    <p class="text-xs font-bold text-gray-800 truncate">모던 스마트워치</p>
                    <p class="text-[10px] text-primary font-black mt-0.5">89,000 KRW</p>
                </div>
            </div>
        </div>
    </div>
</aside>
