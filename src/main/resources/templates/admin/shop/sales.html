<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>K-market Admin Dashboard - 매출현황</title>
    <link href="https://fonts.googleapis.com" rel="preconnect"/>
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600&amp;family=Plus+Jakarta+Sans:wght@600;700;800&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        /* Accordion Smooth Animation */
        .menu-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-in-out, opacity 0.2s ease-in-out, padding 0.3s ease-in-out;
            opacity: 0;
        }
        .menu-item-active .menu-content {
            max-height: 500px;
            opacity: 1;
            padding-top: 4px;
            padding-bottom: 8px;
        }
        .chevron-icon {
            transition: transform 0.3s ease;
        }
        .menu-item-active .chevron-icon {
            transform: rotate(180deg);
        }
    </style>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "secondary-container": "#c0ecdc",
                        "surface-container-highest": "#e1e3e4",
                        "primary-fixed": "#c8e8f2",
                        "on-error": "#ffffff",
                        "inverse-surface": "#2e3132",
                        "on-surface": "#191c1d",
                        "on-secondary": "#ffffff",
                        "tertiary-fixed": "#ffdcc7",
                        "surface-bright": "#f8f9fa",
                        "surface-container-lowest": "#ffffff",
                        "primary-container": "#2c4a52",
                        "error-container": "#ffdad6",
                        "primary": "#14333b",
                        "on-tertiary-fixed-variant": "#5f402b",
                        "on-secondary-fixed": "#002018",
                        "background": "#f8f9fa",
                        "secondary-fixed": "#c0ecdc",
                        "tertiary-fixed-dim": "#eabda2",
                        "secondary": "#3e6659",
                        "error": "#ba1a1a",
                        "primary-fixed-dim": "#acccd5",
                        "on-secondary-fixed-variant": "#264e42",
                        "tertiary": "#452916",
                        "surface": "#f8f9fa",
                        "on-tertiary": "#ffffff",
                        "on-primary-container": "#99b9c2",
                        "inverse-primary": "#acccd5",
                        "surface-container-low": "#f3f4f5",
                        "on-tertiary-container": "#d6ab90",
                        "on-primary-fixed": "#001f26",
                        "surface-tint": "#45636b",
                        "tertiary-container": "#5e3f2a",
                        "on-error-container": "#93000a",
                        "secondary-fixed-dim": "#a5d0c0",
                        "on-primary": "#ffffff",
                        "on-tertiary-fixed": "#2d1605",
                        "on-background": "#191c1d",
                        "on-secondary-container": "#446c5f",
                        "outline": "#72787a",
                        "outline-variant": "#c1c7ca",
                        "on-surface-variant": "#41484a",
                        "inverse-on-surface": "#f0f1f2",
                        "on-primary-fixed-variant": "#2d4b53",
                        "surface-variant": "#e1e3e4",
                        "surface-dim": "#d9dadb",
                        "surface-container": "#edeeef",
                        "surface-container-high": "#e7e8e9"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "margin-mobile": "16px",
                        "base": "8px",
                        "gutter": "24px",
                        "xs": "4px",
                        "sm": "12px",
                        "xl": "80px",
                        "container-max": "1280px",
                        "md": "24px",
                        "lg": "48px"
                    },
                    "fontFamily": {
                        "headline-md": ["Plus Jakarta Sans"],
                        "body-lg": ["Be Vietnam Pro"],
                        "headline-lg-mobile": ["Plus Jakarta Sans"],
                        "display-lg": ["Plus Jakarta Sans"],
                        "body-md": ["Be Vietnam Pro"],
                        "label-md": ["Be Vietnam Pro"],
                        "label-sm": ["Be Vietnam Pro"],
                        "headline-lg": ["Plus Jakarta Sans"]
                    },
                    "fontSize": {
                        "headline-md": ["20px", {"lineHeight": "1.4", "fontWeight": "600"}],
                        "body-lg": ["18px", {"lineHeight": "1.6", "fontWeight": "400"}],
                        "headline-lg-mobile": ["24px", {"lineHeight": "1.3", "fontWeight": "600"}],
                        "display-lg": ["48px", {"lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "body-md": ["16px", {"lineHeight": "1.6", "fontWeight": "400"}],
                        "label-md": ["14px", {"lineHeight": "1.4", "letterSpacing": "0.01em", "fontWeight": "500"}],
                        "label-sm": ["12px", {"lineHeight": "1.2", "fontWeight": "600"}],
                        "headline-lg": ["32px", {"lineHeight": "1.3", "fontWeight": "600"}]
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-background text-on-background font-body-md text-body-md antialiased min-h-screen flex">

<!-- Shared Component: SideNavBar -->
<div th:replace="~{admin/_layout :: sidebar('shop')}"></div>

<div th:replace="~{admin/_layout :: header}"></div>

<main class="ml-64 mt-16 p-lg flex-1 w-full max-w-[1400px] mx-auto">
    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-lg border-b border-outline-variant pb-sm">
        <div class="mb-2 sm:mb-0">
            <h1 class="font-headline-lg text-headline-lg text-on-background">매출현황</h1>
        </div>
        <nav class="text-label-sm text-on-surface-variant">
            <span>HOME</span> &gt; <span>상점관리</span> &gt; <span class="text-primary font-bold">매출현황</span>
        </nav>
    </div>

    <div class="bg-surface-container-lowest rounded-lg border border-outline-variant p-md shadow-sm">

        <div class="mb-md flex items-center">
            <div class="relative inline-block w-40">
                <select id="periodFilter" onchange="changePeriod(this.value)"
                        class="w-full bg-surface border border-outline border-outline-variant rounded-lg px-3 py-2 text-body-md text-on-surface-variant focus:outline-none focus:border-primary appearance-none cursor-pointer pr-8">
                    <option value="daily" th:selected="${currentPeriod == 'daily'}">일별</option>
                    <option value="weekly" th:selected="${currentPeriod == 'weekly'}">주별</option>
                    <option value="monthly" th:selected="${currentPeriod == 'monthly'}">월별</option>
                </select>
                <span class="material-symbols-outlined absolute right-2 top-2.5 pointer-events-none text-on-surface-variant text-md">expand_more</span>
            </div>
        </div>

        <div class="overflow-x-auto">
            <table class="w-full border-collapse text-center">
                <thead>
                <tr class="border-b border-outline-variant bg-surface-container text-on-background font-label-md text-label-md">
                    <th class="py-4 px-2 font-bold">번호</th>
                    <th class="py-4 px-2 font-bold">상호명</th>
                    <th class="py-4 px-2 font-bold">사업자등록번호</th>
                    <th class="py-4 px-2 font-bold underline decoration-1">주문건수</th>
                    <th class="py-4 px-2 font-bold">결제완료</th>
                    <th class="py-4 px-2 font-bold">배송중</th>
                    <th class="py-4 px-2 font-bold">배송완료</th>
                    <th class="py-4 px-2 font-bold">구매확정</th>
                    <th class="py-4 px-2 font-bold underline decoration-1">주문합계</th>
                    <th class="py-4 px-2 font-bold underline decoration-1">매출합계</th>
                </tr>
                </thead>
                <tbody class="text-body-md text-on-surface-variant divide-y divide-surface-variant">
                <!-- 1. 진짜로 상점 데이터조차 없을 때만 동작 -->
                <tr th:if="${#lists.isEmpty(salesList)}">
                    <td colspan="10" class="py-8 text-center text-outline">조회된 매출 통계 데이터가 없습니다.</td>
                </tr>

                <!-- 2. ⭕ DB에서 가져온 실제 데이터를 반복 출력하는 구간 -->
                <tr th:unless="${#lists.isEmpty(salesList)}" th:each="sales, loop : ${salesList}">
                    <!-- 행 번호 (페이지 번호와 인덱스 조합) -->
                    <td class="py-4 px-2" th:text="${currentPage * 10 + loop.count}"></td>

                    <!-- 실제 DB 데이터 매핑 -->
                    <td class="py-4 px-2 font-bold text-primary" th:text="${sales.storeName}"></td>
                    <td class="py-4 px-2" th:text="${sales.bizNumber}"></td>
                    <td class="py-4 px-2" th:text="${sales.orderCount}"></td>
                    <td class="py-4 px-2" th:text="${sales.paymentCompleted}"></td>
                    <td class="py-4 px-2" th:text="${sales.deliveryInProgress}"></td>
                    <td class="py-4 px-2" th:text="${sales.deliveryCompleted}"></td>
                    <td class="py-4 px-2" th:text="${sales.purchaseConfirmed}"></td>

                    <!-- 천단위 콤마(,)가 적용된 실제 주문/매출 합계 금액 -->
                    <td class="py-4 px-2 font-semibold" th:text="${#numbers.formatInteger(sales.totalOrderAmount, 0, 'COMMA')} + '원'"></td>
                    <td class="py-4 px-2 font-semibold text-primary" th:text="${#numbers.formatInteger(sales.totalSalesAmount, 0, 'COMMA')} + '원'"></td>
                </tr>
                </tbody>
            </table>
        </div>

        <div class="mt-lg flex justify-center items-center gap-md" th:if="${totalPages > 0}">
            <a th:href="@{/admin/shop/sales(periodType=${currentPeriod}, page=${currentPage - 1})}"
               th:classappend="${currentPage == 0} ? 'pointer-events-none opacity-50' : ''"
               class="px-3 py-1.5 rounded border border-outline-variant text-label-sm text-on-surface-variant hover:bg-surface-container-high transition-colors block">
                이전
            </a>

            <div class="flex gap-1" th:with="start=${(currentPage/5)*5}, end=${(start + 4 < totalPages) ? start + 4 : totalPages - 1}">
                <a th:each="pageNo : ${#numbers.sequence(start, end)}"
                   th:href="@{/admin/shop/sales(periodType=${currentPeriod}, page=${pageNo})}"
                   th:text="${pageNo + 1}"
                   th:classappend="${pageNo == currentPage} ? 'bg-primary text-on-primary font-bold' : 'text-on-surface-variant hover:bg-surface-container-high'"
                   class="w-8 h-8 flex items-center justify-center rounded text-label-md transition-colors block">
                    1
                </a>
            </div>

            <a th:href="@{/admin/shop/sales(periodType=${currentPeriod}, page=${currentPage + 1})}"
               th:classappend="${currentPage + 1 >= totalPages} ? 'pointer-events-none opacity-50' : ''"
               class="px-3 py-1.5 rounded border border-outline-variant text-label-sm text-on-surface-variant hover:bg-surface-container-high transition-colors block">
                다음
            </a>
        </div>

    </div>
</main>

<script th:inline="javascript">
    function changePeriod(value) {
        // 타임리프 문법을 사용해 스프링 부트가 인식하는 정확한 절대 경로를 주입합니다.
        const baseUrl = [[@{/admin/shop/sales}]];
        location.href = baseUrl + '?periodType=' + value + '&page=0';
    }

    function toggleAccordion(button) {
        const menuItem = button.closest('.group\\/menu');
        if (!menuItem) return;
        const isActive = menuItem.classList.contains('menu-item-active');
        if (isActive) {
            menuItem.classList.remove('menu-item-active');
        } else {
            document.querySelectorAll('.menu-item-active').forEach(item => {
                if (item !== menuItem) item.classList.remove('menu-item-active');
            });
            menuItem.classList.add('menu-item-active');
        }
    }
</script>
<script th:src="@{/js/auth-nav.js}" src="/k_market/js/auth-nav.js"></script>
<script th:src="@{/js/admin-navigation.js}" src="/js/admin-navigation.js"></script>
</body>
</html>
