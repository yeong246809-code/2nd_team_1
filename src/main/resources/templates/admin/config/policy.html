<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>K-market Admin - 약관관리</title>
    <link href="https://fonts.googleapis.com" rel="preconnect"/>
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .menu-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-in-out, opacity 0.2s ease-in-out, padding 0.3s ease-in-out;
            opacity: 0;
        }
        .menu-item-active .menu-content {
            max-height: 500px;
            opacity: 1;
            padding-top: 4px;
            padding-bottom: 8px;
        }
        .chevron-icon {
            transition: transform 0.3s ease;
        }
        .menu-item-active .chevron-icon {
            transform: rotate(180deg);
        }
        /* 커스텀 스크롤바 (선택사항) */
        textarea::-webkit-scrollbar {
            width: 8px;
        }
        textarea::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        textarea::-webkit-scrollbar-thumb {
            background: #c1c7ca;
            border-radius: 4px;
        }
        textarea::-webkit-scrollbar-thumb:hover {
            background: #a8b0b3;
        }
    </style>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "secondary-container": "#c0ecdc",
                        "surface-container-highest": "#e1e3e4",
                        "primary-fixed": "#c8e8f2",
                        "on-error": "#ffffff",

                        "on-surface": "#191c1d",
                        "on-secondary": "#ffffff",
                        "tertiary-fixed": "#ffdcc7",
                        "surface-bright": "#f8f9fa",
                        "surface-container-lowest": "#ffffff",
                        "primary-container": "#2c4a52",
                        "error-container": "#ffdad6",
                        "primary": "#14333b",
                        "on-tertiary-fixed-variant": "#5f402b",
                        "on-secondary-fixed": "#002018",
                        "background": "#f8f9fa",
                        "secondary-fixed": "#c0ecdc",
                        "tertiary-fixed-dim": "#eabda2",
                        "secondary": "#3e6659",
                        "error": "#ba1a1a",
                        "primary-fixed-dim": "#acccd5",
                        "on-secondary-fixed-variant": "#264e42",
                        "tertiary": "#452916",
                        "surface": "#f8f9fa",
                        "on-tertiary": "#ffffff",
                        "on-primary-container": "#99b9c2",
                        "inverse-primary": "#acccd5",
                        "surface-container-low": "#f3f4f5",
                        "on-tertiary-container": "#d6ab90",
                        "on-primary-fixed": "#001f26",
                        "surface-tint": "#45636b",
                        "tertiary-container": "#5e3f2a",
                        "on-error-container": "#93000a",
                        "secondary-fixed-dim": "#a5d0c0",
                        "on-primary": "#ffffff",
                        "on-tertiary-fixed": "#2d1605",
                        "on-background": "#191c1d",
                        "on-secondary-container": "#446c5f",
                        "outline": "#72787a",
                        "outline-variant": "#c1c7ca",
                        "on-surface-variant": "#41484a",
                        "inverse-on-surface": "#f0f1f2",
                        "on-primary-fixed-variant": "#2d4b53",
                        "surface-variant": "#e1e3e4",
                        "surface-dim": "#d9dadb",
                        "surface-container": "#edeeef",
                        "surface-container-high": "#e7e8e9",
                        "policy-bg": "#e6f0f9",
                        "policy-btn": "#8faadc",

                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",

                    "spacing": {
                        "margin-mobile": "16px",
                        "base": "8px",
                        "gutter": "24px",
                        "xs": "4px",
                        "sm": "12px",
                        "xl": "80px",
                        "container-max": "1280px",
                        "md": "24px",
                        "lg": "48px"

                    "fontFamily": {

                        "body-lg": ["Be Vietnam Pro"],

                        "label-md": ["Be Vietnam Pro"],
                        "label-sm": ["Be Vietnam Pro"],

</head>
<body class="bg-background text-on-background font-body-md text-body-md antialiased min-h-screen flex">

<!-- Shared Component: SideNavBar -->
<aside class="fixed left-0 top-0 bottom-0 flex flex-col w-64 z-40 bg-surface dark:bg-inverse-surface border-r border-outline-variant overflow-hidden">
    <a class="flex items-center gap-md px-md py-lg border-b border-outline-variant flex-shrink-0 hover:bg-surface-container-low transition-colors" th:href="@{/admin/index}" href="/admin/index" aria-label="관리자 메인으로 이동">

            <span class="material-symbols-outlined">storefront</span>
        </div>
        <div>
            <h2 class="font-headline-md text-headline-md font-bold text-primary dark:text-inverse-primary">K-market Admin</h2>
            <p class="font-label-md text-label-md text-on-surface-variant">관리자 모드</p>
        </div>
    </a>
    <div class="flex-1 overflow-y-auto py-md px-base flex flex-col gap-xs">
        <div class="group/menu">
            <button class="w-full flex items-center justify-between px-4 py-3 text-on-surface-variant hover:bg-surface-container-high rounded-lg transition-colors group" type="button" onclick="toggleAccordion(this)">
                <div class="flex items-center gap-3">
                    <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">store</span>
                    <span class="font-label-md text-label-md">상점 관리</span>

        </div>

                    <span class="material-symbols-outlined">group</span>

            </button>
            <div class="menu-content flex flex-col gap-1 pl-12 pr-4">
                <a class="py-2 text-on-surface-variant hover:text-primary font-label-md transition-colors" th:href="@{/admin/index}" href="/admin/index">회원목록</a>
                <a class="py-2 text-on-surface-variant hover:text-primary font-label-md transition-colors" th:href="@{/admin/index}" href="/admin/index">포인트관리</a>
            </div>
        </div>
        <div class="group/menu">
            <button class="w-full flex items-center justify-between px-4 py-3 text-on-surface-variant hover:bg-surface-container-high rounded-lg transition-colors group" type="button" onclick="toggleAccordion(this)">
                <div class="flex items-center gap-3">
                    <span class="material-symbols-outlined">inventory_2</span>
                    <span class="font-label-md text-label-md">상품 관리</span>
                </div>
                <span class="material-symbols-outlined text-sm chevron-icon">expand_more</span>
            </button>
            <div class="menu-content flex flex-col gap-1 pl-12 pr-4">
                <a class="py-2 text-on-surface-variant hover:text-primary font-label-md transition-colors" th:href="@{/admin/product/list}" href="/admin/product/list">상품목록</a>
                <a class="py-2 text-on-surface-variant hover:text-primary font-label-md transition-colors" th:href="@{/admin/product/register}" href="/admin/product/register">상품등록</a>
            </div>
        </div>
        <div class="group/menu">
            <button class="w-full flex items-center justify-between px-4 py-3 text-on-surface-variant hover:bg-surface-container-high rounded-lg transition-colors group" type="button" onclick="toggleAccordion(this)">
                <div class="flex items-center gap-3">

                    <span class="font-label-md text-label-md">주문 관리</span>
                </div>
                <span class="material-symbols-outlined text-sm chevron-icon">expand_more</span>

            <div class="menu-content flex flex-col gap-1 pl-12 pr-4">
                <a class="py-2 text-on-surface-variant hover:text-primary font-label-md transition-colors" th:href="@{/admin/shop/sales}" href="/admin/shop/sales">주문현황</a>

            </div>
        </div>
        <div class="group/menu">
            <button class="w-full flex items-center justify-between px-4 py-3 text-on-surface-variant hover:bg-surface-container-high rounded-lg transition-colors group" type="button" onclick="toggleAccordion(this)">
                <div class="flex items-center gap-3">
                    <span class="material-symbols-outlined">confirmation_number</span>

            </button>
            <div class="menu-content flex flex-col gap-1 pl-12 pr-4">
                <a class="py-2 text-on-surface-variant hover:text-primary font-label-md transition-colors" th:href="@{/admin/index}" href="/admin/index">쿠폰목록</a>
                <a class="py-2 text-on-surface-variant hover:text-primary font-label-md transition-colors" th:href="@{/admin/index}" href="/admin/index">쿠폰발급현황</a>

    <div class="border-t border-outline-variant p-base flex flex-col gap-xs flex-shrink-0">

            <span class="font-label-md text-label-md">시스템 로그</span>

        </a>

<header class="fixed top-0 right-0 left-64 h-16 flex items-center justify-end px-6 z-30 bg-surface border-b border-outline-variant">
    <div class="flex items-center gap-4">
        <a href="/" class="text-sm text-on-surface-variant hover:text-primary">홈</a>
        <a th:href="@{/member/logout}" class="text-sm text-on-surface-variant hover:text-primary">로그아웃</a>
        <a href="#" class="text-sm text-on-surface-variant hover:text-primary">고객센터</a>
    </div>
</header>

<main class="ml-64 mt-16 p-8 flex-1 w-full bg-white">

    <div class="flex justify-between items-end border-b-2 border-black pb-3 mb-8">
        <h1 class="text-2xl font-bold text-black">약관관리</h1>
        <div class="text-sm text-gray-500 font-medium">
            HOME > 환경설정 > <strong class="text-black">약관관리</strong>
        </div>
    </div>

    <div class="flex flex-col gap-10 max-w-[1000px]">

        <section th:each="p : ${policyList}">
            <div class="flex items-center gap-2 mb-3">
                <div class="w-6 h-6 rounded-full bg-red-600 text-white flex items-center justify-center font-bold text-sm" th:text="${p.id}"></div>
                <h3 class="text-lg font-bold text-black" th:text="${p.policyType}">약관 제목</h3>
            </div>

            <div class="bg-gray-100 px-4 py-3 mb-2 text-sm text-gray-700">
                회원가입 및 정책 페이지 노출 약관 입니다.
            </div>

            <form th:action="@{/admin/config/policy/update}" method="post">
                <input type="hidden" name="id" th:value="${p.id}" />

                <div class="flex border border-gray-300 mb-2">
                    <div class="w-32 bg-policy-bg flex items-center justify-center font-bold text-gray-700 border-r border-gray-300">
                        약관내용
                    </div>
                    <div class="flex-1">
                    <textarea name="content"
                              class="w-full h-40 border-none p-4 resize-y focus:ring-0 text-sm"
                              th:text="${p.content}"></textarea>
                    </div>
                </div>

                <div class="text-right">
                    <button type="submit"
                            class="bg-policy-btn hover:bg-policy-btn-hover text-white px-6 py-2 text-sm transition-colors">
                        수정하기
                    </button>
                </div>
            </form>
        </section>

    </div>
</main>

<script>
    function toggleAccordion(button) {
        const menuItem = button.closest('.group\\/menu');
        if (!menuItem) return;

        const isActive = menuItem.classList.contains('menu-item-active');

        if (isActive) {
            menuItem.classList.remove('menu-item-active');
        } else {
            document.querySelectorAll('.menu-item-active').forEach(item => {
                if (item !== menuItem) {
                    item.classList.remove('menu-item-active');
                }
            });
            menuItem.classList.add('menu-item-active');
        }
    }
</script>
<script th:src="@{/js/admin-navigation.js}" src="/js/admin-navigation.js"></script>
</body>
</html>
