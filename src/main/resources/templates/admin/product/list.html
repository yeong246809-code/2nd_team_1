<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>K-market Admin Dashboard - 상품목록</title>
    <link href="https://fonts.googleapis.com" rel="preconnect"/>
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600&amp;family=Plus+Jakarta+Sans:wght@600;700;800&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        /* Accordion Smooth Animation */
        .menu-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-in-out, opacity 0.2s ease-in-out, padding 0.3s ease-in-out;
            opacity: 0;
        }
        .menu-item-active .menu-content {
            max-height: 500px;
            opacity: 1;
            padding-top: 4px;
            padding-bottom: 8px;
        }
        .chevron-icon {
            transition: transform 0.3s ease;
        }
        .menu-item-active .chevron-icon {
            transform: rotate(180deg);
        }
    </style>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "secondary-container": "#c0ecdc", "surface-container-highest": "#e1e3e4", "primary-fixed": "#c8e8f2", "on-error": "#ffffff",
                        "inverse-surface": "#2e3132", "on-surface": "#191c1d", "on-secondary": "#ffffff", "tertiary-fixed": "#ffdcc7",
                        "surface-bright": "#f8f9fa", "surface-container-lowest": "#ffffff", "primary-container": "#2c4a52", "error-container": "#ffdad6",
                        "primary": "#14333b", "on-tertiary-fixed-variant": "#5f402b", "on-secondary-fixed": "#002018", "background": "#f8f9fa",
                        "secondary-fixed": "#c0ecdc", "tertiary-fixed-dim": "#eabda2", "secondary": "#3e6659", "error": "#ba1a1a",
                        "primary-fixed-dim": "#acccd5", "on-secondary-fixed-variant": "#264e42", "tertiary": "#452916", "surface": "#f8f9fa",
                        "on-tertiary": "#ffffff", "on-primary-container": "#99b9c2", "inverse-primary": "#acccd5", "surface-container-low": "#f3f4f5",
                        "on-tertiary-container": "#d6ab90", "on-primary-fixed": "#001f26", "surface-tint": "#45636b", "tertiary-container": "#5e3f2a",
                        "on-error-container": "#93000a", "secondary-fixed-dim": "#a5d0c0", "on-primary": "#ffffff", "on-tertiary-fixed": "#2d1605",
                        "on-background": "#191c1d", "on-secondary-container": "#446c5f", "outline": "#72787a", "outline-variant": "#c1c7ca",
                        "on-surface-variant": "#41484a", "inverse-on-surface": "#f0f1f2", "on-primary-fixed-variant": "#2d4b53", "surface-variant": "#e1e3e4",
                        "surface-dim": "#d9dadb", "surface-container": "#edeeef", "surface-container-high": "#e7e8e9"
                    },
                    "borderRadius": { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                    "spacing": { "margin-mobile": "16px", "base": "8px", "gutter": "24px", "xs": "4px", "sm": "12px", "xl": "80px", "container-max": "1280px", "md": "24px", "lg": "48px" },
                    "fontFamily": { "headline-md": ["Plus Jakarta Sans"], "body-lg": ["Be Vietnam Pro"], "headline-lg-mobile": ["Plus Jakarta Sans"], "display-lg": ["Plus Jakarta Sans"], "body-md": ["Be Vietnam Pro"], "label-md": ["Be Vietnam Pro"], "label-sm": ["Be Vietnam Pro"], "headline-lg": ["Plus Jakarta Sans"] },
                    "fontSize": { "headline-md": ["20px", {"lineHeight": "1.4", "fontWeight": "600"}], "body-lg": ["18px", {"lineHeight": "1.6", "fontWeight": "400"}], "headline-lg-mobile": ["24px", {"lineHeight": "1.3", "fontWeight": "600"}], "display-lg": ["48px", {"lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700"}], "body-md": ["16px", {"lineHeight": "1.6", "fontWeight": "400"}], "label-md": ["14px", {"lineHeight": "1.4", "letterSpacing": "0.01em", "fontWeight": "500"}], "label-sm": ["12px", {"lineHeight": "1.2", "fontWeight": "600"}], "headline-lg": ["32px", {"lineHeight": "1.3", "fontWeight": "600"}] }
                }
            }
        }
    </script>
</head>
<body class="bg-background text-on-background font-body-md text-body-md antialiased min-h-screen flex">

<!-- Shared Component: SideNavBar -->
<div th:replace="~{admin/_layout :: sidebar('product')}"></div>

<div th:replace="~{admin/_layout :: header}"></div>

<main class="ml-64 mt-16 p-lg flex-1 w-full max-w-[1400px] mx-auto">
    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-lg border-b border-outline-variant pb-sm">
        <div class="mb-2 sm:mb-0">
            <h1 class="font-headline-lg text-headline-lg text-on-background">상품현황</h1>
        </div>
        <nav class="text-label-sm text-on-surface-variant">
            <span>HOME</span> &gt; <span>상품관리</span> &gt; <span class="text-primary font-bold">상품목록</span>
        </nav>
    </div>

    <div class="bg-surface-container-lowest rounded-lg border border-outline-variant p-md shadow-sm">
        <div class="mb-md flex flex-wrap items-center justify-between gap-sm border-b border-surface-variant pb-md">
            <form th:action="@{/admin/product/list}" method="get" class="flex items-center gap-xs flex-wrap">
                <input type="hidden" name="sort" th:value="${sort}"/>
                <div class="relative inline-block w-36">
                    <select name="searchType" class="w-full bg-surface border border-outline border-outline-variant rounded-lg px-3 py-2 text-body-md text-on-surface-variant focus:outline-none focus:border-primary appearance-none cursor-pointer pr-8">
                        <option value="name" th:selected="${searchType == 'name'}">상품명</option>
                        <option value="shopName" th:selected="${searchType == 'shopName'}">상호명</option>
                        <option value="category" th:selected="${searchType == 'category'}">카테고리</option>
                    </select>
                    <span class="material-symbols-outlined absolute right-2 top-2.5 pointer-events-none text-on-surface-variant text-md">expand_more</span>
                </div>
                <input type="text" name="keyword" th:value="${keyword}" placeholder="키워드 입력" class="border border-outline-variant bg-surface rounded-lg px-3 py-2 text-body-md w-64 focus:outline-none focus:border-primary"/>
                <button type="submit" class="bg-primary-container text-on-primary-container px-4 py-2 rounded-lg font-label-md hover:bg-primary hover:text-white transition-colors">검색</button>
            </form>

            <div class="flex items-center gap-2">
                <div class="relative inline-block w-44">
                    <select id="sortSelect" onchange="changeSort(this.value)" class="w-full bg-surface border border-outline-variant rounded-lg px-3 py-2 text-body-md text-on-surface-variant focus:outline-none focus:border-primary appearance-none cursor-pointer pr-8">
                        <option value="latest" th:selected="${sort == 'latest'}">등록일 최신순</option>
                        <option value="oldest" th:selected="${sort == 'oldest'}">등록일 오래된순</option>
                        <option value="priceAsc" th:selected="${sort == 'priceAsc'}">판매가 낮은순</option>
                        <option value="priceDesc" th:selected="${sort == 'priceDesc'}">판매가 높은순</option>
                        <option value="salesDesc" th:selected="${sort == 'salesDesc'}">판매량 높은순</option>
                        <option value="salesAsc" th:selected="${sort == 'salesAsc'}">판매량 낮은순</option>
                    </select>
                    <span class="material-symbols-outlined absolute right-2 top-2.5 pointer-events-none text-on-surface-variant text-md">expand_more</span>
                </div>

                <a th:href="@{/admin/product/register}" class="bg-primary text-on-primary px-4 py-2 rounded-lg font-label-md flex items-center gap-1 transition-transform active:scale-95 whitespace-nowrap">
                    <span class="material-symbols-outlined text-sm">add</span>상품등록
                </a>
            </div>
        </div>

        <div class="overflow-x-auto">
            <table class="w-full border-collapse text-center">
                <thead>
                <tr class="border-b border-outline-variant bg-surface-container text-on-background font-label-md text-label-md">
                    <th class="py-4 px-2 font-bold w-12"><input type="checkbox" id="selectAll" class="rounded text-primary focus:ring-primary"/></th>
                    <th class="py-4 px-2 font-bold">사진</th>
                    <th class="py-4 px-2 font-bold">상품코드</th>
                    <th class="py-4 px-2 font-bold">상품명</th>
                    <th class="py-4 px-2 font-bold">판매가격</th>
                    <th class="py-4 px-2 font-bold">할인율</th>
                    <th class="py-4 px-2 font-bold">포인트</th>
                    <th class="py-4 px-2 font-bold">재고</th>
                    <th class="py-4 px-2 font-bold">상호명</th>
                    <th class="py-4 px-2 font-bold">조회</th>
                    <th class="py-4 px-2 font-bold">판매량</th>
                    <th class="py-4 px-2 font-bold w-24">관리</th>
                </tr>
                </thead>
                <tbody class="text-body-md text-on-surface-variant divide-y divide-surface-variant">
                <tr th:if="${#lists.isEmpty(productList)}">
                    <td colspan="12" class="py-8 text-center text-outline">등록된 상품 데이터가 없습니다.</td>
                </tr>
                <tr th:unless="${#lists.isEmpty(productList)}" th:each="product : ${productList}">
                    <td class="py-4 px-2"><input type="checkbox" name="chkProduct" th:value="${product.prodNo}" class="rounded text-primary focus:ring-primary"/></td>
                    <td class="py-2 px-2 flex justify-center">
                        <div class="w-12 h-12 rounded border border-outline-variant bg-surface-container overflow-hidden flex items-center justify-center">
                            <img th:if="${product.thumb1 != null && product.thumb1 != ''}" th:src="${product.thumb1}" th:alt="${product.name + ' 상품 이미지'}" class="w-full h-full object-cover"/>
                            <span th:if="${product.thumb1 == null || product.thumb1 == ''}" class="material-symbols-outlined text-outline text-xl">image</span>
                        </div>
                    </td>
                    <td class="py-4 px-2" th:text="${product.prodNo}"></td>
                    <td class="py-4 px-2 font-bold text-primary text-left max-w-xs truncate" th:text="${product.name}"></td>
                    <td class="py-4 px-2 font-semibold" th:text="${#numbers.formatInteger(product.price, 0, 'COMMA')} + '원'"></td>
                    <td class="py-4 px-2 text-error font-bold" th:text="${product.discountRate != null && product.discountRate > 0} ? ${product.discountRate} + '%' : '-'"></td>
                    <td class="py-4 px-2" th:text="${#numbers.formatInteger(product.rewardPoints, 0, 'COMMA')}"></td>
                    <td class="py-4 px-2" th:text="${#numbers.formatInteger(product.stockQuantity, 0, 'COMMA')}"></td>
                    <td class="py-4 px-2 font-medium text-on-surface" th:text="${shopNameMap[product.shopNo] != null ? shopNameMap[product.shopNo] : '상점정보없음'}"></td>
                    <td class="py-4 px-2" th:text="${#numbers.formatInteger(product.viewCount, 0, 'COMMA')}"></td>
                    <td class="py-4 px-2 font-bold text-secondary" th:text="${#numbers.formatInteger(product.salesCount, 0, 'COMMA')}"></td>
                    <td class="py-4 px-2 text-sm">
                        <div class="flex flex-col gap-1 items-center">
                            <button class="text-error hover:underline text-xs" th:onclick="'deleteProduct(' + ${product.prodNo} + ')'">[삭제]</button>
                            <a th:href="@{/admin/product/modify/{id}(id=${product.prodNo})}" class="text-on-surface-variant hover:text-primary text-xs">[수정]</a>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <div class="mt-lg flex flex-col sm:flex-row items-center justify-between gap-md">
            <button onclick="deleteSelected()" class="bg-error-container text-on-error-container border border-error px-4 py-2 rounded-lg font-label-md hover:bg-error hover:text-white transition-colors w-full sm:w-auto">선택삭제</button>

            <div class="flex justify-center items-center gap-md" th:if="${pageResponse != null && pageResponse.total > 0}">
                <a th:href="@{/admin/product/list(page=${pageResponse.prevPage}, searchType=${searchType}, keyword=${keyword}, sort=${sort})}"
                   th:classappend="${!pageResponse.prev} ? 'pointer-events-none opacity-40' : ''"
                   class="px-3 py-1.5 rounded border border-outline-variant text-label-sm text-on-surface-variant hover:bg-surface-container-high transition-colors block">
                    이전
                </a>

                <div class="flex gap-1">
                    <a th:each="pageNo : ${#numbers.sequence(pageResponse.startPage, pageResponse.endPage)}"
                       th:href="@{/admin/product/list(page=${pageNo}, searchType=${searchType}, keyword=${keyword}, sort=${sort})}"
                       th:text="${pageNo}"
                       th:classappend="${pageNo == pageResponse.pg} ? 'bg-primary text-on-primary font-bold' : 'text-on-surface-variant hover:bg-surface-container-high'"
                       class="w-8 h-8 flex items-center justify-center rounded text-label-md transition-colors block">
                    </a>
                </div>

                <a th:href="@{/admin/product/list(page=${pageResponse.nextPage}, searchType=${searchType}, keyword=${keyword}, sort=${sort})}"
                   th:classappend="${!pageResponse.next} ? 'pointer-events-none opacity-40' : ''"
                   class="px-3 py-1.5 rounded border border-outline-variant text-label-sm text-on-surface-variant hover:bg-surface-container-high transition-colors block">
                    다음
                </a>
            </div>
            <div class="hidden sm:block w-24"></div>
        </div>
    </div>
</main>

<script th:inline="javascript">
    // 정렬 변경 시 파라미터를 유지하면서 페이지 이동
    function changeSort(sortValue) {
        const urlParams = new URLSearchParams(window.location.search);
        urlParams.set('sort', sortValue);
        urlParams.set('page', '1'); // 정렬을 바꾸면 1페이지로 리셋
        window.location.href = '/admin/product/list?' + urlParams.toString();
    }

    // 기존 체크박스 및 삭제 스크립트 유지
    document.getElementById('selectAll').addEventListener('change', function() {
        const checkboxes = document.getElementsByName('chkProduct');
        checkboxes.forEach((checkbox) => { checkbox.checked = this.checked; });
    });

    function deleteProduct(prodNo) {
        if(confirm(prodNo + "번 상품을 정말로 삭제하시겠습니까?")) {
            fetch('/k_market/admin/product/delete/' + prodNo, { method: 'POST' })
                .then(res => res.json()).then(data => { if(data.success) { alert(data.message); location.reload(); } });
        }
    }

    function deleteSelected() {
        const checkedBoxes = document.querySelectorAll('input[name="chkProduct"]:checked');
        if(checkedBoxes.length === 0) { alert('삭제할 상품을 선택해주세요.'); return; }
        if(confirm('선택한 ' + checkedBoxes.length + '개의 상품을 삭제하시겠습니까?')) {
            const prodNos = Array.from(checkedBoxes).map(box => parseInt(box.value));
            fetch('/k_market/admin/product/deleteSelected', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(prodNos)
            }).then(res => res.json()).then(data => { if(data.success) { alert(data.message); location.reload(); } });
        }
    }

    function toggleAccordion(button) {
        const menuItem = button.closest('.group\\/menu');
        if (!menuItem) return;
        const isActive = menuItem.classList.contains('menu-item-active');
        if (isActive) {
            menuItem.classList.remove('menu-item-active');
        } else {
            document.querySelectorAll('.menu-item-active').forEach(item => {
                if (item !== menuItem) item.classList.remove('menu-item-active');
            });
            menuItem.classList.add('menu-item-active');
        }
    }
</script>
<script th:src="@{/js/admin-navigation.js}" src="/js/admin-navigation.js"></script>
</body>
</html>
