<!DOCTYPE html>

            transition: max-height 0.3s ease-in-out, opacity 0.2s ease-in-out, padding 0.3s ease-in-out;

        .menu-item-active .menu-content {

            padding-top: 4px;
            padding-bottom: 8px;
        }
        .chevron-icon {
            transition: transform 0.3s ease;
        }

<header class="fixed top-0 right-0 left-64 h-16 flex items-center justify-between px-md z-30 bg-surface-container-lowest dark:bg-surface-container-highest border-b border-outline-variant">
    <div class="flex items-center gap-md">
        <h1 class="font-headline-md text-headline-md font-black text-primary dark:text-inverse-primary">K-market Admin Dashboard</h1>
    </div>
</header>

<main class="ml-64 mt-16 p-lg flex-1 w-full max-w-[1400px] mx-auto">
    <div class="mb-lg border-b border-outline-variant pb-sm">
        <h1 class="font-headline-lg text-headline-lg text-on-background">상품등록</h1>
    </div>

    <form th:action="@{/admin/product/register}" th:object="${product}" method="post" enctype="multipart/form-data" class="bg-surface-container-lowest rounded-lg border border-outline-variant p-md shadow-sm">
        <p class="mb-4 rounded-lg border border-error/30 bg-error-container px-4 py-3 text-error font-label-md" th:if="${productError}" th:text="${productError}"></p>

        <div class="mb-8">
            <h2 class="font-bold text-lg mb-4 border-b pb-2">상품분류</h2>
            <div class="grid grid-cols-2 gap-4">
                <select id="cate1" onchange="updateCate2()" class="border-outline-variant rounded-lg" required>
                    <option value="">1차 분류 선택</option>
                    <option th:each="c : ${allCategories}" th:if="${c.depth == 1}"
                            th:value="${c.cateNo}" th:text="${c.name}"></option>
                </select>

                <select id="cate2" name="cateNo" class="border-outline-variant rounded-lg" required>
                    <option value="">2차 분류 선택</option>
                </select>
            </div>

            <script th:inline="javascript">
                const allCategories = /*[[${allCategories}]]*/ [];
                const selectedCateNo = /*[[${product.cateNo}]]*/ null;

                function updateCate2() {
                    const parentNo = document.getElementById('cate1').value;
                    const cate2Select = document.getElementById('cate2');

                    cate2Select.innerHTML = '<option value="">2차 분류 선택</option>';

                    allCategories.filter(c => String(c.parentNo) === String(parentNo)).forEach(c => {
                        const opt = document.createElement('option');
                        opt.value = c.cateNo;
                        opt.text = c.name;
                        if (selectedCateNo && String(c.cateNo) === String(selectedCateNo)) {
                            opt.selected = true;
                        }
                        cate2Select.appendChild(opt);
                    });
                }
            </script>
        </div>

        <div class="mb-8">
            <h2 class="font-bold text-lg mb-4 border-b pb-2">상점 연결</h2>
            <div th:if="${adminUser}" class="space-y-2">
                <select th:field="*{shopNo}" class="w-full border-outline-variant rounded-lg" required>
                    <option value="">상점 선택</option>
                    <option th:each="shop : ${shops}" th:value="${shop.shopNo}" th:text="${shop.shopNo + ' - ' + shop.name}"></option>
                </select>
                <p class="text-label-sm text-error" th:if="${#lists.isEmpty(shops)}">등록된 상점이 없어 상품을 등록할 수 없습니다.</p>
            </div>
            <div th:unless="${adminUser}" class="rounded-lg bg-surface-container-low p-4 border border-outline-variant">
                <input type="hidden" th:field="*{shopNo}"/>
                <p class="font-label-md text-on-surface-variant" th:if="${currentShop != null}" th:text="${currentShop.shopNo + ' - ' + currentShop.name}"></p>
                <p class="font-label-md text-error" th:if="${currentShop == null}">로그인한 판매자와 연결된 상점이 없습니다.</p>
            </div>
        </div>

        <div class="mb-8">
            <h2 class="font-bold text-lg mb-4 border-b pb-2">기본정보</h2>
            <div class="space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <input type="text" th:field="*{name}" placeholder="상품명" class="border-outline-variant rounded-lg" required>
                    <input type="number" th:field="*{price}" placeholder="판매가격" class="border-outline-variant rounded-lg" required min="0">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <input type="number" th:field="*{discountRate}" placeholder="할인율(%)" class="border-outline-variant rounded-lg" min="0">
                    <input type="number" th:field="*{stockQuantity}" placeholder="재고수량" class="border-outline-variant rounded-lg" min="0">
                </div>
                <textarea th:field="*{description}" placeholder="상품 상세 설명" class="w-full border-outline-variant rounded-lg h-32"></textarea>
            </div>
        </div>

        <div class="mb-8">
            <h2 class="font-bold text-lg mb-4 border-b pb-2">상품 이미지</h2>
            <div class="space-y-2">
                <input type="file" name="file1" class="block w-full text-sm border ...">
                <input type="file" name="file2" class="block w-full text-sm border ...">
                <input type="file" name="file3" class="block w-full text-sm border ...">
            </div>
        </div>

        <div class="flex justify-end gap-3 pt-6 border-t">
            <a th:href="@{/admin/product/list}" class="px-6 py-2 bg-surface-variant rounded-lg">취소</a>
            <button type="submit" class="px-6 py-2 bg-primary text-white rounded-lg">상품등록</button>
        </div>
    </form>
</main>

<script>
    function toggleAccordion(button) {
        const menuItem = button.closest('.group\\/menu');
        if (!menuItem) return;
        const isActive = menuItem.classList.contains('menu-item-active');
        if (isActive) {
            menuItem.classList.remove('menu-item-active');
        } else {
            document.querySelectorAll('.menu-item-active').forEach(item => {
                if (item !== menuItem) item.classList.remove('menu-item-active');
            });
            menuItem.classList.add('menu-item-active');
        }
    }
</script>

</body>
</html>
