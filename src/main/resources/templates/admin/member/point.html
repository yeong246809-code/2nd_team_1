<!DOCTYPE html><html lang="ko" xmlns:th="http://www.thymeleaf.org"><head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>K-market Admin Dashboard</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com" rel="preconnect"/>
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600&amp;family=Plus+Jakarta+Sans:wght@600;700;800&amp;display=swap" rel="stylesheet"/>
    <!-- Material Symbols -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .menu-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-in-out, opacity 0.2s ease-in-out, padding 0.3s ease-in-out;
            opacity: 0;
        }
        .menu-item-active .menu-content {
            max-height: 500px;
            opacity: 1;
            padding-top: 4px;
            padding-bottom: 8px;
        }
        .chevron-icon {
            transition: transform 0.3s ease;
        }
        .menu-item-active .chevron-icon {
            transform: rotate(180deg);
        }
    </style>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "secondary-container": "#c0ecdc",
                        "surface-container-highest": "#e1e3e4",
                        "primary-fixed": "#c8e8f2",
                        "on-error": "#ffffff",
                        "inverse-surface": "#2e3132",
                        "on-surface": "#191c1d",
                        "on-secondary": "#ffffff",
                        "tertiary-fixed": "#ffdcc7",
                        "surface-bright": "#f8f9fa",
                        "surface-container-lowest": "#ffffff",
                        "primary-container": "#2c4a52",
                        "error-container": "#ffdad6",
                        "primary": "#14333b",
                        "on-tertiary-fixed-variant": "#5f402b",
                        "on-secondary-fixed": "#002018",
                        "background": "#f8f9fa",
                        "secondary-fixed": "#c0ecdc",
                        "tertiary-fixed-dim": "#eabda2",
                        "secondary": "#3e6659",
                        "error": "#ba1a1a",
                        "primary-fixed-dim": "#acccd5",
                        "on-secondary-fixed-variant": "#264e42",
                        "tertiary": "#452916",
                        "surface": "#f8f9fa",
                        "on-tertiary": "#ffffff",
                        "on-primary-container": "#99b9c2",
                        "inverse-primary": "#acccd5",
                        "surface-container-low": "#f3f4f5",
                        "on-tertiary-container": "#d6ab90",
                        "on-primary-fixed": "#001f26",
                        "surface-tint": "#45636b",
                        "tertiary-container": "#5e3f2a",
                        "on-error-container": "#93000a",
                        "secondary-fixed-dim": "#a5d0c0",
                        "on-primary": "#ffffff",
                        "on-tertiary-fixed": "#2d1605",
                        "on-background": "#191c1d",
                        "on-secondary-container": "#446c5f",
                        "outline": "#72787a",
                        "outline-variant": "#c1c7ca",
                        "on-surface-variant": "#41484a",
                        "inverse-on-surface": "#f0f1f2",
                        "on-primary-fixed-variant": "#2d4b53",
                        "surface-variant": "#e1e3e4",
                        "surface-dim": "#d9dadb",
                        "surface-container": "#edeeef",
                        "surface-container-high": "#e7e8e9"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "margin-mobile": "16px",
                        "base": "8px",
                        "gutter": "24px",
                        "xs": "4px",
                        "sm": "12px",
                        "xl": "80px",
                        "container-max": "1280px",
                        "md": "24px",
                        "lg": "48px"
                    },
                    "fontFamily": {
                        "headline-md": ["Plus Jakarta Sans"],
                        "body-lg": ["Be Vietnam Pro"],
                        "headline-lg-mobile": ["Plus Jakarta Sans"],
                        "display-lg": ["Plus Jakarta Sans"],
                        "body-md": ["Be Vietnam Pro"],
                        "label-md": ["Be Vietnam Pro"],
                        "label-sm": ["Be Vietnam Pro"],
                        "headline-lg": ["Plus Jakarta Sans"]
                    },
                    "fontSize": {
                        "headline-md": ["20px", {"lineHeight": "1.4", "fontWeight": "600"}],
                        "body-lg": ["18px", {"lineHeight": "1.6", "fontWeight": "400"}],
                        "headline-lg-mobile": ["24px", {"lineHeight": "1.3", "fontWeight": "600"}],
                        "display-lg": ["48px", {"lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "body-md": ["16px", {"lineHeight": "1.6", "fontWeight": "400"}],
                        "label-md": ["14px", {"lineHeight": "1.4", "letterSpacing": "0.01em", "fontWeight": "500"}],
                        "label-sm": ["12px", {"lineHeight": "1.2", "fontWeight": "600"}],
                        "headline-lg": ["32px", {"lineHeight": "1.3", "fontWeight": "600"}]
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-background text-on-background font-body-md text-body-md antialiased min-h-screen flex">
<!-- Shared Component: SideNavBar -->
<div th:replace="~{admin/_layout :: sidebar('member')}"></div>
<!-- Shared Component: TopAppBar -->
<div th:replace="~{admin/_layout :: header}"></div>
<!-- Main Canvas -->
<main class="ml-64 mt-16 p-lg flex-1 w-full max-w-[1400px] mx-auto">

    <div class="flex justify-between items-end mb-lg border-b border-outline-variant pb-2">
        <h1 class="font-headline-lg text-headline-lg font-bold text-on-background">포인트관리</h1>
        <div class="font-label-sm text-on-surface-variant">
            HOME > 회원관리 > <span class="text-primary font-bold">포인트관리</span>
        </div>
    </div>

    <section class="bg-surface-container-lowest rounded-lg border border-outline-variant p-md mb-md">
        <form th:action="@{/admin/member/point}" method="get" class="flex gap-2 items-center">
            <select name="searchType" class="border border-outline-variant rounded p-2 text-sm focus:ring-primary focus:border-primary pr-8">
                <option value="id" th:selected="${searchType == 'id'}">아이디</option>
                <option value="name" th:selected="${searchType == 'name'}">이름</option>
            </select>
            <input type="text" name="keyword" th:value="${keyword}" placeholder="검색어 입력" class="border border-outline-variant rounded p-2 text-sm w-64 focus:ring-primary focus:border-primary">
            <button type="submit" class="bg-gray-400 hover:bg-gray-500 text-white font-label-md px-4 py-2 rounded transition-colors">검색</button>
        </form>
    </section>

    <section class="bg-surface-container-lowest rounded-lg border border-outline-variant p-md">
        <form id="deleteForm" th:action="@{/admin/member/point/delete}" method="post">
            <input type="hidden" name="searchType" th:value="${searchType}">
            <input type="hidden" name="keyword" th:value="${keyword}">
            <input type="hidden" name="page" th:value="${pageData != null ? pageData.pg : 1}">

            <table class="w-full text-center border-collapse">
                <thead class="bg-surface border-b border-t border-outline-variant font-label-md text-on-surface-variant">
                <tr>
                    <th class="p-3 w-12"><input type="checkbox" id="selectAll" class="rounded text-primary"></th>
                    <th class="p-3 w-16">번호</th>
                    <th class="p-3">아이디</th>
                    <th class="p-3">이름</th>
                    <th class="p-3">지급 포인트</th>
                    <th class="p-3">잔여 포인트</th>
                    <th class="p-3">지급 내용</th>
                    <th class="p-3">지급 날짜</th>
                </tr>
                </thead>
                <tbody class="font-body-md text-on-background">
                <tr th:each="point : ${pointList}" class="border-b border-surface-variant hover:bg-surface-container-low transition-colors">
                    <td class="p-3 text-center">
                        <input type="checkbox" name="selectedPointNos" th:value="${point.pointNo}" class="rounded text-primary pointCheckbox">
                    </td>
                    <td class="p-3 font-bold" th:text="${point.pointNo}">5</td>
                    <td class="p-3" th:text="${point.id}">abc1234</td>
                    <td class="p-3" th:text="${point.name}">정우성</td>
                    <td class="p-3" th:text="${#numbers.formatInteger(point.amount, 0, 'COMMA')}">1,000</td>
                    <td class="p-3" th:text="${#numbers.formatInteger(point.remainedAmount, 0, 'COMMA')}">15,000</td>
                    <td class="p-3 text-sm text-gray-600" th:text="${point.description}">구매확정 포인트 지급</td>
                    <td class="p-3 text-sm text-on-surface-variant" th:text="${#temporals.format(point.createdAt, 'yyyy-MM-dd HH:mm:ss')}">2023-01-01 00:00:00</td>
                </tr>

                <tr th:if="${pointList == null or pointList.isEmpty()}">
                    <td colspan="8" class="p-8 text-center text-on-surface-variant">조회된 포인트 내역이 없습니다.</td>
                </tr>
                </tbody>
            </table>

            <div class="flex justify-between items-center mt-4">
                <button type="button" onclick="submitDeleteForm()" class="bg-[#b5b5b5] hover:bg-gray-500 text-white font-label-md px-6 py-2 rounded transition-colors shadow-sm">선택삭제</button>

                <div th:replace="~{fragments/_pagination :: pagination(${pageData}, '/admin/member/point?searchType=' + ${searchType} + '&keyword=' + ${keyword})}"></div>

                <div class="w-[88px]"></div>
            </div>
        </form>
    </section>
</main>
<script th:inline="javascript">
    // 전체 선택 체크박스 동작
    document.getElementById('selectAll').addEventListener('change', function() {
        const checkboxes = document.querySelectorAll('.pointCheckbox');
        checkboxes.forEach(cb => cb.checked = this.checked);
    });

    // 선택 삭제 폼 제출
    function submitDeleteForm() {
        const checked = document.querySelectorAll('.pointCheckbox:checked');
        if(checked.length === 0) {
            alert('삭제할 포인트 내역을 선택해주세요.');
            return;
        }

        if(confirm('선택하신 포인트 내역을 삭제하시겠습니까?\n(해당 내역은 삭제되며, 지급되었던 포인트는 회원 데이터에서 차감/회수됩니다.)')) {
            // 확인을 누르면 폼이 서버의 /admin/member/point/delete 로 제출됩니다.
            document.getElementById('deleteForm').submit();
        }
    }
</script>
<script th:src="@{/js/admin-navigation.js}" src="/js/admin-navigation.js"></script>
</body>
</html>
