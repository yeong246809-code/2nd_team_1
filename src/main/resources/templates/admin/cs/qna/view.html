<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관리자 QNA 상세 | K-market</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Noto Sans KR', Arial, sans-serif; background: #f5f6f8; color: #333; font-size: 14px; }
        a { color: inherit; text-decoration: none; }
        .admin-wrap { min-height: 100vh; display: flex; flex-direction: column; }
        .admin-header { height: 64px; background: #263238; color: #fff; display: flex; align-items: center; justify-content: space-between; padding: 0 32px; }
        .admin-header h1 { font-size: 22px; font-weight: 700; }
        .admin-header nav { display: flex; gap: 20px; font-size: 13px; color: #dfe6e9; }
        .admin-container { flex: 1; display: flex; max-width: 1280px; width: 100%; margin: 0 auto; padding: 24px; gap: 24px; }
        .admin-aside { width: 220px; background: #fff; border: 1px solid #e1e4e8; border-radius: 8px; padding: 18px 0; height: fit-content; }
        .admin-aside h2 { font-size: 16px; padding: 0 20px 14px; border-bottom: 1px solid #eceff1; color: #222; }
        .admin-aside a { display: block; padding: 12px 20px; color: #555; font-size: 14px; }
        .admin-aside a:hover, .admin-aside a.active { background: #f1f8e9; color: #2e7d32; font-weight: 700; }
        .admin-content { flex: 1; background: #fff; border: 1px solid #e1e4e8; border-radius: 8px; padding: 28px; }
        .page-head { margin-bottom: 20px; padding-bottom: 16px; border-bottom: 2px solid #333; }
        .page-head h2 { font-size: 24px; color: #222; }
        .page-head p { margin-top: 6px; color: #777; font-size: 13px; }
        .view-table { width: 100%; border-collapse: collapse; border-top: 1px solid #555; }
        .view-table th, .view-table td { border-bottom: 1px solid #e5e8eb; padding: 14px; vertical-align: top; }
        .view-table th { width: 150px; background: #fafafa; text-align: left; font-weight: 700; }
        .content-box { min-height: 180px; line-height: 1.8; white-space: pre-line; }
        .answer-area { margin-top: 28px; border-top: 2px solid #333; padding-top: 20px; }
        .answer-area h3 { font-size: 18px; margin-bottom: 12px; }
        textarea { width: 100%; min-height: 180px; border: 1px solid #ccd1d5; border-radius: 4px; padding: 12px; font-size: 14px; font-family: inherit; line-height: 1.7; resize: vertical; }
        .btn-area { display: flex; justify-content: flex-end; gap: 8px; margin-top: 22px; }
        .btn { display: inline-flex; align-items: center; justify-content: center; min-width: 90px; height: 38px; padding: 0 16px; border: 1px solid #bbb; background: #fff; border-radius: 4px; font-size: 13px; cursor: pointer; }
        .btn-primary { background: #2e7d32; color: #fff; border-color: #2e7d32; }
        .btn-danger { background: #fff; color: #c62828; border-color: #ef9a9a; }
        .admin-footer { height: 54px; display: flex; align-items: center; justify-content: center; color: #888; font-size: 12px; }
    </style>
</head>
<body>
<div class="admin-wrap">
    <header class="admin-header">
        <h1><a th:href="@{/admin}">K-market Admin</a></h1>
        <nav>
            <a th:href="@{/}">쇼핑몰 홈</a>
            <a th:href="@{/admin/cs/notice/list}">고객센터 관리</a>
            <a th:href="@{/member/logout}">Logout</a>
        </nav>
    </header>

    <div class="admin-container">
        <aside class="admin-aside">
            <h2>고객센터 관리</h2>
            <a th:href="@{/admin/cs/notice/list}">공지사항</a>
            <a th:href="@{/admin/cs/faq/list}">자주묻는 질문</a>
            <a class="active" th:href="@{/admin/cs/qna/list}">1:1 문의</a>
        </aside>

        <main class="admin-content">
            <div class="page-head">
                <h2>1:1 문의 상세</h2>
                <p>사용자의 문의 내용을 확인하고 답변을 등록합니다.</p>
            </div>

            <table class="view-table">
                <tr>
                    <th>분류</th>
                    <td th:text="${qna.type}">배송</td>
                </tr>
                <tr>
                    <th>제목</th>
                    <td th:text="${qna.title}">문의 제목입니다.</td>
                </tr>
                <tr>
                    <th>작성자</th>
                    <td th:text="${qna.writer}">user01</td>
                </tr>
                <tr>
                    <th>작성일</th>
                    <td th:text="${#temporals.format(qna.createdAt, 'yyyy-MM-dd HH:mm')}">2026-07-08 10:00</td>
                </tr>
                <tr>
                    <th>문의내용</th>
                    <td><div class="content-box" th:text="${qna.content}">문의 내용입니다.</div></td>
                </tr>
            </table>

            <section class="answer-area">
                <h3>관리자 답변</h3>
                <form th:action="@{/admin/cs/qna/answer/{no}(no=${qna.no})}" method="post">
                    <textarea name="answer" placeholder="답변 내용을 입력하세요." th:text="${qna.answer}"></textarea>
                    <div class="btn-area">
                        <a class="btn" th:href="@{/admin/cs/qna/list}">목록</a>
                        <a class="btn btn-danger" th:if="${qna.answer != null && !#strings.isEmpty(qna.answer)}" th:href="@{/admin/cs/qna/answer/delete/{no}(no=${qna.no})}" onclick="return confirm('답변을 삭제하시겠습니까?');">답변삭제</a>
                        <button type="submit" class="btn btn-primary" th:text="${qna.answer != null && !#strings.isEmpty(qna.answer) ? '답변수정' : '답변등록'}">답변등록</button>
                    </div>
                </form>
            </section>
        </main>
    </div>

    <footer class="admin-footer">Copyright © K-market Admin. All rights reserved.</footer>
</div>
</body>
</html>
