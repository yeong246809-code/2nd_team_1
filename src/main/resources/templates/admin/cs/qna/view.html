<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>K-market Admin - 관리자 QNA 상세</title>
    <link href="https://fonts.googleapis.com" rel="preconnect"/>
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600&amp;family=Plus+Jakarta+Sans:wght@600;700;800&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .menu-content { max-height: 0; overflow: hidden; transition: max-height 0.3s ease-in-out, opacity 0.2s ease-in-out, padding 0.3s ease-in-out; opacity: 0; }
        .menu-item-active .menu-content { max-height: 500px; opacity: 1; padding-top: 4px; padding-bottom: 8px; }
        .chevron-icon { transition: transform 0.3s ease; }
        .menu-item-active .chevron-icon { transform: rotate(180deg); }
    </style>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: { extend: {
                    colors: {
                        "secondary-container": "#c0ecdc", "surface-container-highest": "#e1e3e4", "primary-fixed": "#c8e8f2", "on-error": "#ffffff", "inverse-surface": "#2e3132", "on-surface": "#191c1d", "on-secondary": "#ffffff", "tertiary-fixed": "#ffdcc7", "surface-bright": "#f8f9fa", "surface-container-lowest": "#ffffff", "primary-container": "#2c4a52", "error-container": "#ffdad6", "primary": "#14333b", "on-tertiary-fixed-variant": "#5f402b", "on-secondary-fixed": "#002018", "background": "#f8f9fa", "secondary-fixed": "#c0ecdc", "tertiary-fixed-dim": "#eabda2", "secondary": "#3e6659", "error": "#ba1a1a", "primary-fixed-dim": "#acccd5", "on-secondary-fixed-variant": "#264e42", "tertiary": "#452916", "surface": "#f8f9fa", "on-tertiary": "#ffffff", "on-primary-container": "#99b9c2", "inverse-primary": "#acccd5", "surface-container-low": "#f3f4f5", "on-tertiary-container": "#d6ab90", "on-primary-fixed": "#001f26", "surface-tint": "#45636b", "tertiary-container": "#5e3f2a", "on-error-container": "#93000a", "secondary-fixed-dim": "#a5d0c0", "on-primary": "#ffffff", "on-tertiary-fixed": "#2d1605", "on-background": "#191c1d", "on-secondary-container": "#446c5f", "outline": "#72787a", "outline-variant": "#c1c7ca", "on-surface-variant": "#41484a", "inverse-on-surface": "#f0f1f2", "on-primary-fixed-variant": "#2d4b53", "surface-variant": "#e1e3e4", "surface-dim": "#d9dadb", "surface-container": "#edeeef", "surface-container-high": "#e7e8e9"
                    },
                    borderRadius: { DEFAULT: "0.25rem", lg: "0.5rem", xl: "0.75rem", full: "9999px" },
                    spacing: { "margin-mobile": "16px", base: "8px", gutter: "24px", xs: "4px", sm: "12px", xl: "80px", "container-max": "1280px", md: "24px", lg: "48px" },
                    fontFamily: { "headline-md": ["Plus Jakarta Sans"], "body-lg": ["Be Vietnam Pro"], "headline-lg-mobile": ["Plus Jakarta Sans"], "display-lg": ["Plus Jakarta Sans"], "body-md": ["Be Vietnam Pro"], "label-md": ["Be Vietnam Pro"], "label-sm": ["Be Vietnam Pro"], "headline-lg": ["Plus Jakarta Sans"] },
                    fontSize: { "headline-md": ["20px", {lineHeight:"1.4", fontWeight:"600"}], "body-lg": ["18px", {lineHeight:"1.6", fontWeight:"400"}], "headline-lg-mobile": ["24px", {lineHeight:"1.3", fontWeight:"600"}], "display-lg": ["48px", {lineHeight:"1.2", letterSpacing:"-0.02em", fontWeight:"700"}], "body-md": ["16px", {lineHeight:"1.6", fontWeight:"400"}], "label-md": ["14px", {lineHeight:"1.4", letterSpacing:"0.01em", fontWeight:"500"}], "label-sm": ["12px", {lineHeight:"1.2", fontWeight:"600"}], "headline-lg": ["32px", {lineHeight:"1.3", fontWeight:"600"}] }
                }}
        }
    </script>
    <style>
        .admin-table { width: 100%; border-top: 1px solid #c1c7ca; border-collapse: collapse; text-align: center; }
        .admin-table th { background: #f3f4f5; color: #41484a; font-size: 12px; line-height: 1.2; font-weight: 700; padding: 12px 8px; border-bottom: 1px solid #c1c7ca; }
        .admin-table td { color: #191c1d; font-size: 14px; line-height: 1.4; padding: 12px 8px; border-bottom: 1px solid #e1e3e4; }
        .admin-table tr:hover td { background: #f8f9fa; }
        .admin-view-table { width: 100%; border-top: 1px solid #c1c7ca; border-collapse: collapse; }
        .admin-view-table th { width: 160px; background: #f3f4f5; color: #41484a; font-size: 14px; font-weight: 700; padding: 14px 16px; border-bottom: 1px solid #c1c7ca; text-align: left; }
        .admin-view-table td { color: #191c1d; font-size: 14px; padding: 14px 16px; border-bottom: 1px solid #e1e3e4; }
        .content-box { min-height: 220px; white-space: pre-wrap; line-height: 1.8; }
        .answer-box { min-height: 180px; white-space: pre-wrap; line-height: 1.8; background: #f8f9fa; border: 1px solid #e1e3e4; border-radius: 0.5rem; padding: 18px; }
        .status-wait { color: #ba1a1a; font-weight: 700; }
        .status-done { color: #14333b; font-weight: 700; }

        /* 문의 연동 상품 정보 */
        .product-info-wrap {
            display: flex;
            align-items: center;
            gap: 18px;
            min-height: 104px;
            padding: 8px;
            border-radius: 0.5rem;
            color: inherit;
            text-decoration: none;
            transition: background 0.2s ease;
        }
        .product-info-wrap:hover {
            background: #f3f4f5;
        }
        .product-thumb {
            width: 92px;
            height: 92px;
            flex: 0 0 92px;
            overflow: hidden;
            border: 1px solid #e1e3e4;
            border-radius: 0.5rem;
            background: #f3f4f5;
        }
        .product-thumb img {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .product-thumb-empty {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            color: #72787a;
        }
        .product-info {
            min-width: 0;
            flex: 1;
        }
        .product-number {
            margin-bottom: 5px;
            color: #72787a;
            font-size: 12px;
            font-weight: 600;
        }
        .product-name {
            display: inline-block;
            max-width: 100%;
            overflow: hidden;
            color: #191c1d;
            font-size: 15px;
            font-weight: 700;
            text-overflow: ellipsis;
            white-space: nowrap;
            transition: color 0.2s ease;
        }
        .product-name:hover {
            color: #14333b;
            text-decoration: underline;
        }
        .product-price {
            margin-top: 8px;
            color: #14333b;
            font-size: 16px;
            font-weight: 800;
        }
        .product-link {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            margin-top: 9px;
            color: #45636b;
            font-size: 12px;
            font-weight: 700;
        }
        .product-link:hover {
            color: #14333b;
        }
    </style>
</head>
<body class="bg-background text-on-background font-body-md text-body-md antialiased min-h-screen flex">
<div th:replace="~{admin/_layout :: sidebar('cs')}"></div>
<div th:replace="~{admin/_layout :: header}"></div>

<main class="ml-64 mt-16 p-lg flex-1 w-full max-w-[1400px] mx-auto">
    <div class="mb-md flex justify-between items-end">
        <div>
            <h1 class="font-headline-lg text-headline-lg text-on-background mb-2">1:1 문의 상세</h1>
            <p class="font-body-md text-body-md text-on-surface-variant">사용자의 문의 유형과 연동 상품을 확인하고 답변을 등록합니다.</p>
        </div>
        <nav class="font-label-sm text-label-sm text-on-surface-variant">HOME &gt; 고객센터 &gt; <strong class="text-primary">문의하기</strong></nav>
    </div>

    <section class="bg-surface-container-lowest rounded-lg border border-outline-variant p-md">
        <table class="admin-view-table">
            <tr>
                <th>문의 유형</th>
                <td th:text="${qna.type1 != null and !#strings.isEmpty(qna.type1)
                        ? (qna.type2 != null and !#strings.isEmpty(qna.type2)
                            ? qna.type1 + ' > ' + qna.type2
                            : qna.type1)
                        : '-'}">
                    상품 &gt; 불만접수
                </td>
            </tr>
            <tr>
                <th>제목</th>
                <td th:text="${qna.title}">문의 제목입니다.</td>
            </tr>
            <tr>
                <th>작성자</th>
                <td th:text="${qna.maskedId}">user**</td>
            </tr>
            <tr>
                <th>작성일</th>
                <td th:text="${qna.createdAt != null ? #temporals.format(qna.createdAt, 'yyyy.MM.dd HH:mm') : '-'}">2026.07.09 10:00</td>
            </tr>


            <!-- 상품이 연동된 문의에서만 행 전체 출력 -->
            <tr th:if="${product != null}">
                <th>상품 정보</th>
                <td>
                    <a class="product-info-wrap"
                       th:href="@{/product/view(prodNo=${product.prodNo})}">

                        <div class="product-thumb">
                            <img th:if="${product.thumb1 != null and !#strings.isEmpty(product.thumb1)}"
                                 th:src="${product.thumb1}"
                                 th:alt="${product.name}">

                            <span th:unless="${product.thumb1 != null and !#strings.isEmpty(product.thumb1)}"
                                  class="product-thumb-empty">
                    <span class="material-symbols-outlined">image</span>
                </span>
                        </div>

                        <div class="product-info">
                            <p class="product-number"
                               th:text="|상품번호 ${product.prodNo}|">
                                상품번호 1001
                            </p>

                            <p class="product-name"
                               th:text="${product.name}">
                                상품명이 출력됩니다.
                            </p>

                            <p class="product-price"
                               th:text="${product.price != null
                            ? #numbers.formatInteger(product.price, 0, 'COMMA') + '원'
                            : '-'}">
                                35,000원
                            </p>

                            <span class="product-link">
                    상품 페이지로 이동
                    <span class="material-symbols-outlined text-[15px]">
                        arrow_forward
                    </span>
                </span>
                        </div>
                    </a>
                </td>
            </tr>

            <tr>
                <th>문의내용</th>
                <td>
                    <div class="content-box"
                         th:text="${qna.content}">
                        문의 내용이 출력됩니다.
                    </div>
                </td>
            </tr>



        </table>

        <div class="mt-lg pt-lg border-t border-outline-variant">
            <h2 class="font-headline-md text-headline-md text-primary mb-sm">관리자 답변</h2>

            <div th:if="${answer != null}" class="answer-box mb-md" th:text="${answer.content}">등록된 답변 내용입니다.</div>

            <form th:action="@{/admin/cs/qna/answer/{no}(no=${qna.no})}" method="post">
                <textarea name="content" class="w-full min-h-[180px] rounded-lg border-outline-variant text-on-surface font-body-md" placeholder="답변 내용을 입력하세요." th:text="${answer != null ? answer.content : ''}" required></textarea>
                <div class="flex justify-end gap-sm mt-md">
                    <a th:href="@{/admin/cs/qna/list}" class="px-4 py-2 rounded border border-outline-variant hover:bg-surface-container-low">목록</a>
                    <a th:if="${answer != null}" th:href="@{/admin/cs/qna/answer/delete/{no}(no=${qna.no})}" onclick="return confirm('답변을 삭제하시겠습니까?');" class="px-4 py-2 rounded border border-error text-error hover:bg-error-container">답변삭제</a>
                    <button type="submit" class="px-5 py-2 rounded-lg bg-primary text-white" th:text="${answer != null ? '답변수정' : '답변등록'}">답변등록</button>
                </div>
            </form>
        </div>
    </section>
</main>

<script>
    function toggleAccordion(button){const menuItem=button.closest('.group\\/menu'); if(!menuItem)return; const active=menuItem.classList.contains('menu-item-active'); if(active){menuItem.classList.remove('menu-item-active')}else{document.querySelectorAll('.menu-item-active').forEach(item=>{if(item!==menuItem)item.classList.remove('menu-item-active')}); menuItem.classList.add('menu-item-active')}}
</script>
<script th:src="@{/js/auth-nav.js}" src="/k_market/js/auth-nav.js"></script>
<script th:src="@{/js/admin-navigation.js}" src="/js/admin-navigation.js"></script>
</body>
</html>
