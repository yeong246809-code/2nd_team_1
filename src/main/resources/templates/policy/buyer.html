<!DOCTYPE html>

<html lang="ko"><head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>K-market 서비스 이용약관</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;family=Be+Vietnam+Pro:wght@400;500;600;700&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

                    "spacing": {

    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .terms-content-font {
            font-family: 'Dotum', '돋움', sans-serif;
            font-size: 12px;
            color: #888888;
            line-height: 1.6;
        }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col font-body-md">
<!-- TopNavBar -->
<div th:replace="~{layout/site :: header}"></div>
<!-- Main Content Layout -->
<main class="flex-grow max-w-container-max mx-auto w-full px-margin-mobile md:px-gutter py-lg flex flex-col md:flex-row gap-lg">
    <!-- SideNavBar -->
    <aside class="w-full md:w-64 flex-shrink-0">
        <div class="bg-surface-container-low dark:bg-surface-container rounded-lg h-fit p-sm flex flex-col gap-xs shadow-sm dark:shadow-none">
            <div class="mb-sm px-sm">
                <h2 class="font-headline-md font-bold text-primary">카테고리</h2>
                <p class="font-label-md text-label-md text-on-surface-variant">카테고리별 쇼핑</p>
            </div>
            <ul class="flex flex-col gap-xs">
                <li class="text-on-surface-variant dark:text-outline-variant hover:bg-surface-container-high dark:hover:bg-inverse-surface cursor-pointer flex items-center gap-base p-sm rounded-md hover:translate-x-1 transition-transform duration-200">
                    <span class="material-symbols-outlined">apparel</span>
                    <span class="font-label-md text-label-md">패션 / 뷰티</span>
                </li>
                <li class="text-on-surface-variant dark:text-outline-variant hover:bg-surface-container-high dark:hover:bg-inverse-surface cursor-pointer flex items-center gap-base p-sm rounded-md hover:translate-x-1 transition-transform duration-200">
                    <span class="material-symbols-outlined">devices</span>
                    <span class="font-label-md text-label-md">가전 / 디지털</span>
                </li>
                <li class="text-on-surface-variant dark:text-outline-variant hover:bg-surface-container-high dark:hover:bg-inverse-surface cursor-pointer flex items-center gap-base p-sm rounded-md hover:translate-x-1 transition-transform duration-200">
                    <span class="material-symbols-outlined">restaurant</span>
                    <span class="font-label-md text-label-md">식품 / 생필품</span>
                </li>
                <li class="text-on-surface-variant dark:text-outline-variant hover:bg-surface-container-high dark:hover:bg-inverse-surface cursor-pointer flex items-center gap-base p-sm rounded-md hover:translate-x-1 transition-transform duration-200">
                    <span class="material-symbols-outlined">home_work</span>
                    <span class="font-label-md text-label-md">홈 / 오피스</span>
                </li>
            </ul>
        </div>
    </aside>
    <!-- Content Area -->
    <div class="flex-grow flex flex-col gap-lg min-w-0">
        <!-- Service Terms Header -->
        <div class="flex flex-col gap-md">
            <h1 class="font-headline-lg text-headline-lg font-bold text-on-surface border-b border-outline-variant pb-sm">K-market 서비스 이용약관</h1>
            <!-- Terms Tabs -->
            <div class="grid grid-cols-2 md:grid-cols-5 gap-sm">
                <a th:each="policy : ${policies}"
                   th:href="@{/policy/buyer(type=${policy.policyType})}"
                   th:classappend="${policy.policyType == selectedPolicyType} ? ' border-2 border-primary bg-surface-container-lowest text-primary font-bold shadow-sm' : ' border border-outline-variant bg-surface-container-lowest text-on-surface-variant hover:bg-surface-container-low'"
                   class="flex flex-col items-center gap-xs p-sm rounded-lg transition-all">
                    <div class="w-12 h-12 bg-surface-container rounded-full flex items-center justify-center">
                        <span class="material-symbols-outlined text-2xl">description</span>
                    </div>
                    <span class="font-label-md text-sm text-center" th:text="${policy.policyType}">구매회원 약관</span>
                </a>
            </div>
        </div>
        <!-- Terms Content Container -->
        <div class="bg-surface-container-lowest border border-outline-variant rounded-lg p-md md:p-lg flex flex-col gap-md">
            <div class="flex justify-between items-center border-b border-outline-variant pb-sm">
                <h2 class="font-headline-md text-headline-md font-bold text-on-surface" th:text="${selectedPolicy.policyType}">구매회원 약관</h2>
                <button class="flex items-center gap-xs text-on-surface-variant hover:text-primary transition-colors px-3 py-1.5 border border-outline-variant rounded hover:bg-surface-container-low" type="button" onclick="window.print()">
                    <span class="material-symbols-outlined text-lg">print</span>
                    <span class="font-label-md text-sm">인쇄하기</span>
                </button>
            </div>
            <div class="terms-content-font h-[500px] overflow-y-auto pr-sm custom-scrollbar whitespace-pre-wrap leading-relaxed" th:text="${selectedPolicy.content}">
                DB policy 테이블의 약관 내용이 표시됩니다.
            </div>
        </div>
    </div>
</main>
<!-- Footer -->
<div th:replace="~{layout/site :: footer}"></div>
<script th:src="@{/js/auth-nav.js}" src="/k_market/js/auth-nav.js"></script>
</body></html>
