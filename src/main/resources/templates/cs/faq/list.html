<!DOCTYPE html>

<html lang="ko">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>K-market - 자주묻는 질문</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600&amp;family=Plus+Jakarta+Sans:wght@600;700&amp;display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "on-primary-fixed": "#001f26",
                        "secondary": "#3e6659",
                        "surface-container-low": "#f3f4f5",
                        "outline": "#72787a",
                        "inverse-primary": "#acccd5",
                        "on-surface": "#191c1d",
                        "surface-container-high": "#e7e8e9",
                        "secondary-container": "#c0ecdc",
                        "on-surface-variant": "#41484a",
                        "on-primary": "#ffffff",
                        "surface-container-lowest": "#ffffff",
                        "on-background": "#191c1d",
                        "surface-container-highest": "#e1e3e4",
                        "surface": "#f8f9fa",
                        "primary": "#14333b",
                        "surface-variant": "#e1e3e4",
                        "outline-variant": "#c1c7ca",
                        "background": "#f8f9fa"
                    },
                    borderRadius: {
                        DEFAULT: "0.25rem",
                        lg: "0.5rem",
                        xl: "0.75rem",
                        full: "9999px"
                    },
                    spacing: {
                        sm: "12px",
                        base: "8px",
                        xs: "4px",
                        "container-max": "1280px",
                        "margin-mobile": "16px",
                        xl: "80px",
                        lg: "48px",
                        md: "24px",
                        gutter: "24px"
                    },
                    fontFamily: {
                        "label-md": ["Be Vietnam Pro"],
                        "body-lg": ["Be Vietnam Pro"],
                        "headline-md": ["Plus Jakarta Sans"],
                        "headline-lg-mobile": ["Plus Jakarta Sans"],
                        "label-sm": ["Be Vietnam Pro"],
                        "display-lg": ["Plus Jakarta Sans"],
                        "body-md": ["Be Vietnam Pro"],
                        "headline-lg": ["Plus Jakarta Sans"]
                    },
                    fontSize: {
                        "label-md": ["14px", { lineHeight: "1.4", letterSpacing: "0.01em", fontWeight: "500" }],
                        "body-lg": ["18px", { lineHeight: "1.6", fontWeight: "400" }],
                        "headline-md": ["20px", { lineHeight: "1.4", fontWeight: "600" }],
                        "headline-lg-mobile": ["24px", { lineHeight: "1.3", fontWeight: "600" }],
                        "label-sm": ["12px", { lineHeight: "1.2", fontWeight: "600" }],
                        "display-lg": ["48px", { lineHeight: "1.2", letterSpacing: "-0.02em", fontWeight: "700" }],
                        "body-md": ["16px", { lineHeight: "1.6", fontWeight: "400" }],
                        "headline-lg": ["32px", { lineHeight: "1.3", fontWeight: "600" }]
                    }
                }
            }
        }
    </script>
    <style>
        details > summary {
            list-style: none;
        }

        details > summary::-webkit-details-marker {
            display: none;
        }
    </style>

    <style id="kmarket-cs-common-style">
        .font-display-lg, .font-headline-lg, .font-headline-md, .font-headline-lg-mobile { font-family: "Plus Jakarta Sans", sans-serif; }
        .font-body-md, .font-body-lg, .font-label-md, .font-label-sm { font-family: "Be Vietnam Pro", sans-serif; }
        .text-label-sm { font-size: 12px; line-height: 1.2; font-weight: 600; }
        .text-label-md { font-size: 14px; line-height: 1.4; letter-spacing: 0.01em; font-weight: 500; }
        .text-body-md { font-size: 16px; line-height: 1.6; font-weight: 400; }
        .text-body-lg { font-size: 18px; line-height: 1.6; font-weight: 400; }
        .text-headline-md { font-size: 20px; line-height: 1.4; font-weight: 600; }
        .text-headline-lg-mobile { font-size: 24px; line-height: 1.3; font-weight: 600; }
        .text-headline-lg { font-size: 32px; line-height: 1.3; font-weight: 600; }
        .text-display-lg { font-size: 48px; line-height: 1.2; letter-spacing: -0.02em; font-weight: 700; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; font-size: 20px; line-height: 1; }
    </style>
</head>
<body class="bg-background text-on-background font-body-md min-h-screen flex flex-col">
<!-- Top Navigation Bar -->
<div th:replace="~{layout/site :: header}"></div>
<!-- Main Content Area -->
<main class="flex-1 w-full max-w-container-max mx-auto px-md py-lg flex flex-col md:flex-row gap-lg">
    <!-- Sidebar Navigation -->
    <aside class="w-full md:w-64 shrink-0 flex flex-col gap-base">
        <h2 class="font-headline-md text-headline-md text-primary mb-sm px-sm">고객센터</h2>
        <nav class="flex flex-col gap-xs">
            <a class="font-label-md text-label-md rounded-lg p-sm flex items-center gap-sm transition-all duration-200 text-on-surface-variant hover:bg-surface-variant" th:href="@{/cs/notice/list}">
                <span class="material-symbols-outlined">campaign</span>
                공지사항
            </a>
            <a class="font-label-md text-label-md rounded-lg p-sm flex items-center gap-sm transition-all duration-200 text-primary font-bold bg-secondary-container" th:href="@{/cs/faq/list}">
                <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">help</span>
                자주묻는 질문
            </a>
            <a class="font-label-md text-label-md rounded-lg p-sm flex items-center gap-sm transition-all duration-200 text-on-surface-variant hover:bg-surface-variant" th:href="@{/cs/qna/list}">
                <span class="material-symbols-outlined">edit_note</span>
                1:1 문의
            </a>
        </nav>
    </aside>
    <!-- Content Canvas -->
    <section class="flex-1 flex flex-col gap-lg">
        <!-- Breadcrumb -->
        <div class="hidden md:flex items-center gap-2 text-label-md text-on-surface-variant pb-md border-b border-surface-variant">
            <a class="hover:text-primary" th:href="@{/}">홈</a>
            <span class="material-symbols-outlined text-sm">chevron_right</span>
            <a class="hover:text-primary" th:href="@{/cs/index}">고객센터</a>
            <span class="material-symbols-outlined text-sm">chevron_right</span>
            <a class="font-bold text-on-surface" th:href="@{/cs/faq/list}">자주묻는 질문</a>
        </div>
        <div class="flex flex-col md:flex-row gap-lg items-start">
            <!-- FAQ type1 메뉴 -->
            <aside class="w-full md:w-48 flex-shrink-0 flex flex-row md:flex-col gap-2 overflow-x-auto md:overflow-visible border-b md:border-b-0 md:border-r border-surface-variant pb-2 md:pb-0 md:pr-4">
                <h3 class="hidden md:block font-headline-md text-headline-md text-on-surface mb-sm">자주묻는 질문</h3>
                <a th:class="${type1 == '회원'} ? 'whitespace-nowrap md:whitespace-normal text-left px-3 py-2 rounded font-label-md text-label-md text-primary font-bold bg-surface-container transition-colors' : 'whitespace-nowrap md:whitespace-normal text-left px-3 py-2 rounded font-label-md text-label-md text-on-surface-variant hover:bg-surface-container-low transition-colors'" th:href="@{/cs/faq/list(type1='회원', page=1)}">
                    회원
                </a>
                <a th:class="${type1 == '쿠폰/이벤트'} ? 'whitespace-nowrap md:whitespace-normal text-left px-3 py-2 rounded font-label-md text-label-md text-primary font-bold bg-surface-container transition-colors' : 'whitespace-nowrap md:whitespace-normal text-left px-3 py-2 rounded font-label-md text-label-md text-on-surface-variant hover:bg-surface-container-low transition-colors'" th:href="@{/cs/faq/list(type1='쿠폰/이벤트', page=1)}">
                    쿠폰/이벤트
                </a>
                <a th:class="${type1 == '주문/결제'} ? 'whitespace-nowrap md:whitespace-normal text-left px-3 py-2 rounded font-label-md text-label-md text-primary font-bold bg-surface-container transition-colors' : 'whitespace-nowrap md:whitespace-normal text-left px-3 py-2 rounded font-label-md text-label-md text-on-surface-variant hover:bg-surface-container-low transition-colors'" th:href="@{/cs/faq/list(type1='주문/결제', page=1)}">
                    주문/결제
                </a>
                <a th:class="${type1 == '배송'} ? 'whitespace-nowrap md:whitespace-normal text-left px-3 py-2 rounded font-label-md text-label-md text-primary font-bold bg-surface-container transition-colors' : 'whitespace-nowrap md:whitespace-normal text-left px-3 py-2 rounded font-label-md text-label-md text-on-surface-variant hover:bg-surface-container-low transition-colors'" th:href="@{/cs/faq/list(type1='배송', page=1)}">
                    배송
                </a>
                <a th:class="${type1 == '취소/반품/교환'} ? 'whitespace-nowrap md:whitespace-normal text-left px-3 py-2 rounded font-label-md text-label-md text-primary font-bold bg-surface-container transition-colors' : 'whitespace-nowrap md:whitespace-normal text-left px-3 py-2 rounded font-label-md text-label-md text-on-surface-variant hover:bg-surface-container-low transition-colors'" th:href="@{/cs/faq/list(type1='취소/반품/교환', page=1)}">
                    취소/반품/교환
                </a>
                <a th:class="${type1 == '여행/숙박/항공'} ? 'whitespace-nowrap md:whitespace-normal text-left px-3 py-2 rounded font-label-md text-label-md text-primary font-bold bg-surface-container transition-colors' : 'whitespace-nowrap md:whitespace-normal text-left px-3 py-2 rounded font-label-md text-label-md text-on-surface-variant hover:bg-surface-container-low transition-colors'" th:href="@{/cs/faq/list(type1='여행/숙박/항공', page=1)}">
                    여행/숙박/항공
                </a>
                <a th:class="${type1 == '안전거래'} ? 'whitespace-nowrap md:whitespace-normal text-left px-3 py-2 rounded font-label-md text-label-md text-primary font-bold bg-surface-container transition-colors' : 'whitespace-nowrap md:whitespace-normal text-left px-3 py-2 rounded font-label-md text-label-md text-on-surface-variant hover:bg-surface-container-low transition-colors'" th:href="@{/cs/faq/list(type1='안전거래', page=1)}">
                    안전거래
                </a>
            </aside>
            <!-- FAQ List Area -->
            <div class="flex-1 w-full flex flex-col gap-md">
                <!-- type1 제목 -->
                <div class="flex flex-col gap-1 pb-sm border-b-2 border-primary">
                    <div class="flex items-center gap-2">
                        <h2 class="font-headline-md text-headline-md text-on-surface" th:text="${type1}">
                        </h2>
                    </div>
                    <p class="text-label-sm text-on-surface-variant ml-8" th:text="${type1} + ' 관련 자주묻는 질문입니다.'">
                    </p>
                </div>
                <!-- type2별 그룹 반복 -->
                <div class="flex flex-col gap-3 mt-4" th:each="group : ${faqGroups}">
                    <h3 class="font-headline-md text-headline-md text-on-surface" th:text="${group.key}">
                    </h3>
                    <div class="border border-outline-variant rounded-lg overflow-hidden bg-surface">
                        <details class="group border-b border-surface-variant last:border-0" th:each="faq : ${group.value}">
                            <summary class="flex items-center justify-between p-4 cursor-pointer hover:bg-surface-container-low transition-colors list-none">
                                <div class="flex items-start gap-3">
                                    <span class="font-bold text-primary text-lg">Q.</span>
                                    <span class="font-body-md text-body-md text-on-surface mt-0.5" th:text="${faq.title}">
</span>
                                </div>
                                <span class="material-symbols-outlined text-on-surface-variant group-open:rotate-180 transition-transform">
                                    expand_more
                                </span>
                            </summary>
                            <div class="p-4 bg-surface-container-lowest border-t border-surface-variant text-body-md text-on-surface-variant leading-relaxed">
                                <span class="font-bold text-secondary mr-2 text-lg">A.</span>
                                <span th:text="${faq.content}"></span>
                            </div>
                        </details>
                    </div>
                </div>
                <!-- 데이터 없을 때 -->
                <div class="p-4 text-center text-on-surface-variant font-body-md" th:if="${#maps.isEmpty(faqGroups)}">
                    등록된 자주묻는 질문이 없습니다.
                </div>
                <!-- 실제 페이지네이션 -->
                <div class="flex items-center justify-center gap-sm text-sm text-on-surface-variant mt-lg" th:if="${totalPages &gt; 0}">
                    <!-- 이전 -->
                    <a class="hover:text-primary" th:href="@{/cs/faq/list(type1=${type1}, page=${prevPage})}" th:if="${hasPrev}">
                        ‹ 이전
                    </a>
                    <span class="text-outline cursor-default" th:if="${!hasPrev}">
                        ‹ 이전
                    </span>
                    <!-- 페이지 번호 -->
                    <a class="w-8 h-8 flex items-center justify-center rounded-lg" th:classappend="${pageNum == currentPage}
                            ? ' bg-primary text-on-primary font-bold'
                            : ' hover:bg-surface-container-high'" th:each="pageNum : ${#numbers.sequence(startPage, endPage)}" th:href="@{/cs/faq/list(type1=${type1}, page=${pageNum})}" th:text="${pageNum}">
                    </a>
                    <!-- 다음 -->
                    <a class="hover:text-primary" th:href="@{/cs/faq/list(type1=${type1}, page=${nextPage})}" th:if="${hasNext}">
                        다음 ›
                    </a>
                    <span class="text-outline cursor-default" th:if="${!hasNext}">
                        다음 ›
                    </span>
                </div>
            </div>
        </div>
    </section>
</main>
<!-- Footer -->
<div th:replace="~{layout/site :: footer}"></div>
<script src="/k_market/js/auth-nav.js" th:src="@{/js/auth-nav.js}"></script>
</body>
</html>
