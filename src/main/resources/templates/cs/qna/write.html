<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>K-market - 문의하기 작성</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&amp;family=Plus+Jakarta+Sans:wght@600;700&amp;display=swap" rel="stylesheet"/>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        background: "#f8f9fa",
                        surface: "#f8f9fa",
                        "surface-container-lowest": "#ffffff",
                        "surface-container-low": "#f3f4f5",
                        "surface-container-high": "#e7e8e9",
                        "surface-container-highest": "#e1e3e4",
                        "surface-variant": "#e1e3e4",
                        "outline-variant": "#c1c7ca",
                        primary: "#14333b",
                        "on-primary": "#ffffff",
                        "on-surface": "#191c1d",
                        "on-surface-variant": "#41484a",
                        "secondary-container": "#c0ecdc"
                    },
                    spacing: {
                        xs: "4px",
                        sm: "12px",
                        md: "24px",
                        lg: "48px",
                        base: "8px",
                        "container-max": "1280px"
                    }
                }
            }
        }
    </script>
    <style id="kmarket-cs-common-style">
        .font-display-lg, .font-headline-lg, .font-headline-md, .font-headline-lg-mobile { font-family: "Plus Jakarta Sans", sans-serif; }
        .font-body-md, .font-body-lg, .font-label-md, .font-label-sm { font-family: "Be Vietnam Pro", sans-serif; }
        .text-label-sm { font-size: 12px; line-height: 1.2; font-weight: 600; }
        .text-label-md { font-size: 14px; line-height: 1.4; letter-spacing: 0.01em; font-weight: 500; }
        .text-body-md { font-size: 16px; line-height: 1.6; font-weight: 400; }
        .text-body-lg { font-size: 18px; line-height: 1.6; font-weight: 400; }
        .text-headline-md { font-size: 20px; line-height: 1.4; font-weight: 600; }
        .text-headline-lg-mobile { font-size: 24px; line-height: 1.3; font-weight: 600; }
        .text-headline-lg { font-size: 32px; line-height: 1.3; font-weight: 600; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; font-size: 20px; line-height: 1; }
    </style>
</head>
<body class="bg-background text-on-background font-body-md min-h-screen flex flex-col">
<!-- Header -->
<div th:replace="~{layout/site :: header}"></div>
<!-- Main -->
<main class="flex-1 w-full max-w-container-max mx-auto px-md py-lg flex flex-col md:flex-row gap-lg">
    <!-- Sidebar -->
    <aside class="w-full md:w-64 shrink-0 flex flex-col gap-base">
        <h2 class="font-headline-md text-headline-md text-primary mb-sm px-sm">고객센터</h2>
        <nav class="flex flex-col gap-xs">
            <a class="font-label-md text-label-md rounded-lg p-sm flex items-center gap-sm transition-all duration-200 text-on-surface-variant hover:bg-surface-variant" th:href="@{/cs/notice/list}">
                <span class="material-symbols-outlined">campaign</span>
                공지사항
            </a>
            <a class="font-label-md text-label-md rounded-lg p-sm flex items-center gap-sm transition-all duration-200 text-on-surface-variant hover:bg-surface-variant" th:href="@{/cs/faq/list}">
                <span class="material-symbols-outlined">help</span>
                자주묻는 질문
            </a>
            <a class="font-label-md text-label-md rounded-lg p-sm flex items-center gap-sm transition-all duration-200 text-primary font-bold bg-secondary-container" th:href="@{/cs/qna/list}">
                <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">edit_note</span>
                1:1 문의
            </a>
        </nav>
    </aside>
    <!-- Content -->
    <section class="flex-1 flex flex-col gap-md">
        <!-- Breadcrumb -->
        <div class="flex items-center gap-xs text-sm text-on-surface-variant">
            <a th:href="@{/static}">홈</a>
            <span class="material-symbols-outlined text-sm">chevron_right</span>
            <a th:href="@{/cs/index}">고객센터</a>
            <span class="material-symbols-outlined text-sm">chevron_right</span>
            <a th:href="@{/cs/qna/list}">문의하기</a>
            <span class="material-symbols-outlined text-sm">chevron_right</span>
            <span class="font-bold text-on-surface">글쓰기</span>
        </div>
        <!-- Title -->
        <div class="border-b border-surface-variant pb-md">
            <h1 class="text-3xl font-bold text-primary">문의 작성</h1>
            <p class="text-on-surface-variant mt-sm">궁금하신 내용을 남겨주시면 빠르게 답변드리겠습니다.</p>
        </div>

        <!-- 상품문의 안내 배너 (상품 상세페이지에서 넘어온 경우에만 표시) -->
        <div th:if="${productNo != null}" class="text-sm text-primary bg-secondary-container/40 rounded-lg p-sm">
            상품번호 <span th:text="${productNo}" class="font-bold"></span>에 대한 문의를 작성합니다.
        </div>

        <!-- 작성 폼 -->
        <form th:action="@{/cs/qna/write}" method="post"
              class="bg-surface-container-lowest rounded-xl border border-outline-variant shadow-sm p-lg flex flex-col gap-md">

            <!-- 상품문의가 아니면 productNo가 null로 넘어가서 일반 1:1문의로 저장됨 -->
            <input type="hidden" name="prodNo" th:value="${prodNo}"/>
            <!-- 원글은 항상 parentNo=0 -->
            <input type="hidden" name="parentNo" value="0"/>
            <!-- 답변 전이므로 기본값 -->
            <input type="hidden" name="isAnswered" value="답변대기"/>

            <div class="flex flex-col sm:flex-row gap-sm">
                <div class="flex flex-col gap-xs w-full sm:w-40">
                    <label class="text-sm font-semibold text-on-surface-variant">문의 유형</label>
                    <select name="type1" class="border border-outline-variant rounded-lg p-sm text-sm focus:ring-primary focus:border-primary focus:outline-none">
                        <option value="상품">상품</option>
                        <option value="배송">배송</option>
                        <option value="주문/결제">주문/결제</option>
                        <option value="교환/반품">교환/반품</option>
                        <option value="회원">회원</option>
                        <option value="기타">기타</option>
                    </select>
                </div>
                <div class="flex flex-col gap-xs w-full sm:w-40">
                    <label class="text-sm font-semibold text-on-surface-variant">세부 유형</label>
                    <select name="type2" class="border border-outline-variant rounded-lg p-sm text-sm focus:ring-primary focus:border-primary focus:outline-none">
                        <option value="일반문의">일반문의</option>
                        <option value="불만접수">불만접수</option>
                        <option value="제안">제안</option>
                    </select>
                </div>
            </div>

            <div class="flex flex-col gap-xs">
                <label class="text-sm font-semibold text-on-surface-variant">제목</label>
                <input type="text" name="title" required maxlength="100" placeholder="제목을 입력해주세요"
                       class="w-full border border-outline-variant rounded-lg p-sm text-sm focus:ring-primary focus:border-primary focus:outline-none"/>
            </div>

            <div class="flex flex-col gap-xs">
                <label class="text-sm font-semibold text-on-surface-variant">내용</label>
                <textarea name="content" required maxlength="2000" rows="8" placeholder="문의하실 내용을 입력해주세요"
                          class="w-full border border-outline-variant rounded-lg p-sm text-sm focus:ring-primary focus:border-primary focus:outline-none"></textarea>
            </div>

            <div class="flex justify-end gap-sm mt-sm">
                <a th:href="@{/cs/qna/list}" class="px-6 py-2.5 rounded-lg font-medium border border-outline-variant text-on-surface-variant hover:bg-surface-container-high transition-colors">
                    취소
                </a>
                <button type="submit" class="bg-primary text-on-primary hover:opacity-90 transition-opacity px-6 py-2.5 rounded-lg font-medium shadow-sm">
                    등록하기
                </button>
            </div>
        </form>
    </section>
</main>
<!-- Footer -->
<div th:replace="~{layout/site :: footer}"></div>
<script src="/k_market/js/auth-nav.js" th:src="@{/js/auth-nav.js}"></script>
</body>
</html>
