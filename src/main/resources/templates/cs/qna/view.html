<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>K-market - 문의 상세</title>
    <link href="https://fonts.googleapis.com" rel="preconnect"/>
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600&amp;family=Plus+Jakarta+Sans:wght@600;700;800&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .menu-content { max-height: 0; overflow: hidden; transition: max-height 0.3s ease-in-out, opacity 0.2s ease-in-out, padding 0.3s ease-in-out; opacity: 0; }
        .menu-item-active .menu-content { max-height: 500px; opacity: 1; padding-top: 4px; padding-bottom: 8px; }
        .chevron-icon { transition: transform 0.3s ease; }
        .menu-item-active .chevron-icon { transform: rotate(180deg); }
    </style>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: { extend: {
                    colors: {
                        "secondary-container": "#c0ecdc", "surface-container-highest": "#e1e3e4", "primary-fixed": "#c8e8f2", "on-error": "#ffffff", "inverse-surface": "#2e3132", "on-surface": "#191c1d", "on-secondary": "#ffffff", "tertiary-fixed": "#ffdcc7", "surface-bright": "#f8f9fa", "surface-container-lowest": "#ffffff", "primary-container": "#2c4a52", "error-container": "#ffdad6", "primary": "#14333b", "on-tertiary-fixed-variant": "#5f402b", "on-secondary-fixed": "#002018", "background": "#f8f9fa", "secondary-fixed": "#c0ecdc", "tertiary-fixed-dim": "#eabda2", "secondary": "#3e6659", "error": "#ba1a1a", "primary-fixed-dim": "#acccd5", "on-secondary-fixed-variant": "#264e42", "tertiary": "#452916", "surface": "#f8f9fa", "on-tertiary": "#ffffff", "on-primary-container": "#99b9c2", "inverse-primary": "#acccd5", "surface-container-low": "#f3f4f5", "on-tertiary-container": "#d6ab90", "on-primary-fixed": "#001f26", "surface-tint": "#45636b", "tertiary-container": "#5e3f2a", "on-error-container": "#93000a", "secondary-fixed-dim": "#a5d0c0", "on-primary": "#ffffff", "on-tertiary-fixed": "#2d1605", "on-background": "#191c1d", "on-secondary-container": "#446c5f", "outline": "#72787a", "outline-variant": "#c1c7ca", "on-surface-variant": "#41484a", "inverse-on-surface": "#f0f1f2", "on-primary-fixed-variant": "#2d4b53", "surface-variant": "#e1e3e4", "surface-dim": "#d9dadb", "surface-container": "#edeeef", "surface-container-high": "#e7e8e9"
                    },
                    borderRadius: { DEFAULT: "0.25rem", lg: "0.5rem", xl: "0.75rem", full: "9999px" },
                    spacing: { "margin-mobile": "16px", base: "8px", gutter: "24px", xs: "4px", sm: "12px", xl: "80px", "container-max": "1280px", md: "24px", lg: "48px" },
                    fontFamily: { "headline-md": ["Plus Jakarta Sans"], "body-lg": ["Be Vietnam Pro"], "headline-lg-mobile": ["Plus Jakarta Sans"], "display-lg": ["Plus Jakarta Sans"], "body-md": ["Be Vietnam Pro"], "label-md": ["Be Vietnam Pro"], "label-sm": ["Be Vietnam Pro"], "headline-lg": ["Plus Jakarta Sans"] },
                    fontSize: { "headline-md": ["20px", {lineHeight:"1.4", fontWeight:"600"}], "body-lg": ["18px", {lineHeight:"1.6", fontWeight:"400"}], "headline-lg-mobile": ["24px", {lineHeight:"1.3", fontWeight:"600"}], "display-lg": ["48px", {lineHeight:"1.2", letterSpacing:"-0.02em", fontWeight:"700"}], "body-md": ["16px", {lineHeight:"1.6", fontWeight:"400"}], "label-md": ["14px", {lineHeight:"1.4", letterSpacing:"0.01em", fontWeight:"500"}], "label-sm": ["12px", {lineHeight:"1.2", fontWeight:"600"}], "headline-lg": ["32px", {lineHeight:"1.3", fontWeight:"600"}] }
                }}
        }
    </script>
</head>
<body class="bg-background text-on-background font-body-md text-body-md antialiased min-h-screen flex flex-col">
<div th:replace="~{layout/site :: header}"></div>
<main class="flex-grow w-full max-w-container-max mx-auto px-md md:px-lg py-lg grid grid-cols-1 md:grid-cols-12 gap-lg relative">
    <aside class="md:col-span-3 hidden md:flex flex-col gap-base">
        <h2 class="font-headline-md text-headline-md text-primary mb-sm px-sm">고객센터</h2>
        <nav class="flex flex-col gap-xs">
            <a class="font-label-md text-label-md rounded-lg p-sm flex items-center gap-sm transition-all duration-200 text-on-surface-variant hover:bg-surface-variant" th:href="@{/cs/notice/list}">
                <span class="material-symbols-outlined">campaign</span>
                공지사항
            </a>
            <a class="font-label-md text-label-md rounded-lg p-sm flex items-center gap-sm transition-all duration-200 text-on-surface-variant hover:bg-surface-variant" th:href="@{/cs/faq/list}">
                <span class="material-symbols-outlined">help</span>
                자주묻는 질문
            </a>
            <a class="font-label-md text-label-md rounded-lg p-sm flex items-center gap-sm transition-all duration-200 text-primary font-bold bg-secondary-container" th:href="@{/cs/qna/list}">
                <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">edit_note</span>
                1:1 문의
            </a>
        </nav>
    </aside>

    <section class="col-span-1 md:col-span-9 bg-surface rounded-xl p-md md:p-lg shadow-[0_4px_24px_rgba(44,74,82,0.04)] ring-1 ring-outline-variant/20">
        <nav class="flex items-center gap-sm text-on-surface-variant font-label-sm mb-lg">
            <a class="hover:text-primary transition-colors" th:href="@{/}">홈</a>
            <span class="material-symbols-outlined text-[16px]">chevron_right</span>
            <a class="hover:text-primary transition-colors" th:href="@{/cs/index}">고객센터</a>
            <span class="material-symbols-outlined text-[16px]">chevron_right</span>
            <span class="text-primary font-bold">1:1 문의</span>
        </nav>

        <div class="border-b border-outline-variant/30 pb-md mb-lg">
            <div class="flex items-center gap-sm mb-sm">
                <span class="px-sm py-xs bg-secondary-container text-on-secondary-container font-label-sm rounded-full"
                      th:text="${qna.type2 != null and !qna.type2.isBlank() ? '[' + qna.type2 + ']' : (qna.type1 != null and !qna.type1.isBlank() ? '[' + qna.type1 + ']' : '[문의]')}">[문의]</span>
                <span class="px-sm py-xs rounded-full font-label-sm"
                      th:classappend="${answer != null} ? ' bg-primary text-white' : ' bg-surface-variant text-on-surface-variant'"
                      th:text="${answer != null ? '답변완료' : '답변대기'}">답변대기</span>
            </div>

            <h1 class="font-headline-lg text-headline-lg-mobile md:text-headline-lg text-on-surface mb-sm"
                th:text="${qna.title}">문의 제목입니다.</h1>

            <div class="flex flex-wrap items-center gap-md text-on-surface-variant font-label-md">
                <span class="flex items-center gap-xs">
                    <span class="material-symbols-outlined text-[16px]">person</span>
                    <span th:text="${qna.maskedId}">user**</span>
                </span>
                <span class="flex items-center gap-xs">
                    <span class="material-symbols-outlined text-[16px]">calendar_today</span>
                    <span th:text="${qna.createdAt != null ? #temporals.format(qna.createdAt, 'yyyy.MM.dd') : '-'}">2026.07.09</span>
                </span>
            </div>
        </div>

        <div class="prose max-w-none text-on-surface font-body-md leading-relaxed min-h-[260px] whitespace-pre-wrap"
             th:text="${qna.content}">문의 내용입니다.</div>

        <div class="mt-lg pt-lg border-t border-outline-variant/30">
            <h2 class="font-headline-md text-headline-md text-primary mb-sm">답변</h2>
            <div th:if="${answer != null}"
                 class="bg-surface-container-low rounded-lg border border-outline-variant/40 p-md text-on-surface font-body-md leading-relaxed whitespace-pre-wrap"
                 th:text="${answer.content}">등록된 답변 내용입니다.</div>
            <div th:unless="${answer != null}"
                 class="bg-surface-container-low rounded-lg border border-dashed border-outline-variant p-md text-on-surface-variant font-body-md">
                아직 등록된 답변이 없습니다.
            </div>
        </div>

        <div class="mt-xl pt-lg border-t border-outline-variant/30 flex justify-center">
            <a class="inline-flex items-center justify-center px-lg py-sm bg-surface-variant hover:bg-surface-container-high text-on-surface-variant font-label-md rounded-full transition-all duration-200"
               th:href="@{/cs/qna/list}">목록</a>
        </div>
    </section>
</main>
<div th:replace="~{layout/site :: footer}"></div>
</body>
</html>
