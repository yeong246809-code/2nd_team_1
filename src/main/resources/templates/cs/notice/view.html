<!DOCTYPE html>

<html lang="ko"><head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>공지사항 보기 - K-market</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&amp;family=Be+Vietnam+Pro:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-primary-fixed": "#001f26",
                        "on-error": "#ffffff",
                        "surface-dim": "#d9dadb",
                        "surface-container": "#edeeef",
                        "outline-variant": "#c1c7ca",
                        "tertiary": "#452916",
                        "on-tertiary-fixed-variant": "#5f402b",
                        "on-tertiary-fixed": "#2d1605",
                        "background": "#f8f9fa",
                        "on-surface": "#191c1d",
                        "error-container": "#ffdad6",
                        "tertiary-fixed": "#ffdcc7",
                        "secondary": "#3e6659",
                        "inverse-surface": "#2e3132",
                        "surface-bright": "#f8f9fa",
                        "on-secondary-container": "#446c5f",
                        "surface-variant": "#e1e3e4",
                        "on-primary-fixed-variant": "#2d4b53",
                        "on-primary-container": "#99b9c2",
                        "surface": "#f8f9fa",
                        "inverse-on-surface": "#f0f1f2",
                        "on-background": "#191c1d",
                        "primary-fixed": "#c8e8f2",
                        "outline": "#72787a",
                        "tertiary-fixed-dim": "#eabda2",
                        "primary-fixed-dim": "#acccd5",
                        "surface-tint": "#45636b",
                        "inverse-primary": "#acccd5",
                        "secondary-container": "#c0ecdc",
                        "on-primary": "#ffffff",
                        "on-secondary-fixed": "#002018",
                        "on-tertiary": "#ffffff",
                        "on-error-container": "#93000a",
                        "surface-container-high": "#e7e8e9",
                        "surface-container-low": "#f3f4f5",
                        "primary": "#14333b",
                        "on-secondary-fixed-variant": "#264e42",
                        "surface-container-lowest": "#ffffff",
                        "on-secondary": "#ffffff",
                        "tertiary-container": "#5e3f2a",
                        "secondary-fixed": "#c0ecdc",
                        "error": "#ba1a1a",
                        "on-surface-variant": "#41484a",
                        "surface-container-highest": "#e1e3e4",
                        "primary-container": "#2c4a52",
                        "on-tertiary-container": "#d6ab90",
                        "secondary-fixed-dim": "#a5d0c0"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "md": "24px",
                        "margin-mobile": "16px",
                        "xl": "80px",
                        "lg": "48px",
                        "sm": "12px",
                        "gutter": "24px",
                        "xs": "4px",
                        "container-max": "1280px",
                        "base": "8px"
                    },
                    "fontFamily": {
                        "display-lg": ["Plus Jakarta Sans"],
                        "headline-md": ["Plus Jakarta Sans"],
                        "headline-lg-mobile": ["Plus Jakarta Sans"],
                        "body-lg": ["Be Vietnam Pro"],
                        "body-md": ["Be Vietnam Pro"],
                        "label-sm": ["Be Vietnam Pro"],
                        "label-md": ["Be Vietnam Pro"],
                        "headline-lg": ["Plus Jakarta Sans"]
                    },
                    "fontSize": {
                        "display-lg": ["48px", { "lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "headline-md": ["20px", { "lineHeight": "1.4", "fontWeight": "600" }],
                        "headline-lg-mobile": ["24px", { "lineHeight": "1.3", "fontWeight": "600" }],
                        "body-lg": ["18px", { "lineHeight": "1.6", "fontWeight": "400" }],
                        "body-md": ["16px", { "lineHeight": "1.6", "fontWeight": "400" }],
                        "label-sm": ["12px", { "lineHeight": "1.2", "fontWeight": "600" }],
                        "label-md": ["14px", { "lineHeight": "1.4", "letterSpacing": "0.01em", "fontWeight": "500" }],
                        "headline-lg": ["32px", { "lineHeight": "1.3", "fontWeight": "600" }]
                    }
                }
            }
        }
    </script>
    <style id="kmarket-cs-common-style">
        .font-display-lg, .font-headline-lg, .font-headline-md, .font-headline-lg-mobile { font-family: "Plus Jakarta Sans", sans-serif; }
        .font-body-md, .font-body-lg, .font-label-md, .font-label-sm { font-family: "Be Vietnam Pro", sans-serif; }
        .text-label-sm { font-size: 12px; line-height: 1.2; font-weight: 600; }
        .text-label-md { font-size: 14px; line-height: 1.4; letter-spacing: 0.01em; font-weight: 500; }
        .text-body-md { font-size: 16px; line-height: 1.6; font-weight: 400; }
        .text-body-lg { font-size: 18px; line-height: 1.6; font-weight: 400; }
        .text-headline-md { font-size: 20px; line-height: 1.4; font-weight: 600; }
        .text-headline-lg-mobile { font-size: 24px; line-height: 1.3; font-weight: 600; }
        .text-headline-lg { font-size: 32px; line-height: 1.3; font-weight: 600; }
        .text-display-lg { font-size: 48px; line-height: 1.2; letter-spacing: -0.02em; font-weight: 700; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; font-size: 20px; line-height: 1; }
    </style>
</head>
<body class="bg-background text-on-background font-body-md min-h-screen flex flex-col antialiased">
<div th:replace="~{layout/site :: header}"></div>
<main class="flex-grow w-full max-w-container-max mx-auto px-md md:px-lg py-lg grid grid-cols-1 md:grid-cols-12 gap-lg relative">
    <aside class="md:col-span-3 hidden md:flex flex-col gap-base">
        <h2 class="font-headline-md text-headline-md text-primary mb-sm px-sm">고객센터</h2>
        <nav class="flex flex-col gap-xs">
            <a class="font-label-md text-label-md rounded-lg p-sm flex items-center gap-sm transition-all duration-200 text-primary font-bold bg-secondary-container" th:href="@{/cs/notice/list}">
                <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">campaign</span>
                공지사항
            </a>
            <a class="font-label-md text-label-md rounded-lg p-sm flex items-center gap-sm transition-all duration-200 text-on-surface-variant hover:bg-surface-variant" th:href="@{/cs/faq/list}">
                <span class="material-symbols-outlined">help</span>
                자주묻는 질문
            </a>
            <a class="font-label-md text-label-md rounded-lg p-sm flex items-center gap-sm transition-all duration-200 text-on-surface-variant hover:bg-surface-variant" th:href="@{/cs/qna/list}">
                <span class="material-symbols-outlined">edit_note</span>
                1:1 문의
            </a>
        </nav>
    </aside>
    <section class="col-span-1 md:col-span-9 bg-surface rounded-xl p-md md:p-lg shadow-[0_4px_24px_rgba(44,74,82,0.04)] ring-1 ring-outline-variant/20">
        <nav class="flex items-center gap-sm text-on-surface-variant font-label-sm mb-lg">
            <a class="hover:text-primary transition-colors" th:href="@{/}">홈</a>
            <span class="material-symbols-outlined text-[16px]">chevron_right</span>
            <a class="hover:text-primary transition-colors" th:href="@{/cs/notice/list}">고객센터</a>
            <span class="material-symbols-outlined text-[16px]">chevron_right</span>
            <span class="text-primary font-bold">공지사항</span>
        </nav>
        <div class="border-b border-outline-variant/30 pb-md mb-lg">
            <div class="flex items-center gap-sm mb-sm">
<span class="px-sm py-xs bg-secondary-container text-on-secondary-container font-label-sm rounded-full" th:text="|[${notice.type}]|">
                    [안내]
                </span>
            </div>
            <h1 class="font-headline-lg text-headline-lg-mobile md:text-headline-lg text-on-surface mb-sm" th:text="${notice.title}">
                공지사항 제목입니다.
            </h1>
            <div class="flex items-center gap-md text-on-surface-variant font-label-md">
<span class="flex items-center gap-xs">
<span class="material-symbols-outlined text-[16px]">calendar_today</span>
<span th:text="${#temporals.format(notice.createdAt, 'yyyy.MM.dd')}">
                        2024.01.01
                    </span>
</span>
                <span class="flex items-center gap-xs">
<span class="material-symbols-outlined text-[16px]">visibility</span>
<span th:text="${notice.viewCount}">
                        0
                    </span>
</span>
            </div>
        </div>
        <div class="prose max-w-none text-on-surface font-body-md leading-relaxed min-h-[300px]" th:utext="${notice.content}">
            <p>공지사항 내용입니다.</p>
        </div>
        <div class="mt-xl pt-lg border-t border-outline-variant/30 flex justify-center">
            <a class="inline-flex items-center justify-center px-lg py-sm bg-surface-variant hover:bg-surface-container-high text-on-surface-variant font-label-md rounded-full transition-all duration-200" th:href="@{/cs/notice/list}">
                목록
            </a>
        </div>
    </section>
</main>
<div th:replace="~{layout/site :: footer}"></div>
<script src="/k_market/js/auth-nav.js" th:src="@{/js/auth-nav.js}"></script>
</body>
</html>
