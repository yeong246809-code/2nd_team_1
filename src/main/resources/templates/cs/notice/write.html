<!DOCTYPE html>

<html lang="ko"><head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>공지사항 보기 - K-market</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&amp;family=Be+Vietnam+Pro:wght@400;500;600&amp;display=swap" rel="stylesheet"/>

                        "secondary": "#3e6659",

                        "on-background": "#191c1d",
                        "primary-fixed": "#c8e8f2",
                        "outline": "#72787a",
                        "tertiary-fixed-dim": "#eabda2",
                        "primary-fixed-dim": "#acccd5",
                        "surface-tint": "#45636b",
                        "inverse-primary": "#acccd5",

    <style id="kmarket-cs-common-style">
        .font-display-lg, .font-headline-lg, .font-headline-md, .font-headline-lg-mobile { font-family: "Plus Jakarta Sans", sans-serif; }
        .font-body-md, .font-body-lg, .font-label-md, .font-label-sm { font-family: "Be Vietnam Pro", sans-serif; }
        .text-label-sm { font-size: 12px; line-height: 1.2; font-weight: 600; }
        .text-label-md { font-size: 14px; line-height: 1.4; letter-spacing: 0.01em; font-weight: 500; }
        .text-body-md { font-size: 16px; line-height: 1.6; font-weight: 400; }
        .text-body-lg { font-size: 18px; line-height: 1.6; font-weight: 400; }
        .text-headline-md { font-size: 20px; line-height: 1.4; font-weight: 600; }
        .text-headline-lg-mobile { font-size: 24px; line-height: 1.3; font-weight: 600; }
        .text-headline-lg { font-size: 32px; line-height: 1.3; font-weight: 600; }
        .text-display-lg { font-size: 48px; line-height: 1.2; letter-spacing: -0.02em; font-weight: 700; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; font-size: 20px; line-height: 1; }
    </style>
</head>
<body class="bg-background text-on-background font-body-md min-h-screen flex flex-col antialiased">
<div th:replace="~{layout/site :: header}"></div>
<!-- Main -->
<main class="flex-1 bg-background">
    <section class="max-w-container-max mx-auto px-md py-xl">

        <!-- Title -->
        <div class="text-center mb-xl">
            <h1 class="text-3xl font-bold text-primary mb-sm">공지사항 작성</h1>
            <p class="text-on-surface-variant text-sm">K-market의 공지사항과 이벤트 내용을 등록합니다.</p>
        </div>

        <div class="grid grid-cols-12 gap-lg">

            <!-- Aside -->
            <aside class="col-span-3">
                <div class="bg-surface rounded-xl border border-outline-variant p-lg shadow-sm">
                    <h2 class="text-lg font-bold text-primary mb-md">고객센터</h2>

                    <ul class="space-y-sm text-sm">
                        <li>
                            <a th:href="@{/cs/notice/list}"
                               class="block px-base py-sm rounded-lg bg-primary text-white font-semibold">
                                공지사항
                            </a>
                        </li>
                        <li>
                            <a th:href="@{/cs/faq/list}"
                               class="block px-base py-sm rounded-lg hover:bg-surface-variant">
                                자주하는 질문
                            </a>
                        </li>
                        <li>
                            <a th:href="@{/cs/qna/list}"
                               class="block px-base py-sm rounded-lg hover:bg-surface-variant">
                                문의하기
                            </a>
                        </li>
                    </ul>
                </div>
            </aside>

            <!-- Content -->
            <section class="col-span-9">
                <form th:action="@{/cs/notice/write}" method="post"
                      class="bg-surface rounded-xl border border-outline-variant shadow-sm p-xl">

                    <!-- 작성자 -->
                    <input type="hidden" name="memberNo" th:value="${session.sessUser.memberNo}">

                    <div class="border-b border-outline-variant pb-md mb-lg">
                        <h2 class="text-xl font-bold text-primary">공지사항 등록</h2>
                    </div>

                    <!-- 분류 -->
                    <div class="mb-lg">
                        <label class="block text-sm font-semibold mb-sm">분류</label>
                        <select name="type"
                                class="w-full h-11 px-base border border-outline-variant rounded-lg bg-white text-sm pr-8">
                            <option value="notice">공지</option>
                            <option value="event">이벤트</option>
                            <option value="delivery">배송</option>
                            <option value="payment">결제</option>
                            <option value="service">서비스</option>
                        </select>
                    </div>

                    <!-- 제목 -->
                    <div class="mb-lg">
                        <label class="block text-sm font-semibold mb-sm">제목</label>
                        <input type="text"
                               name="title"
                               placeholder="공지사항 제목을 입력하세요."
                               class="w-full h-11 px-base border border-outline-variant rounded-lg text-sm focus:outline-none focus:border-primary">
                    </div>

                    <!-- 내용 -->
                    <div class="mb-lg">
                        <label class="block text-sm font-semibold mb-sm">내용</label>
                        <textarea name="content"
                                  rows="14"
                                  placeholder="공지사항 내용을 입력하세요."
                                  class="w-full px-base py-base border border-outline-variant rounded-lg text-sm resize-none focus:outline-none focus:border-primary"></textarea>
                    </div>

                    <!-- 버튼 -->
                    <div class="flex justify-end gap-sm pt-md border-t border-outline-variant">
                        <a th:href="@{/cs/notice/list}"
                           class="px-lg py-sm border border-outline-variant rounded-lg text-sm hover:bg-surface-variant">
                            취소
                        </a>

                        <button type="submit"
                                class="px-lg py-sm bg-primary text-white rounded-lg text-sm font-semibold hover:opacity-90">
                            등록하기
                        </button>
                    </div>

                </form>
            </section>

        </div>
    </section>
</main>
<div th:replace="~{layout/site :: footer}"></div>
<script src="/k_market/js/auth-nav.js" th:src="@{/js/auth-nav.js}"></script>
</body>
</html>
