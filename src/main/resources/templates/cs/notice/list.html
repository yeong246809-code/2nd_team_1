<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>K-market 고객센터 - 공지사항</title>

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@600;700&display=swap" rel="stylesheet">

    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "on-primary-fixed": "#001f26",
                        "secondary": "#3e6659",
                        "surface-container-low": "#f3f4f5",
                        "outline": "#72787a",
                        "inverse-primary": "#acccd5",
                        "on-surface": "#191c1d",
                        "surface-container-high": "#e7e8e9",
                        "secondary-container": "#c0ecdc",
                        "on-secondary-container": "#446c5f",
                        "on-surface-variant": "#41484a",
                        "on-primary": "#ffffff",
                        "surface-container-lowest": "#ffffff",
                        "on-background": "#191c1d",
                        "surface-container-highest": "#e1e3e4",
                        "surface": "#f8f9fa",
                        "primary": "#14333b",
                        "surface-variant": "#e1e3e4",
                        "outline-variant": "#c1c7ca",
                        "background": "#f8f9fa"
                    },
                    borderRadius: {
                        DEFAULT: "0.25rem",
                        lg: "0.5rem",
                        xl: "0.75rem",
                        full: "9999px"
                    },
                    spacing: {
                        sm: "12px",
                        base: "8px",
                        xs: "4px",
                        "container-max": "1280px",
                        "margin-mobile": "16px",
                        xl: "80px",
                        lg: "48px",
                        md: "24px",
                        gutter: "24px"
                    },
                    fontFamily: {
                        "label-md": ["Be Vietnam Pro"],
                        "body-lg": ["Be Vietnam Pro"],
                        "headline-md": ["Plus Jakarta Sans"],
                        "headline-lg-mobile": ["Plus Jakarta Sans"],
                        "label-sm": ["Be Vietnam Pro"],
                        "display-lg": ["Plus Jakarta Sans"],
                        "body-md": ["Be Vietnam Pro"],
                        "headline-lg": ["Plus Jakarta Sans"]
                    },
                    fontSize: {
                        "label-md": ["14px", { lineHeight: "1.4", letterSpacing: "0.01em", fontWeight: "500" }],
                        "body-lg": ["18px", { lineHeight: "1.6", fontWeight: "400" }],
                        "headline-md": ["20px", { lineHeight: "1.4", fontWeight: "600" }],
                        "headline-lg-mobile": ["24px", { lineHeight: "1.3", fontWeight: "600" }],
                        "label-sm": ["12px", { lineHeight: "1.2", fontWeight: "600" }],
                        "display-lg": ["48px", { lineHeight: "1.2", letterSpacing: "-0.02em", fontWeight: "700" }],
                        "body-md": ["16px", { lineHeight: "1.6", fontWeight: "400" }],
                        "headline-lg": ["32px", { lineHeight: "1.3", fontWeight: "600" }]
                    }
                }
            }
        }
    </script>

    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            font-size: 20px;
            line-height: 1;
        }
    </style>
</head>

<body class="bg-background text-on-background font-body-md min-h-screen flex flex-col antialiased">

<!-- Header -->
<div th:replace="~{layout/site :: header}"></div>
<!-- Main -->
<main class="flex-1 w-full max-w-container-max mx-auto px-md py-lg flex flex-col md:flex-row gap-lg">

    <!-- Sidebar -->
    <aside class="w-full md:w-64 shrink-0 flex flex-col gap-base">
        <h2 class="font-headline-md text-headline-md text-primary mb-sm px-sm">고객센터</h2>

        <nav class="flex flex-col gap-xs">
            <a class="font-label-md text-label-md text-primary font-bold bg-secondary-container rounded-lg p-sm flex items-center gap-sm transition-all duration-200"
               th:href="@{/cs/notice/list}">
                <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">campaign</span>
                공지사항
            </a>

            <a class="font-label-md text-label-md text-on-surface-variant hover:bg-surface-variant rounded-lg p-sm flex items-center gap-sm transition-all duration-200"
               th:href="@{/cs/faq/list}">
                <span class="material-symbols-outlined">help</span>
                자주묻는 질문
            </a>

            <a class="font-label-md text-label-md text-on-surface-variant hover:bg-surface-variant rounded-lg p-sm flex items-center gap-sm transition-all duration-200"
               th:href="@{/cs/qna/list}">
                <span class="material-symbols-outlined">edit_note</span>
                1:1 문의
            </a>
        </nav>
    </aside>

    <!-- Content -->
    <section class="flex-1 flex flex-col gap-md min-w-0">

        <!-- Page Header -->
        <div class="flex justify-between items-center mb-4">
            <h3 class="text-2xl font-bold text-primary">공지사항</h3>


        </div>

        <!-- Type Filter -->
        <div class="flex gap-sm overflow-x-auto pb-sm">
            <a th:href="@{/cs/notice/list}"
               class="px-md py-sm rounded-full font-label-md text-label-md whitespace-nowrap transition-colors"
               th:classappend="${param.type == null} ? ' bg-primary text-on-primary' : ' bg-surface-container-low hover:bg-surface-variant text-on-surface'">
                전체
            </a>

            <a th:href="@{/cs/notice/list(type='고객서비스')}"
               class="px-md py-sm rounded-full font-label-md text-label-md whitespace-nowrap transition-colors"
               th:classappend="${param.type != null and param.type[0] == '고객서비스'} ? ' bg-primary text-on-primary' : ' bg-surface-container-low hover:bg-surface-variant text-on-surface'">
                고객서비스
            </a>

            <a th:href="@{/cs/notice/list(type='안전거래')}"
               class="px-md py-sm rounded-full font-label-md text-label-md whitespace-nowrap transition-colors"
               th:classappend="${param.type != null and param.type[0] == '안전거래'} ? ' bg-primary text-on-primary' : ' bg-surface-container-low hover:bg-surface-variant text-on-surface'">
                안전거래
            </a>

            <a th:href="@{/cs/notice/list(type='위해상품')}"
               class="px-md py-sm rounded-full font-label-md text-label-md whitespace-nowrap transition-colors"
               th:classappend="${param.type != null and param.type[0] == '위해상품'} ? ' bg-primary text-on-primary' : ' bg-surface-container-low hover:bg-surface-variant text-on-surface'">
                위해상품
            </a>

            <a th:href="@{/cs/notice/list(type='이벤트당첨')}"
               class="px-md py-sm rounded-full font-label-md text-label-md whitespace-nowrap transition-colors"
               th:classappend="${param.type != null and param.type[0] == '이벤트당첨'} ? ' bg-primary text-on-primary' : ' bg-surface-container-low hover:bg-surface-variant text-on-surface'">
                이벤트당첨
            </a>
        </div>

        <!-- List Summary -->
        <p class="font-label-md text-label-md text-on-surface-variant mt-sm">
            공지사항 전체 내용 입니다.
        </p>

        <!-- Notice Table -->
        <div class="bg-surface-container-lowest rounded-xl shadow-sm border border-surface-variant overflow-hidden">
            <table class="w-full text-left border-collapse">
                <thead class="bg-surface-container-low font-label-md text-label-md text-on-surface">
                <tr>
                    <th class="py-md px-md font-semibold border-b border-surface-variant w-[80px] text-center">번호</th>
                    <th class="py-md px-md font-semibold border-b border-surface-variant">제목</th>
                    <th class="py-md px-md font-semibold border-b border-surface-variant w-[120px] text-center">작성일</th>
                </tr>
                </thead>

                <tbody class="font-body-md text-body-md text-on-background divide-y divide-surface-variant">

                <!-- 공지사항이 없을 때 -->
                <tr th:if="${#lists.isEmpty(notices)}">
                    <td colspan="3" class="py-xl px-md text-center text-on-surface-variant">
                        등록된 공지사항이 없습니다.
                    </td>
                </tr>

                <!-- 공지사항 목록 출력 -->
                <tr th:each="notice, stat : ${notices}"
                    class="hover:bg-surface-container-low transition-colors group">

                    <!-- 번호 -->
                    <td class="px-md py-md text-center text-on-surface-variant"
                        th:text="${pageResponseDTO != null ? pageResponseDTO.startNo - stat.index : stat.count}">
                        1
                    </td>

                    <!-- 제목 / 분류 -->
                    <td class="px-md py-md">
                        <div class="flex items-center gap-sm">
                            <span th:class="${notice.type == '이벤트당첨' or notice.type == '이벤트'}
                                    ? 'px-2 py-1 bg-secondary-container rounded text-xs font-bold text-on-secondary-container'
                                    : 'px-2 py-1 bg-surface-container-highest rounded text-xs font-bold text-on-surface-variant'"
                                  th:text="|[${notice.type}]|">
                                [공지]
                            </span>

                            <a class="group-hover:text-primary transition-colors font-semibold text-body-lg"
                               th:href="@{/cs/notice/view/{no}(no=${notice.no})}"
                               th:text="${notice.title}">
                                공지사항 제목입니다.
                            </a>
                        </div>
                    </td>

                    <!-- 작성일 -->
                    <td class="px-md py-md text-center text-on-surface-variant font-label-sm"
                        th:text="${#temporals.format(notice.createdAt, 'yy.MM.dd')}">
                        24.01.01
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <!-- Pagination -->
        <div class="flex justify-center items-center gap-sm mt-lg"
             th:if="${pageResponseDTO != null and pageResponseDTO.end > 0}">

            <!-- 이전 페이지 -->
            <a th:href="@{/cs/notice/list(pg=${pageResponseDTO.start - 1}, type=${param.type != null ? param.type[0] : null})}"
               th:classappend="${!pageResponseDTO.prev} ? ' pointer-events-none opacity-50'"
               class="p-sm flex items-center justify-center text-on-surface-variant hover:text-primary transition-colors">
                <span class="material-symbols-outlined text-[20px]">chevron_left</span>
                <span class="font-label-md ml-xs">이전</span>
            </a>

            <!-- 페이지 번호 -->
            <div class="flex items-center gap-xs">
                <a th:each="num : ${#numbers.sequence(pageResponseDTO.start, pageResponseDTO.end)}"
                   th:href="@{/cs/notice/list(pg=${num}, type=${param.type != null ? param.type[0] : null})}"
                   th:text="${num}"
                   th:classappend="${num == pageResponseDTO.pg}
                        ? ' bg-primary text-on-primary font-bold'
                        : ' hover:bg-surface-container-highest text-on-surface'"
                   class="w-8 h-8 flex items-center justify-center rounded-full font-medium text-label-md transition-colors">
                    1
                </a>
            </div>

            <!-- 다음 페이지 -->
            <a th:href="@{/cs/notice/list(pg=${pageResponseDTO.end + 1}, type=${param.type != null ? param.type[0] : null})}"
               th:classappend="${!pageResponseDTO.next} ? ' pointer-events-none opacity-50'"
               class="p-sm flex items-center justify-center text-on-surface-variant hover:text-primary transition-colors">
                <span class="font-label-md mr-xs">다음</span>
                <span class="material-symbols-outlined text-[20px]">chevron_right</span>
            </a>
        </div>
    </section>
</main>

<!-- Footer -->
<div th:replace="~{layout/site :: footer}"></div>
<script src="/k_market/js/auth-nav.js" th:src="@{/js/auth-nav.js}"></script>
</body>
</html>
