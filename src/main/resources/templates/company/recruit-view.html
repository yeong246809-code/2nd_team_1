<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <!-- 수정 완료: \'ADMIN\' -> 'ADMIN' -->
    <title th:text="${recruit.id != 0} ? (${#authorization.expression('hasRole(\'ADMIN\')')} ? '채용공고 수정 | K-market' : '채용공고 상세보기 | K-market') : '채용공고 등록 | K-market'">채용공고 등록 | K-market</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&amp;family=Plus+Jakarta+Sans:wght@600;700&amp;display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-container-high": "#e7e8e9", "surface": "#f8f9fa", "on-surface-variant": "#41484a",
                        "background": "#f8f9fa", "secondary-container": "#c0ecdc", "inverse-primary": "#acccd5",
                        "on-tertiary-container": "#d6ab90", "surface-variant": "#e1e3e4", "on-error-container": "#93000a",
                        "tertiary": "#452916", "outline": "#72787a", "on-tertiary": "#ffffff",
                        "on-secondary-container": "#446c5f", "on-primary-fixed-variant": "#2d4b53", "primary-fixed": "#c8e8f2",
                        "outline-variant": "#c1c7ca", "tertiary-container": "#5e3f2a", "secondary": "#3e6659",
                        "secondary-fixed-dim": "#a5d0c0", "on-background": "#191c1d", "inverse-surface": "#2e3132",
                        "error-container": "#ffdad6", "surface-tint": "#45636b", "surface-container": "#edeeef",
                        "on-primary": "#ffffff", "inverse-on-surface": "#f0f1f2", "surface-container-low": "#f3f4f5",
                        "surface-container-highest": "#e1e3e4", "surface-container-lowest": "#ffffff",
                        "on-secondary-fixed-variant": "#264e42", "error": "#ba1a1a", "on-tertiary-fixed-variant": "#5f402b",
                        "on-secondary": "#ffffff", "on-primary-container": "#99b9c2", "surface-dim": "#d9dadb",
                        "secondary-fixed": "#c0ecdc", "on-surface": "#191c1d", "on-tertiary-fixed": "#2d1605",
                        "on-primary-fixed": "#001f26", "on-error": "#ffffff", "on-secondary-fixed": "#002018",
                        "primary": "#14333b", "surface-bright": "#f8f9fa", "tertiary-fixed": "#ffdcc7",
                        "primary-fixed-dim": "#acccd5", "primary-container": "#2c4a52", "tertiary-fixed-dim": "#eabda2"
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-background text-on-background font-body-md antialiased overflow-x-hidden">

<header class="w-full bg-white border-b border-gray-200 sticky top-0 z-50 shadow-sm">
    <div class="max-w-7xl mx-auto px-4">
        <div class="flex items-center justify-between py-6">
            <a th:href="@{/}" href="/" class="text-3xl font-black text-primary tracking-tighter">K-market</a>
        </div>
    </div>
</header>

<main class="max-w-3xl mx-auto px-4 py-12">

    <div class="mb-8">
        <div class="text-xs text-gray-400 mb-2">회사소개 &gt; 채용공고</div>
        <!-- 수정 완료: \'ADMIN\' -> 'ADMIN' -->
        <h1 class="text-3xl font-extrabold text-primary tracking-tight"
            th:text="${recruit.id != 0} ? (${#authorization.expression('hasRole('ADMIN')')} ? '채용공고 수정' : '채용공고 상세보기') : '채용공고 등록'">채용공고 등록</h1>
    </div>

    <form th:action="${recruit.id != 0} ? @{/company/recruit/edit} : @{/company/recruit/write}"
          th:object="${recruit}" method="post" class="bg-white rounded-2xl border border-gray-200 shadow-sm p-8 space-y-6">

        <!-- 수정일 때만 id를 같이 전송 -->
        <input type="hidden" th:if="${recruit.id != 0}" th:field="*{id}"/>

        <!-- 수정 완료: [1] 관리자 권한 조건식 수정 -->
        <div th:if="${#authorization.expression('hasRole('ADMIN')')}" class="space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1.5">채용부서</label>
                    <input type="text" th:field="*{department}" required placeholder="예: 광고사업"
                           class="w-full rounded-lg border-gray-300 focus:border-primary focus:ring-primary text-sm"/>
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1.5">경력사항</label>
                    <input type="text" th:field="*{experienceType}" required placeholder="예: 경력 4 ~ 15년"
                           class="w-full rounded-lg border-gray-300 focus:border-primary focus:ring-primary text-sm"/>
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1.5">채용형태</label>
                    <select th:field="*{employmentType}" required
                            class="w-full rounded-lg border-gray-300 focus:border-primary focus:ring-primary text-sm">
                        <option value="">선택하세요</option>
                        <option value="정규직">정규직</option>
                        <option value="계약직">계약직</option>
                        <option value="인턴">인턴</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1.5">상태</label>
                    <select th:field="*{status}" required
                            class="w-full rounded-lg border-gray-300 focus:border-primary focus:ring-primary text-sm">
                        <option value="">선택하세요</option>
                        <option value="모집중">모집중</option>
                        <option value="종료">종료</option>
                    </select>
                </div>
            </div>

            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1.5">제목</label>
                <input type="text" th:field="*{title}" required placeholder="예: 광고 플랫폼 기획"
                       class="w-full rounded-lg border-gray-300 focus:border-primary focus:ring-primary text-sm"/>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1.5">모집 시작일</label>
                    <input type="date" th:field="*{startDate}" required
                           class="w-full rounded-lg border-gray-300 focus:border-primary focus:ring-primary text-sm"/>
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1.5">모집 종료일</label>
                    <input type="date" th:field="*{endDate}" required
                           class="w-full rounded-lg border-gray-300 focus:border-primary focus:ring-primary text-sm"/>
                </div>
            </div>

            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1.5">상세 내용</label>
                <textarea th:field="*{content}" rows="10" placeholder="채용 상세 내용을 입력하세요."
                          class="w-full rounded-lg border-gray-300 focus:border-primary focus:ring-primary text-sm"></textarea>
            </div>
        </div>

        <!-- 수정 완료: [2] 일반 회원 조건식 수정 -->
        <div th:if="${!#authorization.expression('hasRole('ADMIN')')}" class="space-y-8">

            <!-- 공고 제목 및 모집 상태 -->
            <div class="flex items-center justify-between border-b border-gray-200 pb-4">
                <h2 class="text-2xl font-bold text-gray-900" th:text="*{title}">공고 제목</h2>
                <div>
                    <span th:if="*{status == '모집중'}" class="px-3 py-1 rounded-full text-xs font-bold bg-green-100 text-green-800">모집중</span>
                    <span th:if="*{status == '종료'}" class="px-3 py-1 rounded-full text-xs font-bold bg-gray-100 text-gray-600">종료</span>
                </div>
            </div>

            <!-- 핵심 조건 테이블 형태의 뷰 -->
            <div class="grid grid-cols-2 md:grid-cols-4 gap-6 p-5 bg-gray-50 rounded-xl border border-gray-100">
                <div>
                    <div class="text-xs font-semibold text-gray-400 mb-1">채용부서</div>
                    <div class="text-sm font-bold text-gray-800" th:text="*{department}">부서명</div>
                </div>
                <div>
                    <div class="text-xs font-semibold text-gray-400 mb-1">경력사항</div>
                    <div class="text-sm font-bold text-gray-800" th:text="*{experienceType}">경력 조건</div>
                </div>
                <div>
                    <div class="text-xs font-semibold text-gray-400 mb-1">채용형태</div>
                    <div class="text-sm font-bold text-gray-800" th:text="*{employmentType}">정규직/계약직</div>
                </div>
                <div>
                    <div class="text-xs font-semibold text-gray-400 mb-1">모집 기간</div>
                    <div class="text-xs font-bold text-gray-800">
                        <span th:text="*{startDate}">2026-01-01</span> ~ <span th:text="*{endDate}">2026-02-01</span>
                    </div>
                </div>
            </div>

            <!-- 상세 본문 영역 -->
            <div class="space-y-3">
                <div class="text-sm font-bold text-gray-900 border-b border-gray-100 pb-2">상세 모집 요강</div>
                <div class="text-sm text-gray-700 leading-relaxed whitespace-pre-line min-h-[200px]" th:text="*{content}">
                    채용 상세 내용이 여기에 들어갑니다.
                </div>
            </div>
        </div>

        <!-- 하단 버튼 제어 영역 -->
        <div class="flex justify-between items-center pt-4 border-t border-gray-100">

            <!-- 수정 완료: [ADMIN 계정] 조건식 수정 -->
            <div th:if="${#authorization.expression('hasRole('ADMIN')')}" class="w-full flex justify-between items-center">
                <div>
                    <a th:if="${recruit.id != 0}"
                       th:href="@{/company/recruit/delete(id=${recruit.id})}"
                       onclick="return confirm('정말로 이 채용공고를 삭제하시겠습니까?');"
                       class="px-5 py-2.5 rounded-lg bg-red-600 text-white text-sm font-bold hover:bg-red-700 transition-colors">
                        삭제하기
                    </a>
                </div>
                <div class="flex gap-3">
                    <a th:href="@{/company/recruit}" class="px-5 py-2.5 rounded-lg border border-gray-300 text-gray-600 text-sm font-bold hover:bg-gray-50 transition-colors">목록으로</a>
                    <button type="submit" class="px-6 py-2.5 rounded-lg bg-primary text-white text-sm font-bold hover:opacity-90 transition-opacity"
                            th:text="${recruit.id != 0} ? '수정하기' : '등록하기'">등록하기</button>
                </div>
            </div>

            <!-- 수정 완료: [비회원 또는 일반 회원] 조건식 수정 -->
            <div th:if="${!#authorization.expression('hasRole('ADMIN')')}" class="w-full flex justify-between items-center">
                <div>
                    <a th:href="@{/company/recruit}" class="px-5 py-2.5 rounded-lg border border-gray-300 text-gray-600 text-sm font-bold hover:bg-gray-50 transition-colors">목록으로</a>
                </div>
                <div>
                    <a th:if="${recruit.status == '모집중'}"
                       th:href="@{/company/recruit/apply(id=${recruit.id})}"
                       onclick="alert('채용 지원 페이지로 이동하거나 접수가 완료되었습니다.');"
                       class="px-6 py-2.5 rounded-lg bg-primary text-white text-sm font-bold hover:opacity-90 transition-opacity">
                        지원하기
                    </a>
                    <button th:if="${recruit.status == '종료'}" disabled
                            class="px-6 py-2.5 rounded-lg bg-gray-300 text-gray-500 text-sm font-bold cursor-not-allowed">
                        모집 종료
                    </button>
                </div>
            </div>

        </div>
    </form>

</main>

<footer class="bg-gray-50 border-t border-gray-200 mt-20 pt-12 pb-12">
    <div class="max-w-7xl mx-auto px-4 text-center text-xs text-gray-400">
        © 2026 K-market. 모든 권리 보유.
    </div>
</footer>

</body>
</html>
