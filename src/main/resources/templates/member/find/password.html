<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>비밀번호 찾기 - K-market</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700&family=Be+Vietnam+Pro:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family:'Be Vietnam Pro', sans-serif; background:#f8f9fa; color:#191c1d; }
        h1 { font-family:'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="min-h-screen flex flex-col">
<div th:replace="~{layout/site :: header}"></div>
<main class="flex-1 flex items-center justify-center px-4 py-16">
    <section class="w-full max-w-[600px] rounded-xl border border-[#e1e3e4] bg-white p-8 shadow-sm">
        <h1 class="mb-6 border-b-2 border-[#14333b] pb-3 text-center text-3xl font-bold text-[#14333b]">비밀번호 찾기</h1>

        <div th:if="${findError}" class="mb-4 rounded-lg bg-[#ffdad6] px-4 py-3 text-sm font-medium text-[#ba1a1a]" th:text="${findError}"></div>
        <div th:if="${findMessage}" class="mb-4 rounded-lg bg-[#c0ecdc] px-4 py-3 text-sm font-medium text-[#264e42]" th:text="${findMessage}"></div>

        <div class="mb-6 flex border-b border-[#e1e3e4]">
            <button type="button" class="find-tab flex-1 border-b-2 py-3 text-sm font-semibold" data-tab="email">이메일 인증</button>
            <button type="button" class="find-tab flex-1 border-b-2 py-3 text-sm font-semibold" data-tab="phone">휴대폰 확인</button>
        </div>

        <form id="email-form" class="find-panel space-y-5" th:action="@{/member/find/password}" method="post">
            <input type="hidden" name="mode" value="email">
            <label class="block">
                <span class="mb-2 block text-sm font-semibold">아이디</span>
                <input class="w-full rounded-lg border border-[#c1c7ca] bg-[#f8f9fa] px-4 py-3 outline-none focus:border-[#14333b]" name="id" th:value="${id}" placeholder="아이디를 입력하세요" required>
            </label>
            <label class="block">
                <span class="mb-2 block text-sm font-semibold">이메일</span>
                <div class="flex gap-2">
                    <input id="find-pw-email" class="min-w-0 flex-1 rounded-lg border border-[#c1c7ca] bg-[#f8f9fa] px-4 py-3 outline-none focus:border-[#14333b]" name="email" th:value="${email}" type="email" placeholder="이메일 주소" required>
                    <button class="email-send h-12 shrink-0 rounded-lg border border-[#14333b] px-4 text-sm font-semibold text-[#14333b]" data-email-input="find-pw-email" type="button">인증번호 받기</button>
                </div>
            </label>
            <label class="block">
                <span class="mb-2 block text-sm font-semibold">인증번호</span>
                <div class="flex gap-2">
                    <input id="find-pw-email-code" class="min-w-0 flex-1 rounded-lg border border-[#c1c7ca] bg-[#f8f9fa] px-4 py-3 outline-none focus:border-[#14333b]" placeholder="인증번호 6자리">
                    <button class="email-verify h-12 shrink-0 rounded-lg bg-[#3e6659] px-5 text-sm font-semibold text-white" data-email-input="find-pw-email" data-code-input="find-pw-email-code" type="button">확인</button>
                </div>
            </label>
            <p class="email-message rounded-lg bg-[#f3f4f5] px-4 py-3 text-sm text-[#41484a]">이메일 인증 후 비밀번호 재설정을 진행할 수 있습니다.</p>
            <button class="h-12 w-full rounded-lg bg-[#14333b] text-base font-bold text-white" type="submit">확인하기</button>
        </form>

        <form id="phone-form" class="find-panel hidden space-y-5" th:action="@{/member/find/password}" method="post">
            <input type="hidden" name="mode" value="phone">
            <label class="block">
                <span class="mb-2 block text-sm font-semibold">아이디</span>
                <input class="w-full rounded-lg border border-[#c1c7ca] bg-[#f8f9fa] px-4 py-3 outline-none focus:border-[#14333b]" name="id" th:value="${id}" placeholder="아이디를 입력하세요" required>
            </label>
            <label class="block">
                <span class="mb-2 block text-sm font-semibold">가입된 전화번호</span>
                <input class="w-full rounded-lg border border-[#c1c7ca] bg-[#f8f9fa] px-4 py-3 outline-none focus:border-[#14333b]" name="phone" th:value="${phone}" placeholder="'-' 없이 입력해도 됩니다" required>
            </label>
            <p class="rounded-lg bg-[#f3f4f5] px-4 py-3 text-sm text-[#41484a]">전화번호는 별도 인증 없이 가입 정보에 등록된 번호와 일치하는지만 확인합니다.</p>
            <button class="h-12 w-full rounded-lg bg-[#14333b] text-base font-bold text-white" type="submit">확인하기</button>
        </form>

        <div class="mt-6 flex justify-between text-sm">
            <a class="text-[#41484a] hover:text-[#14333b]" th:href="@{/member/login}">로그인</a>
            <a class="font-semibold text-[#14333b]" th:href="@{/member/find/userid}">아이디 찾기</a>
        </div>
    </section>
</main>
<div id="password-reset-modal"
     th:if="${resetReady}"
     class="fixed inset-0 z-[80] flex items-center justify-center bg-black/45 px-4 py-8">
    <div class="w-full max-w-[480px] rounded-2xl bg-white p-7 shadow-2xl">
        <div class="mb-5 flex items-start justify-between gap-4">
            <div>
                <h2 class="text-2xl font-bold text-[#14333b]">비밀번호 재설정</h2>
                <p class="mt-1 text-sm text-[#41484a]">새 비밀번호를 입력해주세요.</p>
            </div>
            <button type="button" class="modal-close rounded-full p-2 text-[#41484a] hover:bg-[#f3f4f5]" aria-label="닫기">
                <span class="material-symbols-outlined">close</span>
            </button>
        </div>
        <div th:if="${findError}" class="mb-4 rounded-lg bg-[#ffdad6] px-4 py-3 text-sm font-medium text-[#ba1a1a]" th:text="${findError}"></div>
        <form class="space-y-5" th:action="@{/member/find/password/reset}" method="post">
            <input type="hidden" name="id" th:value="${resetTargetId}">
            <div class="rounded-lg bg-[#f3f4f5] px-4 py-3 text-sm text-[#41484a]">
                <span class="font-semibold text-[#14333b]" th:text="${resetTargetId}">user</span>
                아이디의 비밀번호를 변경합니다.
            </div>
            <label class="block">
                <span class="mb-2 block text-sm font-semibold">새 비밀번호</span>
                <input id="new-password" class="w-full rounded-lg border border-[#c1c7ca] bg-[#f8f9fa] px-4 py-3 outline-none focus:border-[#14333b]" name="password" type="password" placeholder="새 비밀번호" required>
            </label>
            <label class="block">
                <span class="mb-2 block text-sm font-semibold">비밀번호 확인</span>
                <input id="confirm-password" class="w-full rounded-lg border border-[#c1c7ca] bg-[#f8f9fa] px-4 py-3 outline-none focus:border-[#14333b]" name="passwordConfirm" type="password" placeholder="새 비밀번호 재입력" required>
            </label>
            <p id="password-match-message" class="hidden text-sm"></p>
            <div class="flex gap-3 pt-2">
                <button type="button" class="modal-close h-12 flex-1 rounded-lg border border-[#c1c7ca] font-semibold text-[#41484a] hover:bg-[#f3f4f5]">취소</button>
                <button class="h-12 flex-1 rounded-lg bg-[#14333b] font-bold text-white" type="submit">비밀번호 변경</button>
            </div>
        </form>
    </div>
</div>
<div th:replace="~{layout/site :: footer}"></div>
<script th:inline="javascript">
    const selectedMode = /*[[${selectedMode}]]*/ 'email';
</script>
<script>
    const tabs = document.querySelectorAll('.find-tab');
    const panels = { email: document.getElementById('email-form'), phone: document.getElementById('phone-form') };
    function activate(tab) {
        tabs.forEach((button) => {
            const active = button.dataset.tab === tab;
            button.classList.toggle('border-[#14333b]', active);
            button.classList.toggle('text-[#14333b]', active);
            button.classList.toggle('border-transparent', !active);
            button.classList.toggle('text-[#41484a]', !active);
        });
        Object.entries(panels).forEach(([key, panel]) => panel.classList.toggle('hidden', key !== tab));
    }
    tabs.forEach((button) => button.addEventListener('click', () => activate(button.dataset.tab)));
    activate(selectedMode || 'email');

    async function postForm(url, data) {
        const response = await fetch(url, { method: 'POST', body: data });
        return response.json();
    }
    document.querySelectorAll('.email-send').forEach((button) => button.addEventListener('click', async () => {
        const email = document.getElementById(button.dataset.emailInput).value;
        const message = button.closest('form').querySelector('.email-message');
        const result = await postForm('/member/email/send', new URLSearchParams({ email }));
        message.textContent = result.message;
        message.className = `email-message rounded-lg px-4 py-3 text-sm ${result.success ? 'bg-[#c0ecdc] text-[#264e42]' : 'bg-[#ffdad6] text-[#ba1a1a]'}`;
    }));
    document.querySelectorAll('.email-verify').forEach((button) => button.addEventListener('click', async () => {
        const email = document.getElementById(button.dataset.emailInput).value;
        const code = document.getElementById(button.dataset.codeInput).value;
        const message = button.closest('form').querySelector('.email-message');
        const result = await postForm('/member/email/verify', new URLSearchParams({ email, code }));
        message.textContent = result.message;
        message.className = `email-message rounded-lg px-4 py-3 text-sm ${result.success ? 'bg-[#c0ecdc] text-[#264e42]' : 'bg-[#ffdad6] text-[#ba1a1a]'}`;
    }));

    const newPassword = document.getElementById('new-password');
    const confirmPassword = document.getElementById('confirm-password');
    const passwordMessage = document.getElementById('password-match-message');
    function checkPasswordMatch() {
        if (!newPassword || !confirmPassword || !passwordMessage || !confirmPassword.value) return;
        const matched = newPassword.value === confirmPassword.value;
        passwordMessage.className = `text-sm ${matched ? 'text-[#3e6659]' : 'text-[#ba1a1a]'}`;
        passwordMessage.textContent = matched ? '비밀번호가 일치합니다.' : '비밀번호가 일치하지 않습니다.';
    }
    newPassword?.addEventListener('input', checkPasswordMatch);
    confirmPassword?.addEventListener('input', checkPasswordMatch);

    const resetModal = document.getElementById('password-reset-modal');
    if (resetModal) {
        document.body.style.overflow = 'hidden';
        resetModal.querySelectorAll('.modal-close').forEach((button) => {
            button.addEventListener('click', () => {
                resetModal.classList.add('hidden');
                document.body.style.overflow = '';
            });
        });
    }
</script>
<script th:src="@{/js/auth-nav.js}" src="/k_market/js/auth-nav.js"></script>
</body>
</html>
