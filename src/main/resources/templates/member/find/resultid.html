<body class="min-h-screen flex flex-col font-body-md text-body-md">

<div class="bg-surface-container-low rounded-lg p-md mb-md border border-surface-variant">
<div class="flex flex-col gap-sm">
<!-- Row: Name -->
<div class="flex border-b border-surface-variant pb-sm last:border-0 last:pb-0">
<div class="w-32 font-label-md text-label-md text-on-surface-variant font-medium flex items-center">이름</div>
<div class="flex-1 font-body-md text-body-md text-on-surface">홍길동</div>
</div>
<!-- Row: ID -->

<div class="w-32 font-label-md text-label-md text-on-surface-variant font-medium flex items-center">아이디</div>
<div class="flex-1 font-body-md text-body-md text-on-surface font-semibold text-primary">honggildong</div>
</div>

<div class="flex border-b border-surface-variant pb-sm last:border-0 last:pb-0">

</div>
<!-- Row: Join Date -->
<div class="flex border-b border-surface-variant pb-sm last:border-0 last:pb-0">
<div class="w-32 font-label-md text-label-md text-on-surface-variant font-medium flex items-center">가입일</div>
<div class="flex-1 font-body-md text-body-md text-on-surface text-on-surface-variant">2022-11-16 10:20:22</div>
</div>
</div>

            </p>

<a class="flex-1 bg-surface-variant text-on-surface-variant hover:bg-outline-variant hover:text-on-surface transition-colors duration-200 py-sm px-lg rounded-lg font-label-md text-label-md text-center font-medium" th:href="@{/member/login}" href="/member/login">
