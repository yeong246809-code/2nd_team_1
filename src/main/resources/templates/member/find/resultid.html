<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>아이디 찾기 결과 - K-market</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700&family=Be+Vietnam+Pro:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family:'Be Vietnam Pro', sans-serif; background:#f8f9fa; color:#191c1d; }
        h1 { font-family:'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="min-h-screen flex flex-col">
<div th:replace="~{layout/site :: header}"></div>
<main class="flex-1 flex items-center justify-center px-4 py-16">
    <section class="w-full max-w-[600px] rounded-xl border border-[#e1e3e4] bg-white p-8 shadow-sm">
        <h1 class="mb-6 border-b-2 border-[#14333b] pb-3 text-center text-3xl font-bold text-[#14333b]">아이디 찾기 결과</h1>
        <div th:if="${foundAccount == null}" class="rounded-lg bg-[#ffdad6] px-4 py-3 text-sm font-medium text-[#ba1a1a]">
            조회된 아이디가 없습니다. 아이디 찾기를 다시 진행해주세요.
        </div>
        <div th:if="${foundAccount != null}" class="rounded-lg border border-[#e1e3e4] bg-[#f3f4f5] p-5">
            <dl class="space-y-3">
                <div class="flex border-b border-[#e1e3e4] pb-3">
                    <dt class="w-28 shrink-0 text-sm font-semibold text-[#41484a]">이름</dt>
                    <dd class="min-w-0 flex-1" th:text="${foundAccount.name}">홍길동</dd>
                </div>
                <div class="flex border-b border-[#e1e3e4] pb-3">
                    <dt class="w-28 shrink-0 text-sm font-semibold text-[#41484a]">아이디</dt>
                    <dd class="min-w-0 flex-1 font-bold text-[#14333b]" th:text="${foundAccount.id}">honggildong</dd>
                </div>
                <div class="flex border-b border-[#e1e3e4] pb-3">
                    <dt class="w-28 shrink-0 text-sm font-semibold text-[#41484a]">이메일</dt>
                    <dd class="min-w-0 flex-1" th:text="${foundAccount.email}">user@example.com</dd>
                </div>
                <div class="flex">
                    <dt class="w-28 shrink-0 text-sm font-semibold text-[#41484a]">가입일</dt>
                    <dd class="min-w-0 flex-1 text-[#41484a]" th:text="${foundAccount.createdAt != null ? foundAccount.createdAt : '-'}">-</dd>
                </div>
            </dl>
        </div>
        <p class="my-6 text-center text-sm text-[#41484a]" th:text="${foundAccount != null ? '고객님의 정보와 일치하는 아이디입니다.' : '입력 정보를 다시 확인해주세요.'}">
            고객님의 정보와 일치하는 아이디입니다.
        </p>
        <div class="flex flex-col gap-3 sm:flex-row">
            <a class="flex-1 rounded-lg border border-[#c1c7ca] px-5 py-3 text-center font-semibold text-[#41484a] hover:bg-[#e1e3e4]" th:href="@{/member/find/userid}">다시 찾기</a>
            <a class="flex-1 rounded-lg bg-[#14333b] px-5 py-3 text-center font-semibold text-white" th:href="@{/member/login}">로그인</a>
            <a class="flex-1 rounded-lg bg-[#3e6659] px-5 py-3 text-center font-semibold text-white" th:href="@{/member/find/password}">비밀번호 찾기</a>
        </div>
    </section>
</main>
<div th:replace="~{layout/site :: footer}"></div>
<script th:src="@{/js/auth-nav.js}" src="/k_market/js/auth-nav.js"></script>
</body>
</html>
