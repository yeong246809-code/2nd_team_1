<!DOCTYPE html><html lang="ko" style=""><head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>K-market - 이용약관 동의</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Be+Vietnam+Pro:wght@400;500;600&amp;display=swap" rel="stylesheet">

      theme: {

          "colors": {

            "error": "#ba1a1a",
            "surface-container": "#edeeef",
            "surface": "#f8f9fa",
            "surface-dim": "#d9dadb",
            "on-secondary-fixed-variant": "#264e42",
            "primary-fixed-dim": "#acccd5",
            "surface-container-lowest": "#ffffff",
            "on-primary": "#ffffff",
            "secondary-fixed-dim": "#a5d0c0",
            "on-tertiary-fixed-variant": "#5f402b",
            "on-error-container": "#93000a",
            "tertiary-fixed-dim": "#eabda2",
            "on-background": "#191c1d",
            "on-secondary-container": "#446c5f",
            "on-primary-fixed-variant": "#2d4b53",

            "on-secondary": "#ffffff",
            "secondary-container": "#c0ecdc",
            "surface-variant": "#e1e3e4",

            "on-error": "#ffffff",

            "on-tertiary-fixed": "#2d1605",
            "tertiary": "#452916",
            "on-surface": "#191c1d",
            "primary-container": "#2c4a52",
            "inverse-on-surface": "#f0f1f2",
            "tertiary-fixed": "#ffdcc7",
            "inverse-surface": "#2e3132",
            "outline-variant": "#c1c7ca",
            "surface-container-high": "#e7e8e9",
            "primary-fixed": "#c8e8f2",
            "background": "#f8f9fa",
            "on-surface-variant": "#41484a",
            "outline": "#72787a",
            "on-tertiary": "#ffffff",
            "error-container": "#ffdad6",
            "secondary-fixed": "#c0ecdc",
            "inverse-primary": "#acccd5"

          "borderRadius": {

            "xl": "0.75rem",
            "full": "9999px"
          },
          "spacing": {
            "container-max": "1280px",
            "margin-mobile": "16px",
            "md": "24px",

            "xl": "80px",
            "xs": "4px",

            "sm": "12px"
          },
          "fontFamily": {

            "body-md": ["Be Vietnam Pro"],
            "label-sm": ["Be Vietnam Pro"],

            "headline-md": ["20px", {"lineHeight": "1.4", "fontWeight": "600"}],
            "headline-lg-mobile": ["24px", {"lineHeight": "1.3", "fontWeight": "600"}],

        },
      },
    }

  <style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    /* Custom scrollbar for terms boxes */
    .terms-scroll::-webkit-scrollbar {
      width: 6px;
    }
    .terms-scroll::-webkit-scrollbar-track {
      background: #f1f1f1;
      border-radius: 10px;
    }
    .terms-scroll::-webkit-scrollbar-thumb {
      background: #c1c7ca;
      border-radius: 10px;
    }
    .terms-scroll::-webkit-scrollbar-thumb:hover {
      background: #72787a;
    }
  </style>

<body class="bg-surface text-on-surface font-body-md selection:bg-primary-fixed-dim">
<!-- TopNavBar (Shared Component) -->
<div th:replace="~{layout/site :: header}"></div>
<main class="min-h-screen max-w-container-max mx-auto px-margin-mobile md:px-gutter py-lg">
  <!-- Progress Steps -->
  <div class="flex justify-center items-center mb-xl gap-xs md:gap-md">
    <div class="flex flex-col items-center gap-2">
      <div class="w-10 h-10 rounded-full bg-primary-container text-on-primary-container flex items-center justify-center font-bold">1</div>
      <span class="text-label-sm font-bold text-primary">약관동의</span>
    </div>
    <div class="w-12 h-[2px] bg-surface-variant mb-6"></div>
    <div class="flex flex-col items-center gap-2 opacity-50">
      <div class="w-10 h-10 rounded-full bg-surface-container-high text-on-surface-variant flex items-center justify-center font-bold">2</div>
      <span class="text-label-sm">정보입력</span>
    </div>
    <div class="w-12 h-[2px] bg-surface-variant mb-6"></div>
    <div class="flex flex-col items-center gap-2 opacity-50">
      <div class="w-10 h-10 rounded-full bg-surface-container-high text-on-surface-variant flex items-center justify-center font-bold">3</div>
      <span class="text-label-sm">가입완료</span>
    </div>
  </div>
  <section class="max-w-[800px] mx-auto">
    <div class="mb-lg">
      <h1 class="font-headline-lg text-headline-lg mb-2" th:text="|${memberTypeName} 약관동의|">회원가입 약관동의</h1>
      <p class="text-on-surface-variant font-body-md">K-market의 서비스를 이용하시려면 아래의 약관에 동의하셔야 합니다.</p>
    </div>
    <!-- Bento Layout for Terms -->
    <div class="flex flex-col gap-gutter">
      <!-- Select All -->
      <label class="flex items-center gap-md p-md bg-surface-container-low border border-outline-variant rounded-xl cursor-pointer hover:bg-surface-container transition-colors select-none">
        <input class="w-6 h-6 rounded border-outline text-primary focus:ring-primary cursor-pointer transition-all" id="selectAll" type="checkbox">
        <span class="font-headline-md text-headline-md text-primary">이용약관 전체동의</span>
      </label>
      <!-- Term 1: Required -->
      <div class="bg-surface-container-lowest p-md rounded-xl shadow-sm border border-transparent hover:border-outline-variant transition-all group">
        <div class="flex justify-between items-center mb-md">
          <label class="flex items-center gap-md cursor-pointer select-none">
            <input class="term-checkbox w-5 h-5 rounded border-outline text-primary focus:ring-primary cursor-pointer" name="term_required" type="checkbox">
            <span class="font-headline-md text-headline-md"><span th:text="${mainPolicy.policyType} + ' 동의'">이용약관 동의</span> <span class="text-error font-body-md">(필수)</span></span>
          </label>
          <span class="material-symbols-outlined text-outline group-hover:text-primary transition-colors">description</span>
        </div>
        <div class="bg-surface-container-low rounded-lg p-md h-32 overflow-y-auto terms-scroll text-on-surface-variant font-label-md leading-relaxed whitespace-pre-wrap" th:text="${mainPolicy.content}">
          DB policy 테이블의 약관 내용이 표시됩니다.
        </div>
      </div>
      <!-- Term 2: Required -->
      <div class="bg-surface-container-lowest p-md rounded-xl shadow-sm border border-transparent hover:border-outline-variant transition-all group">
        <div class="flex justify-between items-center mb-md">
          <label class="flex items-center gap-md cursor-pointer select-none">
            <input class="term-checkbox w-5 h-5 rounded border-outline text-primary focus:ring-primary cursor-pointer" name="term_required" type="checkbox">
            <span class="font-headline-md text-headline-md"><span th:text="${financePolicy.policyType}">전자금융거래 약관</span> <span class="text-error font-body-md">(필수)</span></span>
          </label>
          <span class="material-symbols-outlined text-outline group-hover:text-primary transition-colors">account_balance_wallet</span>
        </div>
        <div class="bg-surface-container-low rounded-lg p-md h-32 overflow-y-auto terms-scroll text-on-surface-variant font-label-md leading-relaxed whitespace-pre-wrap" th:text="${financePolicy.content}">
          DB policy 테이블의 전자금융거래 약관 내용이 표시됩니다.
        </div>
      </div>
      <!-- Term 3: Required -->
      <div class="bg-surface-container-lowest p-md rounded-xl shadow-sm border border-transparent hover:border-outline-variant transition-all group">
        <div class="flex justify-between items-center mb-md">
          <label class="flex items-center gap-md cursor-pointer select-none">
            <input class="term-checkbox w-5 h-5 rounded border-outline text-primary focus:ring-primary cursor-pointer" name="term_required" type="checkbox">
            <span class="font-headline-md text-headline-md"><span th:text="${privacyPolicy.policyType}">개인정보처리방침</span> <span class="text-error font-body-md">(필수)</span></span>
          </label>
          <span class="material-symbols-outlined text-outline group-hover:text-primary transition-colors">assignment_ind</span>
        </div>
        <div class="bg-surface-container-low rounded-lg p-md h-32 overflow-y-auto terms-scroll text-on-surface-variant font-label-md leading-relaxed whitespace-pre-wrap" th:text="${privacyPolicy.content}">
          DB policy 테이블의 개인정보처리방침 내용이 표시됩니다.
        </div>
      </div>
      <!-- Term 4: Optional -->
      <div class="bg-surface-container-lowest p-md rounded-xl shadow-sm border border-transparent hover:border-outline-variant transition-all group">
        <div class="flex justify-between items-center mb-md">
          <label class="flex items-center gap-md cursor-pointer select-none">
            <input class="term-checkbox w-5 h-5 rounded border-outline text-primary focus:ring-primary cursor-pointer" name="term_optional" type="checkbox">
            <span class="font-headline-md text-headline-md"><span th:text="${locationPolicy.policyType}">위치정보 이용약관</span> <span class="text-outline font-body-md">(선택)</span></span>
          </label>
          <span class="material-symbols-outlined text-outline group-hover:text-primary transition-colors">location_on</span>
        </div>
        <div class="bg-surface-container-low rounded-lg p-md h-32 overflow-y-auto terms-scroll text-on-surface-variant font-label-md leading-relaxed whitespace-pre-wrap" th:text="${locationPolicy.content}">
          DB policy 테이블의 위치정보 이용약관 내용이 표시됩니다.
        </div>
      </div>
      <!-- Action Button -->
      <div class="flex flex-col items-center gap-md mt-lg">
        <button class="w-full md:w-64 py-4 bg-primary text-on-primary font-bold rounded-full shadow-lg hover:bg-primary-container transition-all hover:scale-[1.02] active:scale-95 disabled:bg-surface-variant disabled:text-outline-variant disabled:cursor-not-allowed" id="submitBtn" type="button" data-next-url="/k_market/member/register?agreed=true" th:data-next-url="${memberType == 'seller'} ? @{/member/registerseller(agreed=true)} : @{/member/register(agreed=true)}" disabled="">
          동의하고 계속하기
        </button>
        <button class="text-on-surface-variant hover:text-primary font-label-md transition-colors underline underline-offset-4" type="button" th:onclick="|location.href='@{/member/join}'|">취소하고 돌아가기</button>
      </div>
    </div>
  </section>
</main>
<!-- Footer (Shared Component) -->
<div th:replace="~{layout/site :: footer}"></div>
<script>
  // Checkbox logic
  const selectAll = document.getElementById('selectAll');
  const termCheckboxes = document.querySelectorAll('.term-checkbox');
  const submitBtn = document.getElementById('submitBtn');
  const requiredCheckboxes = document.querySelectorAll('input[name="term_required"]');

  // Initial validation
  validateForm();

  selectAll.addEventListener('change', (e) => {
    termCheckboxes.forEach(cb => {
      cb.checked = e.target.checked;
    });
    validateForm();
  });

  termCheckboxes.forEach(cb => {
    cb.addEventListener('change', () => {
      const allChecked = Array.from(termCheckboxes).every(c => c.checked);
      selectAll.checked = allChecked;
      validateForm();
    });
  });

  function validateForm() {
    const allRequiredChecked = Array.from(requiredCheckboxes).every(c => c.checked);
    submitBtn.disabled = !allRequiredChecked;
  }

  submitBtn.addEventListener('click', () => {
    if(!submitBtn.disabled) {
      submitBtn.innerHTML = '<span class="material-symbols-outlined animate-spin">sync</span>';
      setTimeout(() => {
        sessionStorage.setItem('kmarket_terms_agreed', 'true');
        window.location.href = submitBtn.dataset.nextUrl || './register?agreed=true';
      }, 500);
    }
  });

  // Sticky Header effect
  window.addEventListener('scroll', () => {
    const header = document.querySelector('header');
    if (window.scrollY > 0) {
      header.classList.add('shadow-md');
      header.classList.add('bg-white/80');
      header.classList.add('backdrop-blur-md');
    } else {
      header.classList.remove('shadow-md');
      header.classList.remove('bg-white/80');
      header.classList.remove('backdrop-blur-md');
    }
  });
</script>


<script th:src="@{/js/auth-nav.js}" src="/k_market/js/auth-nav.js"></script>
</body></html>
