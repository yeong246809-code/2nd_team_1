<!DOCTYPE html>

<html class="light" lang="ko"><head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>K-market - 마이페이지 전체주문내역</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&amp;family=Plus+Jakarta+Sans:wght@600;700&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "on-tertiary-container": "#d6ab90",
                        "secondary-container": "#c0ecdc",
                        "on-primary-container": "#99b9c2",
                        "inverse-surface": "#2e3132",
                        "secondary-fixed": "#c0ecdc",
                        "on-secondary-fixed-variant": "#264e42",
                        "on-tertiary": "#ffffff",
                        "tertiary-fixed": "#ffdcc7",
                        "surface-bright": "#f8f9fa",
                        "inverse-primary": "#acccd5",
                        "on-surface": "#191c1d",
                        "on-primary-fixed": "#001f26",
                        "on-surface-variant": "#41484a",
                        "outline-variant": "#c1c7ca",
                        "primary": "#14333b",
                        "secondary": "#3e6659",
                        "on-primary": "#ffffff",
                        "on-background": "#191c1d",
                        "primary-fixed": "#c8e8f2",
                        "error-container": "#ffdad6",
                        "primary-fixed-dim": "#acccd5",
                        "tertiary": "#452916",
                        "tertiary-container": "#5e3f2a",
                        "error": "#ba1a1a",
                        "surface-variant": "#e1e3e4",
                        "surface-container-low": "#f3f4f5",
                        "on-tertiary-fixed-variant": "#5f402b",
                        "surface-container-high": "#e7e8e9",
                        "on-tertiary-fixed": "#2d1605",
                        "background": "#f8f9fa",
                        "secondary-fixed-dim": "#a5d0c0",
                        "surface-container-lowest": "#ffffff",
                        "on-secondary-container": "#446c5f",
                        "inverse-on-surface": "#f0f1f2",
                        "surface-tint": "#45636b",
                        "on-error": "#ffffff",
                        "surface": "#f8f9fa",
                        "on-error-container": "#93000a",
                        "outline": "#72787a",
                        "tertiary-fixed-dim": "#eabda2",
                        "surface-container-highest": "#e1e3e4",
                        "surface-container": "#edeeef",
                        "on-primary-fixed-variant": "#2d4b53",
                        "on-secondary-fixed": "#002018",
                        "surface-dim": "#d9dadb",
                        "primary-container": "#2c4a52",
                        "on-secondary": "#ffffff"
                    },
                    borderRadius: {
                        DEFAULT: "0.25rem",
                        lg: "0.5rem",
                        xl: "0.75rem",
                        full: "9999px"
                    },
                    spacing: {
                        md: "24px",
                        gutter: "24px",
                        lg: "48px",
                        "margin-mobile": "16px",
                        xs: "4px",
                        "container-max": "1280px",
                        sm: "12px",
                        xl: "80px",
                        base: "8px"
                    },
                    fontFamily: {
                        "headline-md": ["Plus Jakarta Sans"],
                        "headline-lg-mobile": ["Plus Jakarta Sans"],
                        "label-md": ["Be Vietnam Pro"],
                        "display-lg": ["Plus Jakarta Sans"],
                        "body-md": ["Be Vietnam Pro"],
                        "body-lg": ["Be Vietnam Pro"],
                        "label-sm": ["Be Vietnam Pro"],
                        "headline-lg": ["Plus Jakarta Sans"]
                    },
                    fontSize: {
                        "headline-md": ["20px", { lineHeight: "1.4", fontWeight: "600" }],
                        "headline-lg-mobile": ["24px", { lineHeight: "1.3", fontWeight: "600" }],
                        "label-md": ["14px", { lineHeight: "1.4", letterSpacing: "0.01em", fontWeight: "500" }],
                        "display-lg": ["48px", { lineHeight: "1.2", letterSpacing: "-0.02em", fontWeight: "700" }],
                        "body-md": ["16px", { lineHeight: "1.6", fontWeight: "400" }],
                        "body-lg": ["18px", { lineHeight: "1.6", fontWeight: "400" }],
                        "label-sm": ["12px", { lineHeight: "1.2", fontWeight: "600" }],
                        "headline-lg": ["32px", { lineHeight: "1.3", fontWeight: "600" }]
                    }
                }
            }
        };
    </script>
    <style>
        body { background-color: #F7F8F9; color: #191c1d; }
    </style>
</head>
<body class="antialiased min-h-screen flex flex-col font-body-md">
<!-- Top Navigation Bar -->
<div th:replace="~{my/_shared :: header}"></div>
<!-- Main Content Area -->
<main class="flex-grow max-w-container-max mx-auto w-full px-xl py-lg flex flex-col md:flex-row gap-lg">
    <!-- Sidebar Navigation -->
    <div th:replace="~{my/_shared :: sidebar('order')}"></div>
    <!-- Main Content -->
    <div class="flex-1 min-w-0">
        <!-- Banner Placeholder -->
        <div class="w-full h-[86px] bg-surface-container-high rounded-lg mb-lg flex items-center justify-center border border-outline-variant">
            <span class="text-on-surface-variant font-label-md">810 x 86 배너 광고</span>
        </div>
        <!-- Header -->
        <div class="mb-md">
            <h1 class="font-headline-md text-headline-md text-on-surface">전체주문내역</h1>
        </div>
        <!-- Filter Section -->
        <div class="bg-surface-container-lowest p-md rounded-lg shadow-sm mb-lg flex items-center gap-md border border-outline-variant overflow-x-auto">
            <span class="font-label-md text-on-surface-variant whitespace-nowrap">기간별 조회</span>
            <div class="flex gap-2">
                <button class="px-4 py-2 rounded-md border border-outline-variant bg-surface-container-lowest hover:bg-surface-variant text-label-md font-label-md text-on-surface-variant transition-colors whitespace-nowrap">1 주일</button>
                <button class="px-4 py-2 rounded-md border border-outline-variant bg-surface-container-lowest hover:bg-surface-variant text-label-md font-label-md text-on-surface-variant transition-colors whitespace-nowrap">15 일</button>
                <button class="px-4 py-2 rounded-md border border-outline-variant bg-surface-container-lowest hover:bg-surface-variant text-label-md font-label-md text-on-surface-variant transition-colors whitespace-nowrap">1 개월</button>
            </div>
            <div class="flex items-center gap-2 border-l border-outline-variant pl-md ml-auto">
                <select class="form-select w-32 rounded-md border-outline-variant text-label-md font-label-md text-on-surface bg-surface-container-lowest focus:border-primary focus:ring-primary shadow-sm">
                    <option>2022년 12월</option>
                    <option>2022년 11월</option>
                </select>
                <span class="text-on-surface-variant">~</span>
                <select class="form-select w-32 rounded-md border-outline-variant text-label-md font-label-md text-on-surface bg-surface-container-lowest focus:border-primary focus:ring-primary shadow-sm">
                    <option>2023년 1월</option>
                </select>
                <button class="ml-2 px-6 py-2 bg-primary text-on-primary rounded-md font-label-md text-label-md hover:bg-primary-container transition-colors shadow-sm whitespace-nowrap">조회</button>
            </div>
        </div>
        <!-- Order List Table -->
        <div class="bg-surface-container-lowest rounded-lg shadow-sm border border-outline-variant overflow-hidden mb-lg">
            <div class="grid grid-cols-12 gap-4 p-4 bg-surface-container-low border-b border-outline-variant text-label-sm font-label-sm text-on-surface-variant text-center">
                <div class="col-span-2">날짜</div>
                <div class="col-span-6">상품정보</div>
                <div class="col-span-2">상태</div>
                <div class="col-span-2">확인 / 신청</div>
            </div>
            <div class="flex flex-col divide-y divide-outline-variant">
                <!-- Item 1 -->
                <div class="grid grid-cols-12 gap-4 p-md items-center">
                    <div class="col-span-2 text-center text-body-md font-body-md text-on-surface-variant">
                        2022-12-13
                    </div>
                    <div class="col-span-6 flex gap-md">
                        <div class="w-24 h-24 bg-surface-variant rounded-md flex-shrink-0 flex items-center justify-center overflow-hidden border border-outline-variant">
                            <span class="material-symbols-outlined text-outline text-display-lg" style="font-variation-settings: 'FILL' 0;">image</span>
                        </div>
                        <div class="flex flex-col justify-center gap-1">
                            <span class="text-label-sm font-label-sm text-on-surface-variant">주문번호 : 1012211341</span>
                            <span class="text-label-md font-label-md text-on-surface font-semibold">(주) 상호명</span>
                            <span class="text-body-md font-body-md text-on-surface">상품명 상품명 상품명</span>
                            <div class="flex items-center gap-2 mt-1">
                                <span class="text-label-sm font-label-sm text-on-surface-variant">수량 : 1개</span>
                                <span class="text-headline-md font-headline-md text-on-surface">34,000원</span>
                            </div>
                        </div>
                    </div>
                    <div class="col-span-2 text-center">
                        <span class="inline-block px-3 py-1 bg-surface-container border border-outline-variant rounded-full text-label-sm font-label-sm text-on-surface-variant">배송완료</span>
                    </div>
                    <div class="col-span-2 flex flex-col gap-2">
                        <button class="w-full py-1.5 px-3 bg-primary text-on-primary rounded text-label-sm font-label-sm hover:bg-primary-container transition-colors">구매확정</button>
                        <button class="w-full py-1.5 px-3 bg-secondary text-on-secondary rounded text-label-sm font-label-sm hover:bg-secondary-fixed transition-colors">상품평쓰기</button>
                        <button class="w-full py-1.5 px-3 bg-surface-container-lowest border border-outline-variant text-on-surface-variant rounded text-label-sm font-label-sm hover:bg-surface-variant transition-colors">반품신청</button>
                        <button class="w-full py-1.5 px-3 bg-surface-container-lowest border border-outline-variant text-on-surface-variant rounded text-label-sm font-label-sm hover:bg-surface-variant transition-colors">교환신청</button>
                    </div>
                </div>
                <!-- Item 2 -->
                <div class="grid grid-cols-12 gap-4 p-md items-center">
                    <div class="col-span-2 text-center text-body-md font-body-md text-on-surface-variant">
                        2022-12-13
                    </div>
                    <div class="col-span-6 flex gap-md">
                        <div class="w-24 h-24 bg-surface-variant rounded-md flex-shrink-0 flex items-center justify-center overflow-hidden border border-outline-variant">
                            <span class="material-symbols-outlined text-outline text-display-lg" style="font-variation-settings: 'FILL' 0;">image</span>
                        </div>
                        <div class="flex flex-col justify-center gap-1">
                            <span class="text-label-sm font-label-sm text-on-surface-variant">주문번호 : 1012211341</span>
                            <span class="text-label-md font-label-md text-on-surface font-semibold">(주) 상호명</span>
                            <span class="text-body-md font-body-md text-on-surface">상품명 상품명 상품명</span>
                            <div class="flex items-center gap-2 mt-1">
                                <span class="text-label-sm font-label-sm text-on-surface-variant">수량 : 1개</span>
                                <span class="text-headline-md font-headline-md text-on-surface">34,000원</span>
                            </div>
                        </div>
                    </div>
                    <div class="col-span-2 text-center">
                        <span class="inline-block px-3 py-1 bg-surface-container border border-outline-variant rounded-full text-label-sm font-label-sm text-on-surface-variant">배송완료</span>
                    </div>
                    <div class="col-span-2 flex flex-col gap-2">
                        <button class="w-full py-1.5 px-3 bg-primary text-on-primary rounded text-label-sm font-label-sm hover:bg-primary-container transition-colors">구매확정</button>
                        <button class="w-full py-1.5 px-3 bg-secondary text-on-secondary rounded text-label-sm font-label-sm hover:bg-secondary-fixed transition-colors">상품평쓰기</button>
                        <button class="w-full py-1.5 px-3 bg-surface-container-lowest border border-outline-variant text-on-surface-variant rounded text-label-sm font-label-sm hover:bg-surface-variant transition-colors">반품신청</button>
                    </div>
                </div>
            </div>
        </div>
        <!-- Pagination -->
        <div class="flex justify-center items-center gap-2 mt-lg mb-xl">
            <button class="p-2 text-on-surface-variant hover:text-primary transition-colors disabled:opacity-50">
                <span class="material-symbols-outlined">chevron_left</span>
                <span class="sr-only">이전</span>
            </button>
            <div class="flex gap-1">
                <button class="w-8 h-8 rounded-full bg-primary text-on-primary font-label-md flex items-center justify-center">1</button>
                <button class="w-8 h-8 rounded-full text-on-surface-variant hover:bg-surface-variant font-label-md flex items-center justify-center transition-colors">2</button>
                <button class="w-8 h-8 rounded-full text-on-surface-variant hover:bg-surface-variant font-label-md flex items-center justify-center transition-colors">3</button>
                <button class="w-8 h-8 rounded-full text-on-surface-variant hover:bg-surface-variant font-label-md flex items-center justify-center transition-colors">4</button>
                <button class="w-8 h-8 rounded-full text-on-surface-variant hover:bg-surface-variant font-label-md flex items-center justify-center transition-colors">5</button>
            </div>
            <button class="p-2 text-on-surface-variant hover:text-primary transition-colors">
                <span class="material-symbols-outlined">chevron_right</span>
                <span class="sr-only">다음</span>
            </button>
        </div>
    </div>
</main>
<!-- Footer -->
<div th:replace="~{my/_shared :: footer}"></div>
<script th:src="@{/js/auth-nav.js}" src="/k_market/js/auth-nav.js"></script>
</body></html>
