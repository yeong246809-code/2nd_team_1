<!DOCTYPE html><html lang="ko" style=""><head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>K-market - 나의 설정</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600&amp;family=Plus+Jakarta+Sans:wght@600;700&amp;display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "on-secondary-fixed-variant": "#264e42",
                        "tertiary-fixed": "#ffdcc7",
                        "secondary-fixed-dim": "#a5d0c0",
                        "error": "#ba1a1a",
                        "tertiary-fixed-dim": "#eabda2",
                        "primary-fixed-dim": "#acccd5",
                        "secondary-fixed": "#c0ecdc",
                        "secondary-container": "#c0ecdc",
                        "secondary": "#3e6659",
                        "on-error": "#ffffff",
                        "primary-container": "#2c4a52",
                        "on-primary-container": "#99b9c2",
                        "surface-container-high": "#e7e8e9",
                        "error-container": "#ffdad6",
                        "surface-container": "#edeeef",
                        "on-secondary-container": "#446c5f",
                        "background": "#f8f9fa",
                        "on-primary-fixed": "#001f26",
                        "tertiary": "#452916",
                        "surface-tint": "#45636b",
                        "inverse-surface": "#2e3132",
                        "on-tertiary-container": "#d6ab90",
                        "on-surface-variant": "#41484a",
                        "surface": "#f8f9fa",
                        "on-surface": "#191c1d",
                        "on-primary": "#ffffff",
                        "on-error-container": "#93000a",
                        "on-tertiary": "#ffffff",
                        "on-secondary-fixed": "#002018",
                        "on-background": "#191c1d",
                        "surface-variant": "#e1e3e4",
                        "inverse-primary": "#acccd5",
                        "on-secondary": "#ffffff",
                        "surface-container-highest": "#e1e3e4",
                        "primary-fixed": "#c8e8f2",
                        "surface-dim": "#d9dadb",
                        "outline": "#72787a",
                        "surface-container-lowest": "#ffffff",
                        "outline-variant": "#c1c7ca",
                        "surface-container-low": "#f3f4f5",
                        "tertiary-container": "#5e3f2a",
                        "surface-bright": "#f8f9fa",
                        "primary": "#14333b",
                        "on-tertiary-fixed": "#2d1605",
                        "inverse-on-surface": "#f0f1f2",
                        "on-tertiary-fixed-variant": "#5f402b",
                        "on-primary-fixed-variant": "#2d4b53"
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    spacing: {
                        "margin-mobile": "16px",
                        "container-max": "1280px",
                        "xs": "4px",
                        "md": "24px",
                        "gutter": "24px",
                        "sm": "12px",
                        "base": "8px",
                        "lg": "48px",
                        "xl": "80px"
                    },
                    fontFamily: {
                        "label-md": ["Be Vietnam Pro"],
                        "headline-lg-mobile": ["Plus Jakarta Sans"],
                        "body-md": ["Be Vietnam Pro"],
                        "body-lg": ["Be Vietnam Pro"],
                        "display-lg": ["Plus Jakarta Sans"],
                        "headline-lg": ["Plus Jakarta Sans"],
                        "label-sm": ["Be Vietnam Pro"],
                        "headline-md": ["Plus Jakarta Sans"]
                    },
                    fontSize: {
                        "label-md": ["14px", { lineHeight: "1.4", letterSpacing: "0.01em", fontWeight: "500" }],
                        "headline-lg-mobile": ["24px", { lineHeight: "1.3", fontWeight: "600" }],
                        "body-md": ["16px", { lineHeight: "1.6", fontWeight: "400" }],
                        "body-lg": ["18px", { lineHeight: "1.6", fontWeight: "400" }],
                        "display-lg": ["48px", { lineHeight: "1.2", letterSpacing: "-0.02em", fontWeight: "700" }],
                        "headline-lg": ["32px", { lineHeight: "1.3", fontWeight: "600" }],
                        "label-sm": ["12px", { lineHeight: "1.2", fontWeight: "600" }],
                        "headline-md": ["20px", { lineHeight: "1.4", fontWeight: "600" }]
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #f8f9fa; }
    </style>
</head>
<body class="text-on-surface flex flex-col min-h-screen">
<!-- TopNavBar -->
<div th:replace="~{layout/site :: header}"></div>
<div class="flex-grow max-w-container-max mx-auto w-full flex flex-col md:flex-row px-margin-mobile md:px-gutter gap-lg py-lg">
    <!-- SideNavBar -->
    <div th:replace="~{my/_shared :: sidebar('myinfo')}"></div>
    <!-- Main Content -->
    <main class="flex-grow max-w-3xl">
        <h1 class="font-headline-lg text-headline-lg text-on-surface mb-md">나의 설정</h1>
        <p class="mb-md text-label-md text-error" th:if="${param.withdrawError}" th:text="${param.withdrawError[0]}">탈퇴 처리 중 오류가 발생했습니다.</p>
        <div th:replace="~{my/_shared :: banner}"></div>
        <!-- Settings Form -->
        <div class="bg-surface rounded-xl p-lg shadow-sm border border-outline-variant">
            <p class="mb-md rounded-lg bg-secondary-container px-md py-sm text-on-secondary-container font-label-md"
               th:if="${myInfoMessage}" th:text="${myInfoMessage}">회원 정보가 수정되었습니다.</p>
            <p class="mb-md rounded-lg bg-error-container px-md py-sm text-on-error-container font-label-md"
               th:if="${myInfoError}" th:text="${myInfoError}">회원 정보 수정에 실패했습니다.</p>

            <form id="myInfoUpdateForm" th:action="@{/my/myinfo}" method="post">
                <div class="grid grid-cols-[120px_1fr] gap-y-md items-center border-b border-outline-variant pb-lg mb-lg">
                    <div class="font-label-md text-on-surface-variant">사용자 ID</div>
                    <div class="font-body-md" th:text="${myInfoUserId} ?: '-'">user01</div>

                    <div class="font-label-md text-on-surface-variant">비밀번호</div>
                    <div>
                        <a class="inline-flex px-md py-xs border border-outline rounded-lg text-on-surface font-label-md hover:bg-surface-container-low transition-colors"
                           th:href="@{/member/find/changePassword}">비밀번호 수정</a>
                    </div>

                    <th:block th:unless="${myInfoSeller}">
                        <div class="font-label-md text-on-surface-variant">이름</div>
                        <div class="font-body-md" th:text="${myInfoName}">홍길동</div>
                        <input name="name" type="hidden" th:value="${myInfoName}">

                        <div class="font-label-md text-on-surface-variant">생년월일</div>
                        <div class="font-body-md" th:text="${myInfoBirthDate}">-</div>

                        <div class="font-label-md text-on-surface-variant">이메일</div>
                        <div class="flex gap-sm items-center flex-wrap">
                            <input class="h-10 min-w-[140px] flex-1 px-sm py-xs border border-outline rounded-lg bg-surface font-body-md focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-colors"
                                   name="emailLocal" required placeholder="이메일 아이디" type="text" th:value="${myInfoEmailLocal}">
                            <span>@</span>
                            <input class="h-10 min-w-[160px] flex-1 px-sm py-xs border border-outline rounded-lg bg-surface font-body-md focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-colors"
                                   id="my-email-domain" name="emailDomain" required placeholder="이메일 도메인" type="text" th:value="${myInfoEmailDomain}">
                            <select class="h-10 w-40 px-sm pr-8 py-xs border border-outline rounded-lg bg-surface font-body-md text-on-surface focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-colors"
                                    id="my-email-domain-select">
                                <option value="">직접입력</option>
                                <option value="naver.com">naver.com</option>
                                <option value="gmail.com">gmail.com</option>
                                <option value="daum.net">daum.net</option>
                            </select>
                            <div class="basis-full h-0"></div>
                            <button type="submit" class="h-10 whitespace-nowrap px-md py-xs border border-outline rounded-lg text-on-surface font-label-md hover:bg-surface-container-low transition-colors">수정하기</button>
                        </div>

                        <div class="font-label-md text-on-surface-variant mt-sm">휴대폰</div>
                        <div class="flex gap-sm items-center flex-wrap mt-sm">
                            <select class="h-10 w-24 px-sm pr-8 py-xs border border-outline rounded-lg bg-surface font-body-md text-on-surface focus:border-primary outline-none"
                                    name="phoneFirst">
                                <option value="010" th:selected="${myInfoPhoneFirst == '010'}">010</option>
                                <option value="011" th:selected="${myInfoPhoneFirst == '011'}">011</option>
                                <option value="016" th:selected="${myInfoPhoneFirst == '016'}">016</option>
                                <option value="017" th:selected="${myInfoPhoneFirst == '017'}">017</option>
                                <option value="018" th:selected="${myInfoPhoneFirst == '018'}">018</option>
                                <option value="019" th:selected="${myInfoPhoneFirst == '019'}">019</option>
                            </select>
                            <span>-</span>
                            <input class="h-10 w-28 px-sm py-xs border border-outline rounded-lg bg-surface font-body-md text-center focus:border-primary outline-none"
                                   name="phoneMiddle" required maxlength="4" inputmode="numeric" placeholder="0000" type="text" th:value="${myInfoPhoneMiddle}">
                            <span>-</span>
                            <input class="h-10 w-28 px-sm py-xs border border-outline rounded-lg bg-surface font-body-md text-center focus:border-primary outline-none"
                                   name="phoneLast" required maxlength="4" inputmode="numeric" placeholder="0000" type="text" th:value="${myInfoPhoneLast}">
                            <button type="submit" class="h-10 whitespace-nowrap px-md py-xs border border-outline rounded-lg text-on-surface font-label-md hover:bg-surface-container-low transition-colors">수정하기</button>
                        </div>

                        <div class="font-label-md text-on-surface-variant mt-sm self-start pt-xs">주소</div>
                        <div class="flex flex-col gap-sm mt-sm">
                            <div class="flex gap-sm">
                                <input class="px-sm py-xs border border-outline rounded-lg bg-surface font-body-md w-32 focus:border-primary outline-none"
                                       id="my-zip" name="zipCode" readonly placeholder="우편번호" type="text" th:value="${myInfoZipCode}">
                                <button class="px-md py-xs border border-outline rounded-lg text-on-surface font-label-md hover:bg-surface-container-low transition-colors bg-surface-container-low"
                                        type="button" onclick="Postcode('my-zip', 'my-base-address', 'my-detail-address')">주소검색</button>
                            </div>
                            <textarea class="px-sm py-sm border border-outline rounded-lg bg-surface font-body-md w-full min-h-[56px] focus:border-primary outline-none resize-y"
                                      id="my-base-address" name="baseAddress" placeholder="기본주소" th:text="${myInfoBaseAddress}"></textarea>
                            <textarea class="px-sm py-sm border border-outline rounded-lg bg-surface font-body-md w-full min-h-[72px] focus:border-primary outline-none resize-y"
                                      id="my-detail-address" name="detailAddress" placeholder="상세주소" th:text="${myInfoDetailAddress}"></textarea>
                        </div>

                        <div class="font-label-md text-on-surface-variant mt-sm self-start pt-xs">소셜 로그인</div>
                        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-sm mt-sm">
                            <div class="min-h-[92px] border border-outline-variant rounded-lg bg-surface-container-lowest px-sm py-sm flex flex-col items-center justify-center gap-xs text-center">
                                <div class="flex items-center justify-center gap-xs">
                                    <span class="w-8 h-8 shrink-0 rounded-full bg-[#03C75A] text-white font-bold flex items-center justify-center">N</span>
                                    <div class="min-w-0">
                                        <p class="font-label-md text-label-md text-on-surface whitespace-nowrap">네이버</p>
                                        <p class="font-label-sm text-label-sm text-on-surface-variant whitespace-nowrap">소셜 로그인</p>
                                    </div>
                                </div>
                                <span class="min-w-16 px-sm py-xs rounded-full font-label-sm text-label-sm bg-surface-container-high text-on-surface-variant"
                                      th:classappend="${naverConnected} ? ' !bg-[#DDF8E7] !text-[#0B7A3B]' : ''"
                                      th:text="${naverConnected} ? '연결됨' : '미연결'">미연결</span>
                            </div>
                            <div class="min-h-[92px] border border-outline-variant rounded-lg bg-surface-container-lowest px-sm py-sm flex flex-col items-center justify-center gap-xs text-center">
                                <div class="flex items-center justify-center gap-xs">
                                    <span class="w-8 h-8 shrink-0 rounded-full bg-[#FEE500] text-[#3c1e1e] font-bold flex items-center justify-center">
                                        <span class="material-symbols-outlined text-[18px]" style="font-variation-settings: 'FILL' 1;">chat_bubble</span>
                                    </span>
                                    <div class="min-w-0">
                                        <p class="font-label-md text-label-md text-on-surface whitespace-nowrap">카카오</p>
                                        <p class="font-label-sm text-label-sm text-on-surface-variant whitespace-nowrap">소셜 로그인</p>
                                    </div>
                                </div>
                                <span class="min-w-16 px-sm py-xs rounded-full font-label-sm text-label-sm bg-surface-container-high text-on-surface-variant"
                                      th:classappend="${kakaoConnected} ? ' !bg-[#DDF8E7] !text-[#0B7A3B]' : ''"
                                      th:text="${kakaoConnected} ? '연결됨' : '미연결'">미연결</span>
                            </div>
                            <div class="min-h-[92px] border border-outline-variant rounded-lg bg-surface-container-lowest px-sm py-sm flex flex-col items-center justify-center gap-xs text-center">
                                <div class="flex items-center justify-center gap-xs">
                                    <span class="w-8 h-8 shrink-0 rounded-full bg-white border border-surface-variant flex items-center justify-center">
                                        <svg class="w-5 h-5" viewBox="0 0 18 18" aria-hidden="true" focusable="false">
                                            <path fill="#4285F4" d="M17.64 9.2c0-.64-.06-1.25-.16-1.84H9v3.48h4.84c-.21 1.12-.84 2.07-1.79 2.71v2.26h2.9c1.7-1.56 2.69-3.87 2.69-6.61z"/>
                                            <path fill="#34A853" d="M9 18c2.43 0 4.47-.8 5.96-2.19l-2.9-2.26c-.8.54-1.84.86-3.06.86-2.35 0-4.34-1.59-5.05-3.72H.96v2.33C2.44 15.96 5.48 18 9 18z"/>
                                            <path fill="#FBBC05" d="M3.95 10.69A5.41 5.41 0 0 1 3.67 9c0-.59.1-1.16.28-1.69V4.98H.96A8.99 8.99 0 0 0 0 9c0 1.45.35 2.82.96 4.02l2.99-2.33z"/>
                                            <path fill="#EA4335" d="M9 3.58c1.32 0 2.51.45 3.44 1.35l2.58-2.58C13.46.9 11.43 0 9 0 5.48 0 2.44 2.04.96 4.98l2.99 2.33C4.66 5.17 6.65 3.58 9 3.58z"/>
                                        </svg>
                                    </span>
                                    <div class="min-w-0">
                                        <p class="font-label-md text-label-md text-on-surface whitespace-nowrap">구글</p>
                                        <p class="font-label-sm text-label-sm text-on-surface-variant whitespace-nowrap">소셜 로그인</p>
                                    </div>
                                </div>
                                <span class="min-w-16 px-sm py-xs rounded-full font-label-sm text-label-sm bg-surface-container-high text-on-surface-variant"
                                      th:classappend="${googleConnected} ? ' !bg-[#DDF8E7] !text-[#0B7A3B]' : ''"
                                      th:text="${googleConnected} ? '연결됨' : '미연결'">미연결</span>
                            </div>
                        </div>
                    </th:block>

                    <th:block th:if="${myInfoSeller}">
                        <div class="font-label-md text-on-surface-variant">상호명</div>
                        <div class="flex gap-sm items-center">
                            <input class="h-10 flex-1 px-sm py-xs border border-outline rounded-lg bg-surface font-body-md focus:border-primary outline-none"
                                   name="shopName" required type="text" th:value="${myInfoShopName}" placeholder="상호명">
                            <button type="submit" class="h-10 whitespace-nowrap px-md py-xs border border-outline rounded-lg text-on-surface font-label-md hover:bg-surface-container-low transition-colors">수정하기</button>
                        </div>

                        <div class="font-label-md text-on-surface-variant">대표자</div>
                        <input class="h-10 px-sm py-xs border border-outline rounded-lg bg-surface font-body-md focus:border-primary outline-none"
                               name="ceo" required type="text" th:value="${myInfoCeo}" placeholder="대표자명">

                        <div class="font-label-md text-on-surface-variant">사업자등록번호</div>
                        <div>
                            <input class="h-10 w-full px-sm py-xs border border-outline-variant rounded-lg bg-surface-container-high font-body-md text-on-surface-variant cursor-not-allowed"
                                   readonly type="text" th:value="${myInfoBizNumber}" aria-label="사업자등록번호">
                            <p class="mt-xs text-label-sm text-on-surface-variant">사업자등록번호는 관리자 확인이 필요한 정보라 직접 수정할 수 없습니다.</p>
                        </div>

                        <div class="font-label-md text-on-surface-variant">통신판매업 신고번호</div>
                        <input class="h-10 px-sm py-xs border border-outline rounded-lg bg-surface font-body-md focus:border-primary outline-none"
                               name="mailOrderNumber" type="text" th:value="${myInfoMailOrderNumber}" placeholder="통신판매업 신고번호">

                        <div class="font-label-md text-on-surface-variant">대표 전화번호</div>
                        <input class="h-10 px-sm py-xs border border-outline rounded-lg bg-surface font-body-md focus:border-primary outline-none"
                               name="shopPhone" type="tel" th:value="${myInfoShopPhone}" placeholder="02-0000-0000">

                        <div class="font-label-md text-on-surface-variant">팩스 번호</div>
                        <input class="h-10 px-sm py-xs border border-outline rounded-lg bg-surface font-body-md focus:border-primary outline-none"
                               name="fax" type="tel" th:value="${myInfoFax}" placeholder="02-0000-0000">

                        <div class="font-label-md text-on-surface-variant mt-sm self-start pt-xs">사업장 주소</div>
                        <div class="flex flex-col gap-sm mt-sm">
                            <div class="flex gap-sm">
                                <input class="px-sm py-xs border border-outline rounded-lg bg-surface font-body-md w-32 focus:border-primary outline-none"
                                       id="shop-zip" name="shopZipCode" readonly placeholder="우편번호" type="text" th:value="${myInfoShopZipCode}">
                                <button class="px-md py-xs border border-outline rounded-lg text-on-surface font-label-md hover:bg-surface-container-low transition-colors bg-surface-container-low"
                                        type="button" onclick="Postcode('shop-zip', 'shop-base-address', 'shop-detail-address')">주소검색</button>
                            </div>
                            <textarea class="px-sm py-sm border border-outline rounded-lg bg-surface font-body-md w-full min-h-[56px] focus:border-primary outline-none resize-y"
                                      id="shop-base-address" name="shopBaseAddress" placeholder="기본주소" th:text="${myInfoShopBaseAddress}"></textarea>
                            <textarea class="px-sm py-sm border border-outline rounded-lg bg-surface font-body-md w-full min-h-[72px] focus:border-primary outline-none resize-y"
                                      id="shop-detail-address" name="shopDetailAddress" placeholder="상세주소" th:text="${myInfoShopDetailAddress}"></textarea>
                        </div>
                    </th:block>
                </div>
            </form>

            <div class="grid grid-cols-1 sm:grid-cols-[1fr_auto_1fr] gap-sm items-center mt-xl">
                <form class="order-2 sm:order-1 sm:justify-self-start" th:action="@{/my/withdraw}" method="post"
                      onsubmit="return confirm('회원 탈퇴 후에는 같은 아이디로 로그인할 수 없습니다. 탈퇴하시겠습니까?');">
                    <button type="submit" class="inline-flex h-10 min-w-[96px] items-center justify-center whitespace-nowrap px-md border border-error-container text-on-error-container font-label-md rounded-lg hover:bg-error-container transition-colors">탈퇴하기</button>
                </form>
                <button form="myInfoUpdateForm" type="submit" class="order-1 sm:order-2 inline-flex h-11 w-full sm:w-auto min-w-[160px] items-center justify-center px-xl bg-primary-container text-on-primary font-label-md rounded-lg hover:bg-primary transition-colors">수정하기</button>
                <div class="hidden sm:block order-3"></div>
            </div>
        </div>
    </main>
</div>
<!-- Footer -->
<div th:replace="~{layout/site :: footer}"></div>










<script src="//t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
<script th:src="@{/js/postcode.js}" src="/js/postcode.js"></script>
<script>
    const emailDomainSelect = document.getElementById('my-email-domain-select');
    const emailDomainInput = document.getElementById('my-email-domain');
    if (emailDomainSelect && emailDomainInput) {
        emailDomainSelect.addEventListener('change', () => {
            if (emailDomainSelect.value) {
                emailDomainInput.value = emailDomainSelect.value;
            }
            emailDomainInput.readOnly = Boolean(emailDomainSelect.value);
            if (!emailDomainSelect.value) {
                emailDomainInput.focus();
            }
        });
    }
</script>
<script th:src="@{/js/auth-nav.js}" src="/k_market/js/auth-nav.js"></script>
</body></html>
