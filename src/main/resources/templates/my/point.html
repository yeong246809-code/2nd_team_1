<!DOCTYPE html><html lang="ko" style=""><head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>K-market | 포인트내역</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;family=Be+Vietnam+Pro:wght@400;500;600&amp;display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "background": "#f8f9fa",
                        "surface-container-highest": "#e1e3e4",
                        "primary-fixed": "#c8e8f2",
                        "secondary-container": "#c0ecdc",
                        "outline": "#72787a",
                        "error": "#ba1a1a",
                        "on-primary": "#ffffff",
                        "primary-fixed-dim": "#acccd5",
                        "inverse-on-surface": "#f0f1f2",
                        "surface-tint": "#45636b",
                        "surface-container-low": "#f3f4f5",
                        "on-tertiary-container": "#d6ab90",
                        "tertiary-fixed-dim": "#eabda2",
                        "tertiary": "#452916",
                        "primary-container": "#2c4a52",
                        "on-surface": "#191c1d",
                        "on-primary-fixed": "#001f26",
                        "surface-container-high": "#e7e8e9",
                        "on-primary-fixed-variant": "#2d4b53",
                        "surface-variant": "#e1e3e4",
                        "on-tertiary-fixed": "#2d1605",
                        "inverse-surface": "#2e3132",
                        "error-container": "#ffdad6",
                        "on-secondary-container": "#446c5f",
                        "on-primary-container": "#99b9c2",
                        "inverse-primary": "#acccd5",
                        "surface-container-lowest": "#ffffff",
                        "surface": "#f8f9fa",
                        "on-secondary-fixed": "#002018",
                        "primary": "#14333b",
                        "on-background": "#191c1d",
                        "on-tertiary": "#ffffff",
                        "on-error": "#ffffff",
                        "outline-variant": "#c1c7ca",
                        "surface-bright": "#f8f9fa",
                        "on-tertiary-fixed-variant": "#5f402b",
                        "tertiary-fixed": "#ffdcc7",
                        "tertiary-container": "#5e3f2a",
                        "surface-container": "#edeeef",
                        "surface-dim": "#d9dadb",
                        "on-surface-variant": "#41484a",
                        "on-secondary": "#ffffff",
                        "on-error-container": "#93000a",
                        "secondary-fixed-dim": "#a5d0c0",
                        "secondary-fixed": "#c0ecdc",
                        "secondary": "#3e6659",
                        "on-secondary-fixed-variant": "#264e42"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "lg": "48px",
                        "container-max": "1280px",
                        "margin-mobile": "16px",
                        "gutter": "24px",
                        "xs": "4px",
                        "base": "8px",
                        "md": "24px",
                        "xl": "80px",
                        "sm": "12px"
                    },
                    "fontFamily": {
                        "label-sm": ["Be Vietnam Pro"],
                        "label-md": ["Be Vietnam Pro"],
                        "body-md": ["Be Vietnam Pro"],
                        "headline-md": ["Plus Jakarta Sans"],
                        "headline-lg-mobile": ["Plus Jakarta Sans"],
                        "display-lg": ["Plus Jakarta Sans"],
                        "headline-lg": ["Plus Jakarta Sans"],
                        "body-lg": ["Be Vietnam Pro"]
                    },
                    "fontSize": {
                        "label-sm": ["12px", {"lineHeight": "1.2", "fontWeight": "600"}],
                        "label-md": ["14px", {"lineHeight": "1.4", "letterSpacing": "0.01em", "fontWeight": "500"}],
                        "body-md": ["16px", {"lineHeight": "1.6", "fontWeight": "400"}],
                        "headline-md": ["20px", {"lineHeight": "1.4", "fontWeight": "600"}],
                        "headline-lg-mobile": ["24px", {"lineHeight": "1.3", "fontWeight": "600"}],
                        "display-lg": ["48px", {"lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "headline-lg": ["32px", {"lineHeight": "1.3", "fontWeight": "600"}],
                        "body-lg": ["18px", {"lineHeight": "1.6", "fontWeight": "400"}]
                    }
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        .active-tab {
            background-color: #2c4a52; /* primary-container */
            color: #99b9c2; /* on-primary-container */
            font-weight: 600;
        }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #c1c7ca; border-radius: 10px; }
    </style>
</head>
<body class="bg-background text-on-background font-body-md antialiased min-h-screen flex flex-col">
<!-- TopNavBar -->
<div th:replace="~{layout/site :: header}"></div>
<div class="flex-grow max-w-container-max mx-auto w-full px-base md:px-gutter py-lg flex gap-md">
    <!-- SideNavBar -->
    <div th:replace="~{my/_shared :: sidebar('point')}"></div>
    <!-- Main Content Canvas -->
    <main class="flex-grow space-y-md">
        <div th:replace="~{my/_shared :: banner}"></div>
        <!-- Page Title -->
        <div class="border-b border-outline-variant pb-base">
            <h1 class="font-headline-lg text-headline-lg text-primary flex items-center gap-2">
                <span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">stars</span>
                포인트적립내역
            </h1>
        </div>
        <!-- Date Filter Section -->
        <form id="point-period-form" th:action="@{/my/point}" method="get" class="bg-surface-container-lowest p-md rounded-xl shadow-sm border border-outline-variant/30">
            <input type="hidden" name="pg" value="1">
            <div class="flex flex-wrap xl:flex-nowrap items-center gap-sm xl:gap-md">
                <span class="font-label-md text-label-md text-on-surface-variant whitespace-nowrap">기간별조회</span>
                <div class="flex flex-wrap items-center gap-2 shrink-0">
                    <button type="button" data-days="7" class="period-quick-btn px-4 py-1.5 border border-outline-variant text-on-surface-variant text-label-md font-label-md rounded-lg hover:border-primary hover:bg-primary/5 transition-colors whitespace-nowrap">1주일</button>
                    <button type="button" data-days="15" class="period-quick-btn px-4 py-1.5 border border-outline-variant text-on-surface-variant text-label-md font-label-md rounded-lg hover:border-primary hover:bg-primary/5 transition-colors whitespace-nowrap">15일</button>
                    <button type="button" data-months="1" class="period-quick-btn px-4 py-1.5 border border-outline-variant text-on-surface-variant text-label-md font-label-md rounded-lg hover:border-primary hover:bg-primary/5 transition-colors whitespace-nowrap">1개월</button>
                    <button type="button" data-years="1" class="period-quick-btn px-4 py-1.5 border border-outline-variant text-on-surface-variant text-label-md font-label-md rounded-lg hover:border-primary hover:bg-primary/5 transition-colors whitespace-nowrap">1년</button>
                </div>
                <div class="hidden lg:block h-8 w-px bg-outline-variant mx-sm"></div>
                <div class="flex flex-wrap sm:flex-nowrap items-center gap-2 min-w-0 xl:ml-auto">
                    <label class="sr-only" for="point-start-date">시작일</label>
                    <input id="point-start-date"
                           name="startDate"
                           class="h-9 w-[150px] min-w-0 bg-background border border-outline-variant rounded-lg px-3 py-1.5 font-body-md focus:ring-primary focus:border-primary"
                           type="date"
                           th:value="${startDate != null ? #temporals.format(startDate, 'yyyy-MM-dd') : ''}">
                    <span class="text-outline">~</span>
                    <label class="sr-only" for="point-end-date">종료일</label>
                    <input id="point-end-date"
                           name="endDate"
                           class="h-9 w-[150px] min-w-0 bg-background border border-outline-variant rounded-lg px-3 py-1.5 font-body-md focus:ring-primary focus:border-primary"
                           type="date"
                           th:value="${endDate != null ? #temporals.format(endDate, 'yyyy-MM-dd') : ''}">
                    <button type="submit" class="h-9 bg-primary text-on-primary px-6 rounded-lg font-label-md text-label-md shadow-sm hover:opacity-90 active:scale-95 transition-all whitespace-nowrap">조회</button>
                    <a th:href="@{/my/point}" class="h-9 px-4 rounded-lg border border-outline-variant inline-flex items-center justify-center text-label-md font-label-md text-on-surface-variant hover:bg-surface-variant transition-colors whitespace-nowrap">초기화</a>
                </div>
            </div>
        </form>
        <!-- Data Table Section -->
        <section class="bg-surface-container-lowest rounded-xl shadow-sm border border-outline-variant/30 overflow-hidden">
            <div class="overflow-x-auto custom-scrollbar">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-surface-container-high border-b border-outline-variant">
                    <tr>
                        <th class="px-md py-4 font-label-md text-label-md text-on-surface-variant">날짜</th>
                        <th class="px-md py-4 font-label-md text-label-md text-on-surface-variant">구분</th>
                        <th class="px-md py-4 font-label-md text-label-md text-on-surface-variant">주문번호</th>
                        <th class="px-md py-4 font-label-md text-label-md text-on-surface-variant">적립금액</th>
                        <th class="px-md py-4 font-label-md text-label-md text-on-surface-variant">비고</th>
                        <th class="px-md py-4 font-label-md text-label-md text-on-surface-variant">유효기간</th>
                    </tr>
                    </thead>
                    <tbody class="divide-y divide-outline-variant/40">
                    <tr th:if="${pointBlock == null or pointBlock.page.empty}">
                        <td colspan="6" class="px-md py-lg text-center text-on-surface-variant">포인트 내역이 없습니다.</td>
                    </tr>
                    <tr class="hover:bg-surface-container-low transition-colors group" th:each="point : ${pointBlock.page.content}">
                        <td class="px-md py-4 text-body-md" th:text="${point.createdAt != null ? #temporals.format(point.createdAt, 'yyyy-MM-dd') : '-'}">2024-03-15</td>
                        <td class="px-md py-4 text-body-md">
                            <span th:class="${point.amount < 0 ? 'bg-error-container/30 text-error px-2 py-0.5 rounded-full text-label-sm' : 'bg-secondary-container/30 text-secondary px-2 py-0.5 rounded-full text-label-sm'}"
                                  th:text="${point.type}">적립</span>
                        </td>
                        <td class="px-md py-4 text-body-md font-medium text-primary" th:text="${point.pointNo}">20240315001</td>
                        <td class="px-md py-4 text-body-md font-bold"
                            th:classappend="${point.amount < 0} ? ' text-error' : ' text-secondary'"
                            th:text="${point.amount > 0 ? '+ ' + #numbers.formatInteger(point.amount, 0, 'COMMA') : #numbers.formatInteger(point.amount, 0, 'COMMA')}">+ 340</td>
                        <td class="px-md py-4 text-body-md" th:text="${point.description}">상품 구매확정</td>
                        <td class="px-md py-4 text-body-md text-outline" th:text="${point.expiredAt != null ? #temporals.format(point.expiredAt, 'yyyy-MM-dd') : '-'}">2026-03-15</td>
                    </tr>
                    </tbody>
                </table>
            </div>
            <!-- Pagination -->
            <div class="py-md border-t border-outline-variant flex justify-center items-center gap-base" th:if="${pointBlock != null}">
                <a class="w-10 h-10 flex items-center justify-center rounded-lg hover:bg-surface-container-high transition-colors text-outline"
                   th:classappend="${pointBlock.currentPage <= 1} ? ' pointer-events-none opacity-50'"
                   th:href="@{/my/point(pg=${pointBlock.currentPage - 1}, startDate=${startDate}, endDate=${endDate})}">
                    <span class="material-symbols-outlined">chevron_left</span>
                </a>
                <a th:each="pageNo : ${#numbers.sequence(pointBlock.startPage, pointBlock.endPage)}"
                   th:href="@{/my/point(pg=${pageNo}, startDate=${startDate}, endDate=${endDate})}"
                   th:text="${pageNo}"
                   th:class="${pageNo == pointBlock.currentPage ? 'w-10 h-10 flex items-center justify-center rounded-lg bg-primary text-on-primary font-bold shadow-md' : 'w-10 h-10 flex items-center justify-center rounded-lg hover:bg-surface-container-high transition-colors text-on-surface-variant font-medium'}">1</a>
                <a class="w-10 h-10 flex items-center justify-center rounded-lg hover:bg-surface-container-high transition-colors text-outline"
                   th:classappend="${pointBlock.currentPage >= pointBlock.page.totalPages} ? ' pointer-events-none opacity-50'"
                   th:href="@{/my/point(pg=${pointBlock.currentPage + 1}, startDate=${startDate}, endDate=${endDate})}">
                    <span class="material-symbols-outlined">chevron_right</span>
                </a>
            </div>
        </section>
    </main>
</div>
<!-- Footer -->
<div th:replace="~{layout/site :: footer}"></div>
<!-- Mobile Navigation (Floating) -->
<nav class="md:hidden fixed bottom-0 left-0 right-0 bg-surface-container-lowest border-t border-outline-variant px-md py-sm flex justify-around items-center z-50">
    <button class="flex flex-col items-center gap-1 text-on-surface-variant">
        <span class="material-symbols-outlined">home</span>
        <span class="text-[10px]">홈</span>
    </button>
    <button class="flex flex-col items-center gap-1 text-on-surface-variant">
        <span class="material-symbols-outlined">search</span>
        <span class="text-[10px]">검색</span>
    </button>
    <button class="flex flex-col items-center gap-1 text-primary">
        <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">person</span>
        <span class="text-[10px] font-bold">마이</span>
    </button>
    <button class="flex flex-col items-center gap-1 text-on-surface-variant">
        <span class="material-symbols-outlined">shopping_bag</span>
        <span class="text-[10px]">쇼핑</span>
    </button>
</nav>
<script>
    document.addEventListener('click', (e) => {
        const periodBtn = e.target.closest('.period-quick-btn');
        if (!periodBtn) return;

        e.preventDefault();
        const form = document.getElementById('point-period-form');
        const startInput = document.getElementById('point-start-date');
        const endInput = document.getElementById('point-end-date');
        if (!form || !startInput || !endInput) return;

        const endDate = new Date();
        const startDate = new Date(endDate);
        if (periodBtn.dataset.days) {
            startDate.setDate(startDate.getDate() - Number(periodBtn.dataset.days) + 1);
        }
        if (periodBtn.dataset.months) {
            startDate.setMonth(startDate.getMonth() - Number(periodBtn.dataset.months));
            startDate.setDate(startDate.getDate() + 1);
        }
        if (periodBtn.dataset.years) {
            startDate.setFullYear(startDate.getFullYear() - Number(periodBtn.dataset.years));
            startDate.setDate(startDate.getDate() + 1);
        }

        const formatDate = (date) => {
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        };

        startInput.value = formatDate(startDate);
        endInput.value = formatDate(endDate);
        form.submit();
    });

    // Micro-interactions
    document.querySelectorAll('button, a').forEach(el => {
        el.addEventListener('mousedown', () => {
            el.style.transform = 'scale(0.97)';
        });
        el.addEventListener('mouseup', () => {
            el.style.transform = 'scale(1)';
        });
        el.addEventListener('mouseleave', () => {
            el.style.transform = 'scale(1)';
        });
    });
</script>








<script th:src="@{/js/auth-nav.js}" src="/k_market/js/auth-nav.js"></script>
</body></html>
