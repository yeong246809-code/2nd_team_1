<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<body>
<aside th:fragment="sidebar(activeMenu)" class="w-64 shrink-0 flex flex-col space-y-2 py-md bg-surface-container-low rounded-xl shadow-sm border-r border-outline-variant h-fit sticky top-24">
    <div class="px-4 pb-4 border-b border-outline-variant mb-2">
        <h2 class="font-headline-md text-headline-md text-primary">나의쇼핑정보</h2>
        <p class="font-body-md text-body-md text-on-surface-variant opacity-70" th:text="${loginUserId} != '' ? |${loginUserId}님 환영합니다| : '환영합니다'">환영합니다</p>
    </div>
    <nav class="flex flex-col space-y-1">
        <a class="text-on-surface-variant hover:bg-surface-variant rounded-lg mx-2 px-4 py-3 flex items-center gap-3 transition-all active:scale-95" th:classappend="${activeMenu == 'order'} ? ' bg-[#2c4a52] hover:bg-[#2c4a52] text-white font-semibold scale-95'" th:href="@{/my/order}" href="/my/order">
            <span class="material-symbols-outlined">list_alt</span>
            전체주문내역
        </a>
        <a class="text-on-surface-variant hover:bg-surface-variant rounded-lg mx-2 px-4 py-3 flex items-center gap-3 transition-all active:scale-95" th:classappend="${activeMenu == 'point'} ? ' bg-[#2c4a52] hover:bg-[#2c4a52] text-white font-semibold scale-95'" th:href="@{/my/point}" href="/my/point">
            <span class="material-symbols-outlined">payments</span>
            포인트내역
        </a>
        <a class="text-on-surface-variant hover:bg-surface-variant rounded-lg mx-2 px-4 py-3 flex items-center gap-3 transition-all active:scale-95" th:classappend="${activeMenu == 'coupon'} ? ' bg-[#2c4a52] hover:bg-[#2c4a52] text-white font-semibold scale-95'" th:href="@{/my/coupon}" href="/my/coupon">
            <span class="material-symbols-outlined">confirmation_number</span>
            쿠폰
        </a>
        <a class="text-on-surface-variant hover:bg-surface-variant rounded-lg mx-2 px-4 py-3 flex items-center gap-3 transition-all active:scale-95" th:classappend="${activeMenu == 'review'} ? ' bg-[#2c4a52] hover:bg-[#2c4a52] text-white font-semibold scale-95'" th:href="@{/my/review}" href="/my/review">
            <span class="material-symbols-outlined">rate_review</span>
            나의리뷰
        </a>
        <a class="text-on-surface-variant hover:bg-surface-variant rounded-lg mx-2 px-4 py-3 flex items-center gap-3 transition-all active:scale-95" th:classappend="${activeMenu == 'myqna'} ? ' bg-[#2c4a52] hover:bg-[#2c4a52] text-white font-semibold scale-95'" th:href="@{/my/myqna}" href="/my/myqna">
            <span class="material-symbols-outlined">contact_support</span>
            문의하기
        </a>
        <a class="text-on-surface-variant hover:bg-surface-variant rounded-lg mx-2 px-4 py-3 flex items-center gap-3 transition-all active:scale-95" th:classappend="${activeMenu == 'myinfo'} ? ' bg-[#2c4a52] hover:bg-[#2c4a52] text-white font-semibold scale-95'" th:href="@{/my/myinfo}" href="/my/myinfo">
            <span class="material-symbols-outlined">settings</span>
            나의설정
        </a>
    </nav>
</aside>

<div th:fragment="banner"
     class="my-banner-frame w-full min-h-[56px] rounded-xl overflow-hidden mb-lg shadow-sm border border-outline-variant bg-surface-container-high relative"
     th:style="${myBanners != null and !#lists.isEmpty(myBanners) ? 'aspect-ratio:' + myBanners[0].aspectRatio : 'aspect-ratio:810 / 86'}">
    <div th:if="${myBanners != null and !#lists.isEmpty(myBanners)}" class="my-banner-slider absolute inset-0">
        <a th:each="banner, stat : ${myBanners}"
           th:href="${banner.linkUrl != null and !banner.linkUrl.isBlank() ? banner.linkUrl : '#'}"
           th:target="${banner.linkUrl != null and (#strings.startsWith(banner.linkUrl, 'http://') or #strings.startsWith(banner.linkUrl, 'https://')) ? '_blank' : '_self'}"
           class="my-banner-slide absolute inset-0 block transition-opacity duration-500 bg-surface-container-high"
           th:classappend="${stat.first} ? ' opacity-100 z-10' : ' opacity-0 z-0'"
           th:attr="data-banner-index=${stat.index}">
            <img class="my-banner-img w-full h-full object-contain bg-surface-container-high"
                 th:src="${banner.fileUrl_stored}"
                 th:alt="${banner.name != null and !banner.name.isBlank() ? banner.name : '마이페이지 배너'}"
                 onerror="this.classList.add('hidden'); this.nextElementSibling?.classList.remove('hidden');">
            <div class="hidden absolute inset-0 flex items-center justify-center text-on-surface-variant">
                <span class="font-label-md text-label-md">배너 이미지를 불러올 수 없습니다.</span>
            </div>
        </a>
        <div class="absolute bottom-2 left-1/2 -translate-x-1/2 z-20 flex gap-1.5" th:if="${#lists.size(myBanners) > 1}">
            <span th:each="banner, stat : ${myBanners}"
                  class="my-banner-dot w-2 h-2 rounded-full bg-white/60 shadow"
                  th:classappend="${stat.first} ? ' !bg-white'"
                  th:attr="data-banner-index=${stat.index}"></span>
        </div>
    </div>
    <div th:unless="${myBanners != null and !#lists.isEmpty(myBanners)}" class="w-full h-full flex items-center justify-center text-on-surface-variant">
        <span class="font-label-md text-label-md">810 x 86 배너 광고</span>
    </div>
    <script th:if="${myBanners != null and !#lists.isEmpty(myBanners)}">
        (() => {
            const sliders = document.querySelectorAll('.my-banner-slider');
            sliders.forEach((slider) => {
                if (slider.dataset.initialized === 'true') return;
                slider.dataset.initialized = 'true';
                const frame = slider.closest('.my-banner-frame');
                const slides = Array.from(slider.querySelectorAll('.my-banner-slide'));
                const dots = Array.from(slider.querySelectorAll('.my-banner-dot'));
                let current = 0;
                const applyImageRatio = (slide) => {
                    const image = slide?.querySelector('.my-banner-img');
                    if (!frame || !image || !image.naturalWidth || !image.naturalHeight) return;
                    frame.style.aspectRatio = `${image.naturalWidth} / ${image.naturalHeight}`;
                };
                slides.forEach((slide) => {
                    const image = slide.querySelector('.my-banner-img');
                    if (!image) return;
                    image.addEventListener('load', () => {
                        if (slide === slides[current]) applyImageRatio(slide);
                    });
                });
                applyImageRatio(slides[current]);
                if (slides.length <= 1) return;
                const show = (next) => {
                    slides[current].classList.remove('opacity-100', 'z-10');
                    slides[current].classList.add('opacity-0', 'z-0');
                    dots[current]?.classList.remove('!bg-white');
                    current = next;
                    slides[current].classList.remove('opacity-0', 'z-0');
                    slides[current].classList.add('opacity-100', 'z-10');
                    dots[current]?.classList.add('!bg-white');
                    applyImageRatio(slides[current]);
                };
                window.setInterval(() => show((current + 1) % slides.length), 4500);
            });
        })();
    </script>
</div>

<div th:fragment="claimModal">
    <div class="fixed inset-0 z-[90] hidden items-center justify-center p-4 custom-modal" id="claim-modal">
        <div class="absolute inset-0 bg-on-surface/50 modal-overlay cursor-pointer close-modal-trigger"></div>
        <div class="relative w-full max-w-3xl bg-surface-container-lowest rounded-xl shadow-2xl overflow-hidden flex flex-col max-h-[90vh] modal-content scale-95 opacity-0 transition-all duration-300">
            <div class="px-md py-4 border-b border-outline-variant flex justify-between items-center bg-primary text-on-primary sticky top-0 z-10">
                <h3 class="font-headline-md text-headline-md" id="claim-modal-title">반품신청</h3>
                <button type="button" class="p-2 hover:bg-white/10 rounded-full transition-colors close-modal-trigger" aria-label="닫기">
                    <span class="material-symbols-outlined pointer-events-none">close</span>
                </button>
            </div>
            <form th:action="@{/my/order/claim}" method="post" enctype="multipart/form-data" class="flex flex-col overflow-hidden">
                <input type="hidden" name="orderDetailNo" id="claim-order-detail-no">
                <input type="hidden" name="type" id="claim-type">
                <div class="p-md space-y-md overflow-y-auto">
                    <section class="space-y-sm">
                        <div class="flex items-center gap-2">
                            <span class="w-1.5 h-5 bg-primary rounded-full"></span>
                            <h4 class="font-headline-md text-headline-md text-on-surface">상품정보</h4>
                        </div>
                        <div class="border border-outline-variant rounded-xl overflow-hidden">
                            <div class="grid grid-cols-12 bg-surface-container-low text-label-sm font-label-sm text-on-surface-variant text-center">
                                <div class="col-span-2 px-3 py-3">날짜</div>
                                <div class="col-span-7 px-3 py-3">상품정보</div>
                                <div class="col-span-3 px-3 py-3">상태</div>
                            </div>
                            <div class="grid grid-cols-12 gap-3 p-md items-center">
                                <div class="col-span-2 text-center text-label-md text-on-surface-variant" id="claim-date">-</div>
                                <div class="col-span-7 flex gap-sm min-w-0">
                                    <div class="w-20 h-20 shrink-0 rounded-lg overflow-hidden border border-outline-variant bg-surface-container flex items-center justify-center">
                                        <img id="claim-thumb" class="hidden w-full h-full object-cover" alt="상품 이미지">
                                        <span id="claim-thumb-placeholder" class="material-symbols-outlined text-outline text-3xl">image</span>
                                    </div>
                                    <div class="min-w-0 space-y-1">
                                        <p class="font-label-sm text-label-sm text-on-surface-variant">주문번호 : <span class="font-bold text-on-surface" id="claim-order-no">-</span></p>
                                        <p class="font-label-md text-label-md text-primary font-semibold truncate" id="claim-shop-name">-</p>
                                        <p class="font-body-md text-body-md text-on-surface font-semibold break-keep" id="claim-product-name">-</p>
                                        <p class="font-label-sm text-label-sm text-on-surface-variant">수량 : <span id="claim-quantity">-</span>개</p>
                                        <p class="font-headline-md text-headline-md text-primary font-bold" id="claim-total-price">-</p>
                                    </div>
                                </div>
                                <div class="col-span-3 text-center">
                                    <span class="inline-block px-3 py-1 bg-secondary-container text-on-secondary-container rounded-full font-label-sm text-label-sm" id="claim-status">-</span>
                                </div>
                            </div>
                        </div>
                    </section>

                    <section class="space-y-sm">
                        <div class="flex items-center gap-2">
                            <span class="w-1.5 h-5 bg-primary rounded-full"></span>
                            <h4 class="font-headline-md text-headline-md text-on-surface" id="claim-section-title">반품정보 입력</h4>
                        </div>
                        <div class="border border-outline-variant rounded-xl overflow-hidden">
                            <div class="grid grid-cols-12 border-b border-outline-variant">
                                <div class="col-span-3 bg-surface-container-low px-md py-3 font-label-md text-label-md text-on-surface-variant">신청유형</div>
                                <div class="col-span-9 bg-white px-md py-3 flex flex-wrap gap-4">
                                    <label class="inline-flex items-center gap-2 cursor-pointer">
                                        <input id="claim-reason-primary-input" class="w-4 h-4 text-primary focus:ring-primary border-outline-variant" name="reasonType" type="radio" value="단순 변심" required>
                                        <span class="font-body-md text-body-md text-on-surface-variant" id="claim-reason-primary-label">단순 변심</span>
                                    </label>
                                    <label class="inline-flex items-center gap-2 cursor-pointer">
                                        <input class="w-4 h-4 text-primary focus:ring-primary border-outline-variant" name="reasonType" type="radio" value="파손 및 불량">
                                        <span class="font-body-md text-body-md text-on-surface-variant">파손 및 불량</span>
                                    </label>
                                    <label class="inline-flex items-center gap-2 cursor-pointer">
                                        <input class="w-4 h-4 text-primary focus:ring-primary border-outline-variant" name="reasonType" type="radio" value="주문 실수">
                                        <span class="font-body-md text-body-md text-on-surface-variant">주문 실수</span>
                                    </label>
                                    <label class="inline-flex items-center gap-2 cursor-pointer">
                                        <input class="w-4 h-4 text-primary focus:ring-primary border-outline-variant" name="reasonType" type="radio" value="기타">
                                        <span class="font-body-md text-body-md text-on-surface-variant">기타</span>
                                    </label>
                                </div>
                            </div>
                            <div class="grid grid-cols-12 border-b border-outline-variant">
                                <div class="col-span-3 bg-surface-container-low px-md py-3 font-label-md text-label-md text-on-surface-variant">사유입력</div>
                                <div class="col-span-9 bg-white px-md py-3">
                                    <textarea name="reasonDetail" class="w-full min-h-28 resize-y rounded-lg border-outline-variant focus:border-primary focus:ring-primary text-body-md font-body-md" placeholder="상세 사유를 입력해주세요."></textarea>
                                </div>
                            </div>
                            <div class="grid grid-cols-12">
                                <div class="col-span-3 bg-surface-container-low px-md py-3 font-label-md text-label-md text-on-surface-variant">사진첨부(선택)</div>
                                <div class="col-span-9 bg-white px-md py-3">
                                    <input type="file" name="attachedImage" accept="image/*" class="block w-full text-label-md font-label-md text-on-surface-variant file:mr-4 file:rounded-lg file:border file:border-outline-variant file:bg-surface-container-lowest file:px-4 file:py-2 file:text-label-md file:font-label-md file:text-on-surface hover:file:bg-surface-variant">
                                </div>
                            </div>
                        </div>
                    </section>
                </div>
                <div class="p-md bg-white border-t border-outline-variant flex justify-center gap-3 sticky bottom-0 z-10">
                    <button type="submit" class="w-32 py-3 bg-primary text-on-primary font-label-md text-label-md rounded-lg shadow-sm hover:opacity-90 active:scale-95 transition-all" id="claim-submit-btn">반품신청</button>
                    <button type="button" class="w-32 py-3 bg-surface-container-high text-on-surface font-label-md text-label-md rounded-lg shadow-sm hover:opacity-90 active:scale-95 transition-all close-modal-trigger">취소</button>
                </div>
            </form>
        </div>
    </div>
    <script>
        (() => {
            if (window.__myClaimModalInitialized) return;
            window.__myClaimModalInitialized = true;

            const modal = document.getElementById('claim-modal');
            if (!modal) return;
            const content = modal.querySelector('.modal-content');
            const formatter = new Intl.NumberFormat('ko-KR');

            const setText = (id, value) => {
                const el = document.getElementById(id);
                if (el) el.textContent = value || '-';
            };

            const setClaimType = (type) => {
                const isExchange = type === 'exchange';
                const title = isExchange ? '교환신청' : '반품신청';
                setText('claim-modal-title', title);
                setText('claim-section-title', isExchange ? '교환정보 입력' : '반품정보 입력');
                setText('claim-submit-btn', title);
                const primaryInput = document.getElementById('claim-reason-primary-input');
                const primaryLabel = document.getElementById('claim-reason-primary-label');
                if (primaryInput && primaryLabel) {
                    primaryInput.value = isExchange ? '단순 교환' : '단순 변심';
                    primaryInput.checked = true;
                    primaryLabel.textContent = primaryInput.value;
                }
                const claimTypeInput = document.getElementById('claim-type');
                if (claimTypeInput) claimTypeInput.value = type;
            };

            const show = () => {
                modal.classList.remove('hidden');
                modal.classList.add('flex');
                document.body.style.overflow = 'hidden';
                setTimeout(() => {
                    content?.classList.remove('scale-95', 'opacity-0');
                    content?.classList.add('scale-100', 'opacity-100');
                }, 10);
            };

            const hide = () => {
                content?.classList.remove('scale-100', 'opacity-100');
                content?.classList.add('scale-95', 'opacity-0');
                setTimeout(() => {
                    modal.classList.add('hidden');
                    modal.classList.remove('flex');
                    if (!document.querySelector('.custom-modal:not(.hidden)')) {
                        document.body.style.overflow = '';
                    }
                }, 250);
            };

            document.addEventListener('click', (e) => {
                const openBtn = e.target.closest('.open-claim-btn');
                if (openBtn) {
                    e.preventDefault();
                    const form = modal.querySelector('form');
                    form?.reset();
                    setClaimType(openBtn.dataset.claimType || 'return');
                    const orderDetailInput = document.getElementById('claim-order-detail-no');
                    if (orderDetailInput) orderDetailInput.value = openBtn.dataset.orderDetailNo || '';
                    setText('claim-date', openBtn.dataset.orderDate);
                    setText('claim-order-no', openBtn.dataset.orderNo);
                    setText('claim-shop-name', openBtn.dataset.shopName);
                    setText('claim-product-name', openBtn.dataset.productName);
                    setText('claim-quantity', openBtn.dataset.quantity);
                    const totalPrice = Number(openBtn.dataset.totalPrice || 0);
                    setText('claim-total-price', totalPrice > 0 ? `${formatter.format(totalPrice)}원` : '-');
                    setText('claim-status', openBtn.dataset.status);

                    const thumb = openBtn.dataset.thumb;
                    const img = document.getElementById('claim-thumb');
                    const placeholder = document.getElementById('claim-thumb-placeholder');
                    if (img && placeholder) {
                        if (thumb) {
                            img.src = `/uploads/${thumb}`;
                            img.classList.remove('hidden');
                            placeholder.classList.add('hidden');
                        } else {
                            img.removeAttribute('src');
                            img.classList.add('hidden');
                            placeholder.classList.remove('hidden');
                        }
                    }
                    show();
                    return;
                }

                const closeBtn = e.target.closest('#claim-modal .close-modal-trigger');
                if (closeBtn) {
                    e.preventDefault();
                    hide();
                }
            });
        })();
    </script>
</div>

</body>
</html>
