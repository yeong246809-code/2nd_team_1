<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<body>
<aside th:fragment="sidebar(activeMenu)" class="w-64 shrink-0 flex flex-col space-y-2 py-md bg-surface-container-low rounded-xl shadow-sm border-r border-outline-variant h-fit sticky top-24">
    <div class="px-4 pb-4 border-b border-outline-variant mb-2">
        <h2 class="font-headline-md text-headline-md text-primary">나의쇼핑정보</h2>
        <p class="font-body-md text-body-md text-on-surface-variant opacity-70" th:text="${loginUserId} != '' ? |${loginUserId}님 환영합니다| : '환영합니다'">환영합니다</p>
    </div>
    <nav class="flex flex-col space-y-1">
        <a class="text-on-surface-variant hover:bg-surface-variant rounded-lg mx-2 px-4 py-3 flex items-center gap-3 transition-all active:scale-95" th:classappend="${activeMenu == 'order'} ? ' bg-[#2c4a52] hover:bg-[#2c4a52] text-white font-semibold scale-95'" th:href="@{/my/order}" href="/my/order">
            <span class="material-symbols-outlined">list_alt</span>
            전체주문내역
        </a>
        <a class="text-on-surface-variant hover:bg-surface-variant rounded-lg mx-2 px-4 py-3 flex items-center gap-3 transition-all active:scale-95" th:classappend="${activeMenu == 'point'} ? ' bg-[#2c4a52] hover:bg-[#2c4a52] text-white font-semibold scale-95'" th:href="@{/my/point}" href="/my/point">
            <span class="material-symbols-outlined">payments</span>
            포인트내역
        </a>
        <a class="text-on-surface-variant hover:bg-surface-variant rounded-lg mx-2 px-4 py-3 flex items-center gap-3 transition-all active:scale-95" th:classappend="${activeMenu == 'coupon'} ? ' bg-[#2c4a52] hover:bg-[#2c4a52] text-white font-semibold scale-95'" th:href="@{/my/coupon}" href="/my/coupon">
            <span class="material-symbols-outlined">confirmation_number</span>
            쿠폰
        </a>
        <a class="text-on-surface-variant hover:bg-surface-variant rounded-lg mx-2 px-4 py-3 flex items-center gap-3 transition-all active:scale-95" th:classappend="${activeMenu == 'review'} ? ' bg-[#2c4a52] hover:bg-[#2c4a52] text-white font-semibold scale-95'" th:href="@{/my/review}" href="/my/review">
            <span class="material-symbols-outlined">rate_review</span>
            나의리뷰
        </a>
        <a class="text-on-surface-variant hover:bg-surface-variant rounded-lg mx-2 px-4 py-3 flex items-center gap-3 transition-all active:scale-95" th:classappend="${activeMenu == 'myqna'} ? ' bg-[#2c4a52] hover:bg-[#2c4a52] text-white font-semibold scale-95'" th:href="@{/my/myqna}" href="/my/myqna">
            <span class="material-symbols-outlined">contact_support</span>
            문의하기
        </a>
        <a class="text-on-surface-variant hover:bg-surface-variant rounded-lg mx-2 px-4 py-3 flex items-center gap-3 transition-all active:scale-95" th:classappend="${activeMenu == 'myinfo'} ? ' bg-[#2c4a52] hover:bg-[#2c4a52] text-white font-semibold scale-95'" th:href="@{/my/myinfo}" href="/my/myinfo">
            <span class="material-symbols-outlined">settings</span>
            나의설정
        </a>
    </nav>
</aside>

<div th:fragment="banner"
     class="my-banner-frame w-full min-h-[56px] rounded-xl overflow-hidden mb-lg shadow-sm border border-outline-variant bg-surface-container-high relative"
     th:style="${myBanners != null and !#lists.isEmpty(myBanners) ? 'aspect-ratio:' + myBanners[0].aspectRatio : 'aspect-ratio:810 / 86'}">
    <div th:if="${myBanners != null and !#lists.isEmpty(myBanners)}" class="my-banner-slider absolute inset-0">
        <a th:each="banner, stat : ${myBanners}"
           th:href="${banner.linkUrl != null and !banner.linkUrl.isBlank() ? banner.linkUrl : '#'}"
           th:target="${banner.linkUrl != null and (#strings.startsWith(banner.linkUrl, 'http://') or #strings.startsWith(banner.linkUrl, 'https://')) ? '_blank' : '_self'}"
           class="my-banner-slide absolute inset-0 block transition-opacity duration-500 bg-surface-container-high"
           th:classappend="${stat.first} ? ' opacity-100 z-10' : ' opacity-0 z-0'"
           th:attr="data-banner-index=${stat.index}">
            <img class="my-banner-img w-full h-full object-contain bg-surface-container-high"
                 th:src="${banner.fileUrl_stored}"
                 th:alt="${banner.name != null and !banner.name.isBlank() ? banner.name : '마이페이지 배너'}"
                 onerror="this.classList.add('hidden'); this.nextElementSibling?.classList.remove('hidden');">
            <div class="hidden absolute inset-0 flex items-center justify-center text-on-surface-variant">
                <span class="font-label-md text-label-md">배너 이미지를 불러올 수 없습니다.</span>
            </div>
        </a>
        <div class="absolute bottom-2 left-1/2 -translate-x-1/2 z-20 flex gap-1.5" th:if="${#lists.size(myBanners) > 1}">
            <span th:each="banner, stat : ${myBanners}"
                  class="my-banner-dot w-2 h-2 rounded-full bg-white/60 shadow"
                  th:classappend="${stat.first} ? ' !bg-white'"
                  th:attr="data-banner-index=${stat.index}"></span>
        </div>
    </div>
    <div th:unless="${myBanners != null and !#lists.isEmpty(myBanners)}" class="w-full h-full flex items-center justify-center text-on-surface-variant">
        <span class="font-label-md text-label-md">810 x 86 배너 광고</span>
    </div>
    <script th:if="${myBanners != null and !#lists.isEmpty(myBanners)}">
        (() => {
            const sliders = document.querySelectorAll('.my-banner-slider');
            sliders.forEach((slider) => {
                if (slider.dataset.initialized === 'true') return;
                slider.dataset.initialized = 'true';
                const frame = slider.closest('.my-banner-frame');
                const slides = Array.from(slider.querySelectorAll('.my-banner-slide'));
                const dots = Array.from(slider.querySelectorAll('.my-banner-dot'));
                let current = 0;
                const applyImageRatio = (slide) => {
                    const image = slide?.querySelector('.my-banner-img');
                    if (!frame || !image || !image.naturalWidth || !image.naturalHeight) return;
                    frame.style.aspectRatio = `${image.naturalWidth} / ${image.naturalHeight}`;
                };
                slides.forEach((slide) => {
                    const image = slide.querySelector('.my-banner-img');
                    if (!image) return;
                    image.addEventListener('load', () => {
                        if (slide === slides[current]) applyImageRatio(slide);
                    });
                });
                applyImageRatio(slides[current]);
                if (slides.length <= 1) return;
                const show = (next) => {
                    slides[current].classList.remove('opacity-100', 'z-10');
                    slides[current].classList.add('opacity-0', 'z-0');
                    dots[current]?.classList.remove('!bg-white');
                    current = next;
                    slides[current].classList.remove('opacity-0', 'z-0');
                    slides[current].classList.add('opacity-100', 'z-10');
                    dots[current]?.classList.add('!bg-white');
                    applyImageRatio(slides[current]);
                };
                window.setInterval(() => show((current + 1) % slides.length), 4500);
            });
        })();
    </script>
</div>

</body>
</html>
