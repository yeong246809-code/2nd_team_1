spring.application.name=K_Market-Test

# In-memory database used only by automated tests.
spring.datasource.url=jdbc:h2:mem:k_market;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop

# Safe dummy values: tests never send mail or call S3 unless explicitly enabled.
spring.mail.host=localhost
spring.mail.port=3025
spring.mail.username=test@example.com
spring.mail.password=test-password

cloud.aws.region.static=ap-northeast-2
cloud.aws.credentials.access-key=test-access-key
cloud.aws.credentials.secret-key=test-secret-key
cloud.aws.s3.bucket=test-bucket
