<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>K-market Admin - 버전관리</title>
    <link href="https://fonts.googleapis.com" rel="preconnect"/>
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600&amp;family=Plus+Jakarta+Sans:wght@600;700;800&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        /* Accordion Smooth Animation */
        .menu-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out, opacity 0.2s ease-in;
            opacity: 0;
        }
        .menu-item-active .menu-content {
            max-height: 500px;
            opacity: 1;
        }
        .chevron-icon {
            transition: transform 0.3s ease;
        }
        .menu-item-active .chevron-icon {
            transform: rotate(180deg);
        }
    </style>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "secondary": "#3e6659",
                        "on-error": "#ffffff",
                        "on-secondary-fixed": "#002018",
                        "primary-fixed": "#c8e8f2",
                        "inverse-surface": "#2e3132",
                        "on-background": "#191c1d",
                        "on-tertiary": "#ffffff",
                        "surface": "#f8f9fa",
                        "inverse-primary": "#acccd5",
                        "outline-variant": "#c1c7ca",
                        "outline": "#72787a",
                        "error": "#ba1a1a",
                        "tertiary-fixed": "#ffdcc7",
                        "on-primary": "#ffffff",
                        "surface-container-highest": "#e1e3e4",
                        "on-tertiary-fixed-variant": "#5f402b",
                        "on-secondary-container": "#446c5f",
                        "background": "#f8f9fa",
                        "secondary-fixed": "#c0ecdc",
                        "tertiary-container": "#5e3f2a",
                        "on-tertiary-fixed": "#2d1605",
                        "on-error-container": "#93000a",
                        "secondary-container": "#c0ecdc",
                        "on-primary-fixed": "#001f26",
                        "primary-container": "#2c4a52",
                        "secondary-fixed-dim": "#a5d0c0",
                        "on-primary-fixed-variant": "#2d4b53",
                        "surface-container-high": "#e7e8e9",
                        "surface-bright": "#f8f9fa",
                        "surface-tint": "#45636b",
                        "primary-fixed-dim": "#acccd5",
                        "on-secondary": "#ffffff",
                        "inverse-on-surface": "#f0f1f2",
                        "on-primary-container": "#99b9c2",
                        "on-surface": "#191c1d",
                        "on-surface-variant": "#41484a",
                        "surface-variant": "#e1e3e4",
                        "surface-dim": "#d9dadb",
                        "surface-container-low": "#f3f4f5",
                        "surface-container-lowest": "#ffffff",
                        "on-secondary-fixed-variant": "#264e42",
                        "primary": "#14333b",
                        "surface-container": "#edeeef",
                        "error-container": "#ffdad6",
                        "tertiary": "#452916",
                        "on-tertiary-container": "#d6ab90",
                        "tertiary-fixed-dim": "#eabda2"
                    },
                    "fontFamily": {
                        "body-md": ["Be Vietnam Pro"],
                        "label-sm": ["Be Vietnam Pro"],
                        "headline-md": ["Plus Jakarta Sans"],
                        "headline-lg": ["Plus Jakarta Sans"],
                        "body-lg": ["Be Vietnam Pro"],
                        "display-lg": ["Plus Jakarta Sans"],
                        "label-md": ["Be Vietnam Pro"],
                        "headline-lg-mobile": ["Plus Jakarta Sans"]
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-background text-on-background font-body-md text-base antialiased min-h-screen flex">
<nav class="fixed left-0 top-0 bottom-0 flex flex-col w-64 z-40 bg-surface dark:bg-inverse-surface border-r border-outline-variant overflow-hidden">
    <div class="flex items-center gap-4 px-6 py-6 border-b border-outline-variant flex-shrink-0">
        <div class="w-12 h-12 rounded-full bg-surface-container-high flex items-center justify-center text-primary">
            <span class="material-symbols-outlined">storefront</span>
        </div>
        <div>
            <h2 class="font-headline-md text-xl font-bold text-primary dark:text-inverse-primary">K-market Admin</h2>
            <p class="font-label-md text-sm text-on-surface-variant">관리자 모드</p>
        </div>
    </div>
    <div class="flex-1 overflow-y-auto py-6 px-2 flex flex-col gap-1 custom-scrollbar">
        <div class="group/menu menu-item-active">
            <button class="w-full flex items-center justify-between px-4 py-3 text-primary bg-primary-container/20 rounded-lg transition-colors group" onclick="toggleAccordion(this)">
                <div class="flex items-center gap-3">
                    <span class="material-symbols-outlined">settings</span>
                    <span class="font-label-md text-sm font-bold">환경 설정</span>
                </div>
                <span class="material-symbols-outlined text-sm chevron-icon">expand_more</span>
            </button>
            <div class="menu-content flex flex-col gap-1 pl-12 pr-4">
                <a class="py-2 text-on-surface-variant hover:text-primary font-label-md text-sm" href="#">기본설정</a>
                <a class="py-2 text-on-surface-variant hover:text-primary font-label-md text-sm" href="#">배너관리</a>
                <a class="py-2 text-on-surface-variant hover:text-primary font-label-md text-sm" href="#">약관관리</a>
                <a class="py-2 text-on-surface-variant hover:text-primary font-label-md text-sm" href="#">카테고리</a>
                <a class="py-2 text-primary font-bold font-label-md text-sm" href="#">버전관리</a>
            </div>
        </div>
        <div class="group/menu">
            <button class="w-full flex items-center justify-between px-4 py-3 text-on-surface-variant hover:bg-surface-container-high rounded-lg transition-colors group" onclick="toggleAccordion(this)">
                <div class="flex items-center gap-3">
                    <span class="material-symbols-outlined">store</span>
                    <span class="font-label-md text-sm">상점 관리</span>
                </div>
                <span class="material-symbols-outlined text-sm chevron-icon">expand_more</span>
            </button>
        </div>
        <div class="group/menu">
            <button class="w-full flex items-center justify-between px-4 py-3 text-on-surface-variant hover:bg-surface-container-high rounded-lg transition-colors group" onclick="toggleAccordion(this)">
                <div class="flex items-center gap-3">
                    <span class="material-symbols-outlined">group</span>
                    <span class="font-label-md text-sm">회원 관리</span>
                </div>
                <span class="material-symbols-outlined text-sm chevron-icon">expand_more</span>
            </button>
        </div>
        <div class="group/menu">
            <button class="w-full flex items-center justify-between px-4 py-3 text-on-surface-variant hover:bg-surface-container-high rounded-lg transition-colors group" onclick="toggleAccordion(this)">
                <div class="flex items-center gap-3">
                    <span class="material-symbols-outlined">inventory_2</span>
                    <span class="font-label-md text-sm">상품 관리</span>
                </div>
                <span class="material-symbols-outlined text-sm chevron-icon">expand_more</span>
            </button>
        </div>
        <div class="group/menu">
            <button class="w-full flex items-center justify-between px-4 py-3 text-on-surface-variant hover:bg-surface-container-high rounded-lg transition-colors group" onclick="toggleAccordion(this)">
                <div class="flex items-center gap-3">
                    <span class="material-symbols-outlined">shopping_cart</span>
                    <span class="font-label-md text-sm">주문 관리</span>
                </div>
                <span class="material-symbols-outlined text-sm chevron-icon">expand_more</span>
            </button>
        </div>
        <div class="group/menu">
            <button class="w-full flex items-center justify-between px-4 py-3 text-on-surface-variant hover:bg-surface-container-high rounded-lg transition-colors group" onclick="toggleAccordion(this)">
                <div class="flex items-center gap-3">
                    <span class="material-symbols-outlined">support_agent</span>
                    <span class="font-label-md text-sm">고객 센터</span>
                </div>
                <span class="material-symbols-outlined text-sm chevron-icon">expand_more</span>
            </button>
        </div>
    </div>
</nav>

<header class="fixed top-0 right-0 left-64 h-16 flex items-center justify-between px-6 z-30 bg-surface-container-lowest dark:bg-surface-container-highest border-b border-outline-variant">
    <div class="flex items-center gap-6">
        <h1 class="font-headline-md text-xl font-black text-primary dark:text-inverse-primary">CI ( 로고 )</h1>
    </div>
    <div class="flex items-center gap-3">
        <a class="font-label-md text-sm text-on-surface-variant hover:text-primary hover:underline" href="#">홈</a>
        <span class="font-label-md text-sm text-outline-variant">|</span>
        <a class="font-label-md text-sm text-on-surface-variant hover:text-primary hover:underline" href="#">로그아웃</a>
        <span class="font-label-md text-sm text-outline-variant">|</span>
        <a class="font-label-md text-sm text-on-surface-variant hover:text-primary hover:underline" href="#">고객센터</a>
    </div>
</header>

<main class="ml-64 mt-16 p-8 flex-1 w-full max-w-[1400px] mx-auto flex flex-col gap-8">
    <div class="flex justify-between items-center mb-2">
        <h1 class="font-headline-lg text-3xl font-bold text-on-background">버전관리</h1>
        <p class="font-label-md text-sm text-on-surface-variant">HOME > 환경설정 > 버전관리</p>
    </div>

    <div class="bg-surface-container-lowest rounded-lg border border-outline-variant p-6">
        <h3 class="font-headline-md text-lg font-bold text-on-background mb-3 border-b border-outline-variant pb-2">버전 목록</h3>
        <p class="font-body-md text-sm text-on-surface-variant mb-6 bg-surface p-3 rounded border border-outline-variant">사이트 버전 목록 입니다</p>

        <table class="w-full border-collapse border border-outline-variant mb-6 text-center">
            <thead>
            <tr class="bg-surface-container-high border-b border-outline-variant">
                <th class="px-4 py-2 border-r border-outline-variant w-12"><input class="form-checkbox h-4 w-4 rounded border-outline-variant text-primary focus:ring-primary" type="checkbox"/></th>
                <th class="px-4 py-2 border-r border-outline-variant font-label-md text-sm text-on-surface-variant w-16">번호</th>
                <th class="px-4 py-2 border-r border-outline-variant font-label-md text-sm text-on-surface-variant">버전</th>
                <th class="px-4 py-2 border-r border-outline-variant font-label-md text-sm text-on-surface-variant">작성자</th>
                <th class="px-4 py-2 border-r border-outline-variant font-label-md text-sm text-on-surface-variant">등록일시</th>
                <th class="px-4 py-2 font-label-md text-sm text-on-surface-variant w-24">변경내역</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="v : ${versionList}" class="border-b border-outline-variant">
                <td class="px-4 py-2 border-r border-outline-variant">
                    <input class="form-checkbox h-4 w-4 rounded border-outline-variant text-primary focus:ring-primary" type="checkbox"/>
                </td>
                <td class="px-4 py-2 border-r border-outline-variant font-body-md text-sm" th:text="${v.id}">번호</td>
                <td class="px-4 py-2 border-r border-outline-variant font-body-md text-sm" th:text="${v.versionCode}">버전</td>
                <td class="px-4 py-2 border-r border-outline-variant font-body-md text-sm" th:text="${v.memberId}">작성자ID</td>
                <td class="px-4 py-2 border-r border-outline-variant font-body-md text-sm"
                    th:text="${#temporals.format(v.createdAt, 'yyyy.MM.dd HH:mm:ss')}">등록일시</td>
                <td class="px-4 py-2 font-body-md text-sm"><a class="text-primary hover:underline" href="#">[확인]</a></td>
            </tr>
            </tbody>
        </table>

        <div class="flex justify-between items-center mb-8">
            <button class="px-6 py-2 bg-surface-container-highest border border-outline-variant rounded text-on-surface-variant font-label-md text-sm hover:bg-surface-dim transition-colors">선택삭제</button>
            <button onclick="openModal()" class="px-8 py-2 bg-[#89a8d6] rounded text-white font-label-md text-sm hover:bg-[#7292c2] transition-colors">등록</button>
        </div>

        <div class="flex justify-center items-center gap-3 font-label-md text-sm">
            <a class="text-on-surface-variant hover:text-primary" href="#">이전</a>
            <a class="text-primary font-bold" href="#">1</a>
            <a class="text-on-surface-variant hover:text-primary" href="#">2</a>
            <a class="text-on-surface-variant hover:text-primary" href="#">3</a>
            <a class="text-on-surface-variant hover:text-primary" href="#">다음</a>
        </div>
    </div>
</main>

<div id="registerModal" class="fixed inset-0 z-50 flex items-center justify-center bg-black/50 hidden">
    <div class="bg-white w-[600px] shadow-2xl rounded-sm flex flex-col">
        <div class="bg-[#3a3a3a] text-white flex justify-between items-center px-4 py-3 rounded-t-sm">
            <h3 class="font-label-md text-[15px] font-bold">버전등록</h3>
            <button onclick="closeModal()" class="text-white hover:text-gray-300 font-bold text-lg leading-none">&times;</button>
        </div>

        <div class="p-6">
            <div class="border border-outline-variant flex flex-col">
                <div class="flex border-b border-outline-variant">
                    <div class="w-32 bg-[#f8f9fa] flex items-center justify-center py-3 border-r border-outline-variant">
                        <span class="font-label-md text-[13px] text-gray-700 font-bold">버전</span>
                    </div>
                    <div class="flex-1 p-2">
                        <input type="text" id="versionCode" placeholder="버전입력하기" class="w-[250px] border border-outline-variant px-3 py-1.5 text-[13px] outline-none focus:border-primary text-gray-700">
                    </div>
                </div>
                <div class="flex">
                    <div class="w-32 bg-[#f8f9fa] flex items-center justify-center py-3 border-r border-outline-variant">
                        <span class="font-label-md text-[13px] text-gray-700 font-bold">변경내역</span>
                    </div>
                    <div class="flex-1 p-2">
                        <textarea id="changeLog" placeholder="변경내역작성하기" class="w-full h-48 border border-outline-variant px-3 py-2 text-[13px] outline-none focus:border-primary resize-none text-gray-700"></textarea>
                    </div>
                </div>
            </div>
        </div>

        <div class="flex justify-center pb-8 pt-2">
            <button type="button" id="submitBtn" class="bg-[#2eb85c] hover:bg-[#259b4c] text-white px-10 py-2 font-label-md text-sm transition-colors shadow-sm">
                등록하기
            </button>
        </div>
    </div>
</div>

<script>
    // 아코디언 메뉴 스크립트
    function toggleAccordion(button) {
        const menuItem = button.parentElement;
        const isActive = menuItem.classList.contains('menu-item-active');
        if (isActive) {
            menuItem.classList.remove('menu-item-active');
        } else {
            menuItem.classList.add('menu-item-active');
        }
    }

    // 모달 제어
    const modal = document.getElementById('registerModal');
    function openModal() { modal.classList.remove('hidden'); }
    function closeModal() { modal.classList.add('hidden'); }

    // ★ 이벤트 리스너 직접 등록 (여기가 해결 핵심)
    document.addEventListener('DOMContentLoaded', function() {
        const submitBtn = document.getElementById('submitBtn');
        if (submitBtn) {
            submitBtn.addEventListener('click', function() {
                submitVersion();
            });
        }
    });

    function submitVersion(e) {
        if (e) e.preventDefault();

        const versionCode = document.getElementById('versionCode').value;
        const changeLog = document.getElementById('changeLog').value;

        if (!versionCode.trim()) {
            alert("버전을 입력해주세요.");
            return;
        }

        fetch('/k_market/admin/config/version', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ versionCode: versionCode, changeLog: changeLog })
        })
            .then(response => {
                if (response.ok) {
                    alert('버전이 등록되었습니다.');
                    closeModal();
                    location.reload();
                } else {
                    alert('등록 실패: ' + response.status);
                }
            })
            .catch(err => {
                console.error(err);
                alert('통신 오류 발생');
            });
    }

    window.onclick = function(event) {
        if (event.target === modal) closeModal();
    }
</script>
</body>
</html>
